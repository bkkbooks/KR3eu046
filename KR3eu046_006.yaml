body:
  text: 卷六太陰病證候問胸膈不快䐜滿閉塞唇青手足冷脈沉細少情緒或腹痛此名太陰也近人多不識陰證才見胸膈不快便投食藥非其治也大抵陰證者由冷物傷脾胃陰經受之也主胸膈䐜滿面色及唇皆無色澤手足冷脈沉細少情緒亦不因嗜欲但內傷冷物或損動胃氣遂成陰證復投巴豆之類胸膈愈不快或吐而利經一二日遂致不救蓋不知寒中太陰也太陰者脾之經也活人案此說不純且太陰本無胸滿熱論云四日太陰華佗云四日在胸此似錯綜之者姑存之凡看傷寒有口汗白沫或唾多流冷涎俱是有寒吳茱萸湯理中真武湯之類看輕重用切忌涼藥六書桂枝加大黃湯變方本方竊以為溫利之劑仍以溫脾諸湯隸之溫脾湯治脾胃冷實不消方大黃四兩人參甘草乾薑各二兩附子一枚大者上五味㕮咀以水八升煮取二升半分三服臨熟下大黃與後溫脾湯小異須大轉瀉者當用此方神效千金溫脾湯大黃桂心各三兩附子乾薑人參各二兩上五味㕮咀以水七升煮取二升半分三服千金外臺深師溫脾湯於本方去桂心人參一兩半余同本事溫脾湯於本方去人參加厚朴甘草大黃四錢余各半兩案法律半兩作二兩為說云叔微所論深合仲景以溫藥下之之法其大黃止用四錢更為有見夫久留之邪非攻不去多用則溫藥恐不能制而洞下之勢或至轉增裁酌用之真足法矣深師大溫脾湯療脾胃中冷不得食又谷不消向向脹滿時苦下痢方黃芩人參芍藥附子炮各一兩甘草炙乾薑大黃厚朴炙各二兩上八味切以水八升煮取二升八合分為三服亦可四服得下佳不下須臾復服甚良忌豬肉海藻菘菜外臺案溫脾湯諸方本為雜病痼冷設實出於大黃附子湯今錄之太陰中以為桂枝加大黃湯變溫利之劑又案大溫脾湯中黃芩似可去千金更有用芒消方非寒實所宜仍不錄乾薑丸乾薑炮巴豆去心炒黃研大黃濕紙裹甑上蒸人參各一錢去蘆上除巴豆余為末同研煉蜜丸如梧子大服前湯時用湯吞下一丸米飲亦得本事此方原出溫脾湯後故今亦附錄於此云理中湯諸方傷在太陰脾之經也理中丸主之丸不及湯大便結者宜丸大便軟者宜湯如寒證不能食者理中建中各半湯為二中湯以治之陰證略例治中湯治太陰傷寒手足溫自利不渴腹滿時痛其脈尺寸俱沉細三因案此方系理中湯加青皮陳皮本出活人然不如用本方者故不錄附子理中湯治塞邪中於太陰嘔吐清涎沫腹中冷痛或下利清穀吐蛔蟲脈來沉細急宜溫之乾薑附子炙甘草各一錢人參二錢白朮二錢水煎服心悟案此本於玉案又此方創見巢源痢病中加味理中飲治太陰證自利不渴手足溫身無熱脈來沉而無力此屬臟寒乾薑白朮人參甘草肉桂陳皮茯苓嘔吐者入半夏薑汁踡臥沉重利不止少加附子利後身體痛者急溫之加附子自利腹痛者入木香磨薑汁調服和之水二鍾姜一片棗二枚煎之臨服槌法入炒陳壁土一匙調服取土氣以助胃氣六書節錄少陰病證候陰證似陽脈沉而緩或微細如絲按之無神沉而欲脫口淡不渴或渴不欲飲飲喜極熱之湯渴是少陰本證舌帶糙米色或如豬腰色或如淡墨色或白苔而潤或無苔而燥短縮不能伸胸滿而嘔或吐不止或下利或不大便心下悸耳鳴睡中恍惚如在空中自語問亦不知或竟不睡心煩喜躁不思食食即嘔手足厥冷面青黑此裡氣大虛寒也直解於六經中但少陰證難辨本經但云脈沉細欲寐小便數而白背惡寒四肢厥者可不審而知或雖有惡寒甚者不覺寒或但喜厚衣近火喜瞌睡問之則不言怕寒殊不知厚衣即怕寒也善瞌睡但欲寐也類證凡傷寒陰證難看凡看傷寒惟陰證最難識自然陰證人皆可曉及至反常則不能矣如身不發熱手足厥冷好靜沉默不渴泄利腹痛脈沉細人共知為陰證矣至於發熱面赤煩躁不安揭去衣被飲冷脈大人皆不識認為陽證誤投寒藥死者多矣必須憑脈下藥至為切當不問浮沉大小但指下無力按至筋骨全無力者必有伏陰不可與涼劑脈雖洪大按之無力者重按全無便是陰證六書身微熱煩躁面赤脈沉而微此名陰證似陽也陰發躁熱發厥物極則反也大率以脈為主諸數為熱諸遲為寒無如此最驗也假令身體微熱煩躁面赤其脈沉而微者皆陰證也身微熱者裡寒故也煩躁者陰盛故也面戴陽者下虛故也若醫者不看脈以虛腸上膈躁誤以為實熱反與涼藥則氣消成大病矣外臺秘要云陰盛發躁名曰陰躁欲坐井中宜以熱藥治之仲景少陰證面赤者四逆加蔥白主之活人案外臺今無所考蓋錯引也病人頭面青黑手足厥逆不燥渴六脈沉細陰證瞭然卻有身熱而渴譫言鼻衄發黃發斑大小便不利六脈浮大若陽證俱備而不然者身雖煩熱而手足指尖微有厥冷諸陽會於四末此辨陽氣有無之要法雖有煩渴引飲亦自喜熱而惡冷口雖譫言而鄭重之聲散而不知高下或臥而譫言醒而又定若誤發其汗下厥上竭皆能鼻衄縱有發黃發斑大小便不利陽證俱備略不燥渴脈雖浮大或散而數按之全無此陰盛隔陽裡寒外熱陰證如陽諦矣經云脈從而病反何如曰脈至而從按之不鼓此陽中伏陰之脈正合此也永類蓋陽症面紅光彩唇紅口乾舌燥能飲涼湯冷水也其人則身輕易如轉動常欲開目見人喜語言其聲響亮口鼻之氣來往自熱小便或赤或黃大便或秘或硬手足自溫暖爪甲俱紅活此皆陽症之大略大抵陰症則面青黑或有虛陽泛上雖面赤色而不紅活光彩也其人身重難以轉側或喜向壁臥或踡臥欲寐或閉目不欲見人懶言語或氣少難以布息或口鼻之氣往來自冷其聲音不響亮或前輕而後重或時躁熱煩渴不能飲水唇口或青或紫舌色或青或紫或白胎鋪滿而滑不見紅色手足自冷爪甲或青或紫血自不紅活小便清白或有淡黃大便不實且熱在肌肉之分以手按之殊無大熱陰甚者則冷透手也自是發熱與陽症有別不可以面赤煩渴為論要在仔細審詳而辨之可也蘊要夫陰症似陽者乃水極似火也蓋傷寒傳變或誤服涼藥攻熱太速其人素本腎氣虛寒遂變陰證冷甚於內逼其浮陽之火發於外其人面赤煩躁身有微熱渴欲飲水後不能飲大便陰結不通小水淡黃或嘔逆或氣促或鄭聲或咽喉痛所以狀似陽症或者不識見面赤煩渴大便秘結認作陽症妄投寒涼之藥下咽遂斃可不謹哉切其脈沉細遲微者急以通脈四逆湯倍加人參附子案此當云通脈四逆湯加人參以接其真陽之氣為之緊要之治也設或差遲遂至陰盛陽衰參附亦不能救之此與陰盛格陽例同王太僕所謂身熱脈數按之不鼓擊者此名陰盛格陽非熱也至真要大論下云脈從而病反者其診何如岐伯曰脈至而從按之不鼓諸陽皆然次注云言病熱而脈數按之不動乃寒盛格陽而致之非熱也東垣又云謂之面赤目赤煩渴引飲脈來六七至按之則散者此無根之脈用姜附湯加人參治之而愈此陰陽幽顯之奧水火徵兆之微學者當求內經之旨則造化理可得而明矣同上辨注云陰證似陽乃直中三陰者居多上論但云傷寒傳變或攻熱太速所致其言猶未盡然傷寒外編云若發於陰者始病不發熱無頭痛便自利厥逆腹痛口不渴身體沉重難以轉側嘔吐瀉利惡寒踡臥戰慄吐沫手足指冷厥逆爪甲青黑面如刀刮顏色黯慘而不光舌上雖黑而無胎脈來沉遲細小皆三陰自中之寒證其或面赤戴陽身有微熱咽乾煩躁脈來數疾無倫乃水極似火因虛冷內盛逼其浮陽發外也又如始本陽證誤服涼藥攻熱太速其人腎氣本虛胃氣素弱遂變陰寒雖發熱面赤欲引衣自覆而手足必寒或躁渴欲飲水而不能咽或嘔噦而咳逆或咽痛而鄭聲時躁悶亂如坐臥泥水中稍袒露即畏寒莫禁腹痛可按可揉而不硬滿下利清穀白沫及淡黃水小便清白厥逆過肘膝而不復熱舌上略有黑胎與灰色胎胎雖老必極薄無津而不燥裂無芒刺脈多沉細或浮大數疾按之必虛軟無力不鼓擊於指下者此為陰極似陽不可誤認熱證而下之此證急溫尚且十難救一百不一生矣緒論陰證不可遽涼回陽後治例夫熱病用寒寒病用熱虛病用補實病用瀉夫人而能知之也虛寒病用溫補而應實熱證用涼瀉而應亦夫人而能知之也至於本是虛寒用溫補而前症仍在反覺躁亂不寧或戰慄或呃逆或嘔吐乃病根深固藥力未及更加大劑投之即或舌反燥渴乃陰有轉陽之機切不可改為別治大約虛寒之證其得生者必須君火未衰反見舌乾等證此陰寒去而真陽回更須姜附之類以助其陽則津液生而舌復潤不可見舌乾即投以涼劑則前功盡棄矣然而虛寒之證有二一則本是虛寒而臟氣未傷醫誤用涼瀉即變厥逆嘔呃煩躁等證此為醫所逆也投以溫補應之甚速一則病干三陰神藏傳變甚速即見溫補亦不見效更有虛寒之證服溫補而反不安服涼瀉而反適意此非不可溫補而可涼瀉者也乃正氣已敗兩寒相得同類相從也此亦必死之證至於實熱之證病不傷藏治之或差不過耽延時日決不能死即或危篤或涼或下一服即愈斷不若虛寒證非數十劑不能愈也又有本是虛寒藥力已到有化熱之象輕則聽其自然止其溫補重則少加涼劑一撥即轉又不可膠柱鼓瑟故往往前人溫補而病不去後人清涼而病即除此前之功而非後之力也此數者皆予所身親試驗凡為醫者當三復斯言庶幾乎臨證不惑也直解凡三陰寒症用桂附諸湯惟恐其陰不去而陽不回其後腹中微有熱象及小便短赤者最妙乃陽氣來復積陰可以盡去俗醫不解謬謂熱藥過燥火從內起恐燥真陰改用寒涼則陰復進而陽更退前功盡廢可慨也舒氏凡服溫經回陽藥後其人微煩而渴脈來微數而不實堅身體安和靜臥者少與生脈散或清粥飲其渴自止慎勿誤與涼藥復助陰寒也緒論溫補不可少緩寒中少陰行其嚴令埋沒真陽肌膚凍裂無汗而喪神守急用附子乾薑加蔥白以散寒加豬膽汁引入陰分然恐藥力不勝熨蔥灼艾外內協攻乃足破其堅凝少緩須臾必無及矣此一難也若其人真陽素擾腠理素疏陰盛於內必逼其陽亡於外魄汗淋漓脊項強硬用附子乾薑豬膽汁即不可加蔥及熨灼恐助其散令氣隨汗脫而陽無繇內返也宜撲止其汗陡進前藥隨加固護腠理不爾恐其陽復越此二難也用附子乾薑以勝陰復陽者取飛騎突入重圍搴旗樹幟使既散之陽望爭趨頃之復合耳不知此義者加增藥味和合成湯反牽制其雄入之勞必至迂緩無功此三難也法律原凡八難俱不確姑存其三然如撲汗亦覺難施陰似陽治驗張子和四令郎傷寒四五日兩脈虛微神氣昏亂躁煩不寧時欲得水復置不飲棄衣而走勇力倍於常時言語狂妄不避親疏知為群陰格陽欲脫外顯假熱內伏真寒也為定參附理中湯大振陽氣以敵陰邪時群醫滿座皆謂火熱有餘之證不用溫補而欲行寒下余曰陰盛之極虛陽不勝不勝則陰乘陽位而陽以外亡躁煩狂亂種種不寧有似陽邪內甚孰知其為陽氣外散耶觀其得水不欲飲情已畢露豈有大熱之證而不欲引水自救者耶且即指外證為陽實有餘之候則將指兩脈微弱無神者為陰虛不足之兆耶嗟哉一匕之謬永刦莫懺諸君慎之言未竟適浙友胡先生至議論方案與余若合符節謂此證陰盛於內陽微於外若不急救大汗一至孤陽氣絕難為力矣時病家始委心聽用隨用前藥加人參至四兩煎成冷服一二時許狂亂頓止反見寒慄欲覆重被陽虛之狀始露再與前藥一劑神清熱退而安印機草陰變陽治驗郭雍治一人盛年恃健不善養因極飲冷酒食肉外有所感初得疾即便身涼自汗手足厥額上冷汗不止遍身痛呻吟不絕偃臥不能轉側心神俱無昏憒不恍惚請醫視之治不力言日此證甚重而病人甚靜殊不昏憒身重不能起自汗自利四肢厥此陰證無疑也又遍身痛不知處所出則身如被杖陰毒證也當急治之醫言繆悠不可聽郭令服四逆湯灸關元及三陰交未知加服九鍊金液丹利厥汗證皆少止稍緩藥艾則諸證復出再急灸治如此進退者三凡三日兩夜灸千餘壯服金液丹亦千餘粒四逆湯一二斗方能住灸湯藥陽氣雖復而汗不出證復如太陽病未敢服藥以待汗二三日復大煩躁飲水次則讝語斑出熱甚無可奈何復與調胃承氣湯得利大汗而解陰陽反覆有如此者前言煩躁不可投涼藥此則可下證具非止小煩躁而已故不同也類案麻黃附子甘草湯變及溫汗諸方治傷寒一日太陽受病頭痛項強壯熱惡寒宜服桂枝湯方桂枝半兩附子半兩乾薑半兩甘草半兩麻黃一兩上件藥搗篩為散每服四錢以水一中盞以蔥白二莖煎至六分去滓不計時候稍熱服如人行五里以稀蔥粥投之衣蓋取汗如未汗一依前法再服聖惠案治證當不拘要是少陰溫汗方蓋聖惠以寒字實講故有此錯又治傷寒病極脈沉厥逆通脈散於本方去乾薑入生薑半分棗三枚煎聖濟治中風傷寒頭目四肢疼痛惡寒乾嘔桂附湯於本方去乾薑加芍藥入生薑一棗大棗二枚煎治傷寒二日陽明受病宜服桂枝附子湯方桂枝一兩附子一兩甘草半兩赤芍藥半兩上件藥搗篩為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱頻服汗出即愈聖惠此即桂枝加附子湯今移治表寒治證當與上方同看若初得病便見少陰證其人發熱惡寒身疼頭不痛者宜麻黃附子細辛湯微汗之或五積散加熟附半錢要訣石頑治玉峰陸去非繼室嘉平患惡寒周身骨節皆疼飲食不入者已三日而惡寒未止全不發熱診其六脈悉緊而細詢之平日起居飲食絕少雖暑月不離復衣知其素稟虛寒而不能發熱洵為太陽寒傷營證無疑但從來極虛感寒無正發汗之理乃以黃耆建中制生附汁於耆內以助衛氣一服肢體即溫但背猶畏寒不止更與補中益氣十全大補並加熟附而安緒論此亦少陰直中非太陽證故揭於此其不列之治驗者以不便參對也溫補兼清方下利發熱者於竹葉湯中去石膏加熟附名既濟湯易簡案竹葉湯即竹葉石膏湯如參附湯證見下渴宜既濟湯如宜如初愈燥渴不驚疑不解宜竹葉石膏湯如體虛者既濟湯同上治虛煩上盛下虛煩躁自利手足冷入門案是方此間入少有用者先君子施之陽變陰猶剩浮熱者及少陰病未至大脫而虛熱燥渴者其應如神誠為善於變通而補古方所不足者故特筆出之附子湯真武湯變方此二方自有表裡之分以其藥料稍同姑並出之治傷寒一日壯熱頭痛其背惡寒者宜服附子湯方附子一兩赤茯苓半兩赤芍藥半兩人參半兩白朮半兩桂心半兩上件藥搗篩為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服聖惠治傷寒病三日腹痛小便不利而嘔者屬少陽病證宜服赤茯苓散方赤茯苓一兩赤芍藥一兩白朮一兩附子半兩乾薑半兩上件藥搗篩為散每服三錢以水一中盞入生薑半分煎至五分去滓不計時候溫服聖惠此云少陽亦當活看四逆湯變諸方治陰毒傷寒脈候沉細四肢逆冷煩躁頭痛四逆湯方乾薑半兩附子半兩桂心半兩甘草半兩白朮半兩當歸半兩上件藥搗粗羅為散每服三錢以水一中盞煎至六分去滓不計時候稍熱頻服聖惠又治傷寒四逆及內有久寒方於本方去當歸加人參治傷寒大汗出熱不去腹內拘急四肢厥冷並下利方甘草一兩附子半兩乾薑一兩赤芍藥一兩上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候稍熱服聖惠治兩感傷寒陰陽二毒交併身體手足厥逆心中熱悶強語三部脈微細宜急救之四逆湯方乾薑三分附子一兩桂心一兩甘草半兩上件藥搗粗羅為散每服五錢以水一大盞煎至五分去滓不計時候熱服良久吃熱粥以助藥力汗出為度聖惠崔氏凡少陰病寒多表無熱但苦煩憒默默而極不欲見火有時腹自痛其脈沉細而不喜渴經日不差舊用四順湯余怪其熱不甚用也若少陰病下利而體猶有熱者可服黃連龍骨湯若已十餘日而下利不止手足徹冷及無熱候者可服增損四順湯方甘草二兩炙人參二兩龍骨二兩黃連乾薑各二兩附子中形者一枚炮去黑皮上六味切以水六升煮取二升分再服不差復作甚良若下而腹痛加當歸二兩嘔者加橘皮一兩忌海藻菘菜豬肉冷水外臺案此方今移為病機漸向厥陰者之主劑見驗參附湯如自利上炎煩躁坐臥不安脈遲宜人參五錢附子一兩姜十片煎如宜方案此方本出濟生續方參附湯治陽脫四肢厥逆危證人參一兩附子六枚水二鍾煎一鍾灌下渣連服此劑追回元氣生脈直服至有脈四肢溫暖方止醫約傷寒四五日後手足逆冷惡寒身踡脈又不至復加躁擾不寧人以為少陰陽絕之證也而不知不止陽絕也陰亦將絕矣方用參附湯救之用人參二兩附子二錢水煎服往往有得生者辨證錄四明心法亦不用姜云去人參加黃耆名耆附湯案耆附湯亦出濟生續方脈沉自利四逆畏寒而小便難者為津液竭而氣化不行也雖難必無黃亦澀四逆湯合生脈散緒論治夾陰傷寒陰極發躁面青小腹絞痛用乾薑附子甘草合生脈散入白蜜冷服士林餘業赤水同案回陽反本湯此類方也回陽救急湯治直中真寒證初起無頭痛止惡寒四肢厥冷戰慄腹疼吐瀉不渴引衣自蓋踡臥沉重或手指甲唇青或口吐涎沫或至無脈或脈來沉遲而無力者宜用熟附子乾薑人參甘草白朮肉桂陳皮五味子茯苓半夏或嘔吐涎沫或有小腹痛加鹽炒茱萸無脈者加豬膽汁一匙水二鍾姜三片煎之臨服入麝香三釐調服中病以手足溫和即止不得多服多則反加別病矣六書案麝香不可用撮要去茯苓半夏回陽反本湯治陰盛格陽陰極發躁微渴面赤欲坐臥於泥水井中脈來無力或脈全無欲絕者宜用熟附子乾薑甘草人參麥門冬五味子臘茶陳皮面戴陽者下虛也加蔥七莖黃連少許用澄清泥漿水一鍾煎之臨服入蜜五匙頓冷服之取汗為效六書撮要去臘茶陳皮加肉桂茯苓童便六書案如此二方殆喻氏所謂加增藥味和合成湯反牽制其雄入之勢者也錄以備緩證云昔海昌劉默齋醫張學師三陰中寒厥冷自汗煩躁脈微而用附子理中倍加人參臨服和童便一鍾與服即得安睡諸證霍然思此則龍潭方公所謂童便能使陰與陽合血氣和平可味本草匯言六味回陽飲治陰陽將脫等證人參一二兩或數錢製附子二三錢炮乾薑二三錢炙甘草一錢熟地五錢或一兩當歸身三錢如泄瀉者或血動者以冬朮易之多多益善水二鍾武火煎七八分溫服景岳參附養營湯原治因下痞滿其說稍屬曖昧今不敢錄當歸一錢白芍一錢生地三錢人參一錢附子炮一錢乾薑炒一錢照常煎服溫疫論舒氏曰大下之後而證見目瞑倦臥少氣懶言者真陽暴虛元氣虧損也法主熟附人參以回其陽而補其氣必不可兼養其營蓋陽不能從陰陰愈長而陽愈消也此法殊覺不合案此說似有理然少陰證其人血液素虧者或不得不從兼養蓋此方與上方要是一類者爾治傷寒陰證脫陽或因大吐大瀉之後四肢逆冷元氣不接不醒人事或傷寒新瘥誤與婦人交其證小腹緊痛外腎搐縮面黑氣喘冷汗自出亦是脫陽證須臾不治即不救蔥白炒令熱熨臍下次用附子一個重七錢者銼作八片白朮兩半乾薑半兩木香一錢上各銼碎用水兩碗煎至八分去滓放冷灌與服須臾又進一服兩服滓再作一服家寶得效名大固陽湯熨法治氣虛陽脫體冷無脈氣息欲絕不省人及傷寒陰厥百藥不效者蔥熨法蔥以索纏如盞許大切去根及葉惟存白長二寸許如大餅餤先以火脅一面令通熱又勿令灼人乃以熱處搭病人臍連臍下其上以熨斗滿貯火熨之令蔥餅中熱氣郁入肌肉中須預作三四餅一餅壞不可熨又易一餅良久病人當漸醒手足溫有汗即瘥更服四逆湯輩溫其體館本作內萬萬無憂予伯兄忽病傷寒瞑寂館本作冥昧不知人八日四體堅冷如石藥不可復入用此遂瘥集賢校理胡完夫用此方拯人之危不可勝數蘇沈易簡灸丹田氣海仍用此法六書先用麝香半分填於臍中後放蔥餅臍上以火熨之連換二三餅稍醒灌入生薑汁煎服回陽救急湯如不醒再灸關元氣海二三十壯使熱氣通其內逼邪出於外以復陽氣如用此法手足溫和汗出便醒者為有生也如用此法手足不溫汗不出不省人事者必死也略例云蔥熨法莫若用釅醋拌麩炒熱注布袋中蒸熨比上法尤速熨法治三陰中寒一切虛冷厥逆嘔噦陰盛陽虛之證及陰毒傷寒四肢厥冷臍腹痛咽喉疼嘔吐下利身背強自汗脈沉細或唇青面黑諸虛冷證皆宜用肥蔥細切銼麥麩各三大片滄鹽二兩上三件入水一大盞同和拌勻濕分作二次於鐺鍋內同炒極熱用重絹縫作二包囊裹熨病人臍周下連陰部前後兩股陰間往來不住熨之一包將冷更易一包蔥包既冷再用鹽水拌濕炒焦熱依前用之至煤爛不用取蔥麩日夜不住相續之至身體溫熱脈壯陽氣復來而正守氣養之和之端效若臍下冷結不可便熨冷氣攻心腹必死須先用藥溫之久而可熨凡臍下冷結成關陰大小便不通服藥雖多不見效以炒鹽熨臍下須臾即通然關陰已服巴豆甘遂大黃輕粉之類太多即暴通利而損人尤宜詳之也總病戰汗證當參少陽篇蓋戰汗諸證俱為病將解之候難隸之兼變中仍排出之余嘗治一衰翁年逾七旬陡患傷寒初起即用溫補調理至十日之外正氣將復忽爾作戰自旦至辰不能得汗寒慄危甚告急於余余用六味回陽飲入人參一兩姜附各三錢使之煎服下咽少頃即大汗如浴時將及午而浸汗不收身冷如脫鼻息幾無復以告余余令以前藥復煎與之告者曰先服此藥已大汗不堪今又服此尚堪大汗乎余笑謂曰此中有神非爾所知也急令再進遂汗收神復不旬日而起矣嗚呼發汗用此而收汗復用此無怪乎人之疑之也而不知汗之出與汗之收皆元氣為之樞機耳故余紀此欲人知闔闢之權不在乎能放能收而在乎所以主之者景岳厥陰病證候嘗見厥陰消渴數證舌盡紅赤厥冷脈微渴甚服白虎黃連等湯皆不救張卿子集註有一種戴陽證兩顴淺紅紅必遊移無定或煩躁發狂欲坐臥泥水中渴欲飲水復不能飲大便自利或秘結小便清白或淡黃咽喉或痛或不痛脈沉遲而微細肌表雖熱重按之則不熱甚者其冷透手此陰盛格陽也又有面紅煩躁遍舌生瘡生刺舌斂縮如荔枝狀或痰涎湧盛喘急小便頻數口乾引飲兩唇焦裂喉間如煙火上攻兩足心如烙脈洪大而數無倫按之有力亦有按之微弱者捫其身烙手此腎虛火不歸經素問所謂脈從病反者也俱用大劑八味飲吞生脈散人參熟地可用至二三兩附子可用至三五錢如認作白虎立死西塘感症四明心法同云大劑八味飲或參附湯人參熟地可用至一二兩附子可用至三五錢案此條所說不是上熱下寒然亦非真寒假熱猶是厥陰類證故拈於茲又案活人有陰盛格陽條證治不晰今不錄出治驗內子王病傷寒乃陰隔陽面赤足冷而下痢躁擾不得眠論者有主寒主溫之不一不能決翁以紫雪匱理中丸進徐以水漬甘草乾薑湯飲之愈且告之曰下痢足踡四逆證也苟用常法則上焦之熱彌甚今以紫雪折之徐引辛甘以溫里此熱因寒用也聞者皆歎服醫史滄洲翁傳案此治法本出醫說見後卷婦人中或問陰證傷寒用附子湯冷服何也蓋陰極於下陽浮在上之治法也予曾治一人傷寒十餘日脈息沉細手溫而足冷大便不通面赤嘔吐煩渴藥不能下惟喜涼水二三口或西瓜一二塊食下良久而復吐出此陰寒於內逼其浮陽失守之火聚於胸中上衝咽嗌故為面赤嘔煩也遂用附子大者一個以生薑自然汁和白麵包裹煨熟去面取附子去皮臍切作八片又以人參三錢乾薑炮二錢水二鍾煎取一鍾浸於冷水中待藥冷與之即愈此良法也按內經曰若調寒熱之逆冷熱必行則熱藥冷服下嗌之後冷體既消熱性則發由是病氣隨愈嘔煩皆除情且不違而致大益此之謂也蘊要案此等證治與前篇陰似陽相發當參看乾薑芩連人參湯變諸方益元湯治有患身熱頭疼全無不煩便作燥悶面赤飲水不得入口庸醫不識呼為熱證而用涼藥誤死者多矣殊不知元氣虛弱是無根虛火泛上名曰戴陽證熟附甘草乾薑人參五味麥門冬黃連知母蔥艾水二鍾姜一片棗二枚煎之臨服槌法入童便三匙頓冷服六書撮要孫氏集效方並去蔥加芍藥名復元湯案本方今人多用治少陰渴燥者緒論亦云此究不出白通豬膽通脈四逆之成則也然實是治寒熱錯雜之劑連理湯治下利而渴者主證按要訣錄即理中湯加茯苓黃連證治類方案此亦為上熱下冷設仍列於茲
