body:
  text: 卷五陽明病陽證似陰諸候手足逆冷而大便祕小便赤或大便黑色脈沉而滑此名陽證似陰也重陽必陰重陰必陽寒暑之變也假令手足逆冷而大便祕小便赤或大便黑色其脈沉而滑者皆陽證也輕者白虎湯重者承氣湯活人病人面紅舌白狂言渴欲飲冷內煩躁擾六脈浮數陽證瞭然卻有面不紅而不甚語言微有燥渴而嗜臥不煩身體微厥六脈微細若陰證俱備而不然者面雖不紅不甚言語問答之間精神面色蘊而不散雖不甚渴卻自喜冷昏睡力喚之精神自定身雖微厥手足指尖反常溫暖脈雖微按之實數初無間斷若小腹堅硬大便數日不通胸中痞悶以手按之則疼此因失下陽證如陰諦矣經曰三陰其反如何曰脈至而從按之鼓甚而盛也此陰中伏陽之脈正合此也永類夫陽證似陰者乃火極似水也蓋傷寒熱甚失於汗下陽氣亢極鬱伏於內反見勝己之化於外故身寒逆冷神氣昏昏狀若陰症也大抵唇焦口燥能飲水大便祕硬小便赤澀設有稀糞水利出者此內有燥屎結聚乃傍流之物非冷利也再審有屁極臭者是也其脈雖沉按之必滑有力或時躁熱不欲衣被或揚手擲足或譫語有力此陽症也蓋此與陽盛拒陰亦同王太僕所謂病人身寒厥冷其脈滑數按之鼓擊於指下者非寒也此名陽盛拒陰也要在審詳而已蘊要案至真要大論云帝曰諸陰之反其脈何如岐伯曰脈至而從按之鼓甚而感也次注云形證是寒按之而脈氣鼓擊於手下盛者此為熱盛拒陰而生病非寒也傷寒外編云病在三陰皆有下利腹痛厥逆躁渴但屬於陽者必先發熱頭痛漸至唇乾舌燥煩渴喜冷飲面色光彩語言清亮手足溫暖爪甲紅潤身極易於轉側呼吸出於自然小便或赤或澀脈來浮洪數大此陽證也至四五日後傳進三陰血分變出四肢厥冷乍溫或燥結或下利躁渴潮熱自汗讝妄揚手擲足氣息喘急小腹痛不可按舌上胎厚而黃黑甚則芒刺燥裂脈沉而滑皆三陽傳變之熱證其或身寒逆冷神氣昏昏脈來沉實附骨乃火極似水緣陽邪失於汗下所致雖身冷而不欲近衣雖神昏而氣色光潤雖腹痛必脹滿而喘急不可按揉下利傍流清水小便黃赤大便或祕或黑厥逆亦不過肘膝厥過即發熱厥深熱亦深也此為陽極似陰不可誤認為寒而溫之緒論案傷寒外編明呂復著又以上三説大略相同然詳略互見故並存之次卷陰證似陽條亦同脈沉而細或緩而長來遲去疾或六脈伏如脫狀口反不渴舌燥而短身反不熱手足反厥神昏讝語口目瞤動如驚風狀大便時解或如爛桃色或如清水或不大便人事不知或歌或哭身輕能自起立或吐蛔口苦或辣小便赤而長此假虛寒也宜芩連石膏之類甚則大承氣下之直解凡陰厥手足厥冷或冷過肘膝甚至手足指甲皆青黑劇則遍身冰冷如石血凝青紫成片或六脈無力或脈微欲絶以上脈證悉見純陰猶以為陽證何也及審內證氣噴如火齦爛口臭煩渴譫語口燥舌乾舌胎黃黑或生芒刺心腹痞滿小腹疼痛小便赤色涓滴作痛非大便燥結即大腸膠閉非協熱下利即熱結傍流以上內三焦悉見陽證所以為陽厥也粗工不察內多下證但見表證脈體純陰誤投溫劑禍不旋踵捷要辨法凡陽證似陰外寒而內必熱故小便血赤凡陰證似陽者格陽之證也上熱下寒故小便清白但以小便赤白為據以此推之萬不失一溫疫論案類編云以小便赤白定陰陽第語其常耳陰症亦有小便黃赤者此説本於要訣既見第二卷中陽極似陰厥逆自利等證但須審先前曾發熱頭痛至四五日或數日而見厥利者皆陽邪亢極厥深熱深之證急當清理其內誤與溫藥必死但清之有方須知陽極似陰之證其人根氣必虛即與救熱存陰須防熱去寒起間有發汗太過而成亡陽之候亦有攻下太過而陰陽俱脫者不妨稍用溫補然脫去陽回即當易轍不可過劑以耗其津況此證與真陰受病不同醫通白虎湯變治驗並方錢仲昭患時氣外感三五日發熱頭疼服表汗藥疼止熱不清口乾唇裂因而下之遍身紅癍神昏譫語食飲不入大便復祕小便熱赤脈見緊小而急謂曰此症全因誤治陽明胃經表裡不清邪熱在內如火爍原津液盡干以故神昏譫妄若癍轉紫黑即刻死矣目今本是難救但其面色不枯聲音尚朗乃平日保養腎水有餘如旱田之側有下泉未竭故神雖昏亂而小水仍通乃陰氣未絶之徵尚可治之不用表裡單單但一和法取七方中小方而氣味甘寒者用之惟如神白虎湯一方足以療此蓋中州元氣已離大劑急劑復劑俱不敢用而虛熱內熾必甘寒氣味方可和之耳但方雖宜小而服藥則宜頻如飢人本欲得食不得不漸漸與之必一晝夜頻進五七劑為浸灌之法庶幾邪熱以漸而解元氣以漸而生也若小其劑復曠其日縱用藥得當亦無及矣如法治之更一晝夜而病者熱退神清脈和食進其癍自化寓意草四明虞吉卿因三十外出疹不忌豬肉兼之好飲作泄八載矣忽患傷寒頭痛如裂滿面發赤舌生黑胎煩躁口渴時發譫語兩眼不合者七日洞泄如注較前益無度余急往診其脈洪大而數為疏竹葉石膏湯方因其有腹瀉之病石膏止用一兩病初不減此兄素不謹良一友疑其虛也云宜用肉桂附子斂之以其言來告余曰誠有是理但余前者按脈似非此證豈不數日脈頓變耶復往視其脈仍洪大而數余曰此時一投桂附即發狂登屋必不救矣一照前方但加石膏至二兩斂之曰得毋與泄瀉有妨乎余曰熱邪作崇此客病也不治立殆渠泄瀉已八年非暴病也治病須先太甚急治其邪徐並其夙恙除之急進一劑夜臥遂安即省人事再劑而前惡證頓去不數劑霍然但瀉未止耳余為疏脾腎雙補丸方更加黃連乾葛升麻以痧痢法治之不一月瀉竟止八載沉疴一旦若失廣筆記深師療傷寒下後除熱止渴五味麥門冬湯方麥門冬去心五味子人參甘草炙石膏碎各一兩上五味搗篩三指撮水一升二合煮令沸得四合盡服忌海藻菘菜外臺六書如神白虎湯治身熱渴而有汗不解或經汗過渴不解脈來微洪於本方加知母山梔槌法加淡竹葉治傷寒已汗下後餘熱未退頭痛口乾煩躁宜服知母散方知母一兩甘草半兩石膏二兩栝蔞根二兩麥門冬一兩上件藥搗篩為散每服四錢以水一中盞入生薑半分粳米五十粒竹葉二七片煎至六分去滓不計時候溫服聖惠應下脈證治傷寒欲下之切其脈牢牢實之脈或不能悉解宜摸視手掌濈濈汗濕者便可下矣若掌不汗病雖宜下且當消息溫暖身體都皆津液通掌亦自汗下之即了矣巢源脈朝夕駃者實癖也可下之朝平夕駃者非癖也案此本出千金不可下駃者謂數脈六七至者也若脈數一息八九至慎不可下若下之則煩躁下利不止而死凡數脈與皮毛相得亦不可下也若下證悉見而見四逆者是失下後氣血不通便然但手足微厥掌心常溫時復指梢溫便下之不可拘忌也活人云大抵熱厥須脈沉伏而滑頭上有汗其手雖冷時復指爪溫須便用承氣下之不可拘忌也當參第四卷厥條凡下症小便不利或尚少未可攻之也總病不惡寒反惡熱手掌心並腋下濈濈汗出胃中乾涸燥糞結聚潮熱大便硬小便如常腹滿而喘或譫語脈沉而滑者里證也里證者此屬陽明也宜下之傷寒始發熱惡寒今汗後不惡寒但倍發熱而躁始脈浮大今脈洪實或沉細數案沉細數恐非應下之診考朱氏此語本之素問次注引正理傷寒論又總病云或汗後脈雖遲按之有力活人又云脈浮滑而數蓋總病最為親切始惺靜今狂語此為胃實陽盛再汗即死須下之即愈亦有始得病便變陽盛之證須便下之不可拘以日數更有心胸連臍腹大段疰悶腹中疼坐臥不安冒悶喘急極者亦不候他證便下之活人案此本於總病殊為明約大抵下藥必切脈沉實或沉滑沉疾有力者可下之也再以手按臍腹硬者或叫痛不可按者則下之無疑也凡下後不解者再按臍腹有無硬處若有硬處手不可按下不盡也須再下之蘊要凡瘟疫宜下者必陽明邪實於腑而祕結腹滿或元氣素強胃氣素實者方可下若大便雖數日不行而腹無脹滿及大便無壅滯不通之狀或連日不食而臍腹坦然軟而無疑此陽明胃腑本無實邪切不可妄下以泄中氣説疫溫疫伏邪傳入胃中水穀得疫邪而蒸熱疫邪附水穀而熾盛上薰三陽而陽經之證漸生下陷三陰而攻下之證又現熱傷血分或畜血或斑疹熱瘀水道或溺閉或發黃熱傷神氣則譫語狂亂熱傷津液則燥渴便硬蜂起變症皆因胃中疫熱而然故善治者宜急清其胃中之熱胃熱一清諸症悉愈如釜底無薪沸自不作不煩揚湯之誚也傷寒翼案此云上薰三陽蓋謂自汗惡熱等證下陷三陰即是邪實於裡者舌白胎漸變黃胎邪在膜原舌上白胎邪在胃家舌上黃胎胎老變為沉香色也白胎未可下黃胎宜下舌黑胎邪毒在胃薰騰於上而生黑胎有黃胎老而變焦色者有津液潤澤作軟黑胎者舌上乾燥作硬黑胎者下後二三日黑皮自脫只有一種舌俱黑而無胎此經氣非下證也妊娠多見此陰證亦有此並非下證下后里證去舌尚黑者胎皮未脫也不可再下務在有下證方可下舌上無胎況無下證誤下舌反見離離黑色者危急宜補之舌芒刺熱傷津液此疫毒之最重者急當下老人微疫無下證舌上乾燥易生胎刺用生脈散生津潤燥芒刺自去舌裂日久失下血液枯極多有此證又熱結傍流日久不治在下則津液消亡在上則邪火毒熾亦有此證急下之裂自滿舌短舌硬舌卷皆邪氣勝真氣虧急下之邪毒去真氣同舌自舒白砂胎舌上白胎乾硬如砂皮一名水晶胎乃自白胎之時津液乾燥邪雖入胃不能變黃宜急下之唇燥裂唇焦色唇口皮起口臭鼻扎如煙煤胃家熱多有此證固當下唇口皮起仍用別證互較鼻孔煤黑疫毒在胃下之無辭口燥渴更有下證者宜下之下後邪去胃和渴自減目赤咽乾氣噴如火小便赤黑涓滴作痛小便極臭揚手擲足脈沉而數皆為內熱之極下之無辭潮熱邪在胃有此證宜下然又有不可下者詳載似里非里熱入血室神虛譫語三條之下善太息胃家實呼吸不利胸膈痞悶每欲引氣下行故然心下滿心下高起如塊心下痛腹脹滿腹痛按之愈痛心下脹痛以上皆胃家邪實內結氣閉宜下之氣通則已頭脹痛胃家實氣不下降下之頭痛立止若初起頭痛別無下證未可下小便閉大便不通氣結不舒大便行小便立解誤服行氣利水藥無益大便閉轉屎氣極臭更有下證下之無辭有血液枯竭者無表裡證為虛燥宜蜜煎導及膽導大腸膠閉協熱下利熱結傍流並宜下四逆脈厥體厥並屬氣閉陽氣鬱內不能四布於外胃家實也宜下之下後反見此證者為虛脫宜補發狂胃家實陽氣盛也宜下之有虛煩似狂有因欲汗作狂並忌下以上溫疫論大便閉結者疫邪傳裡內熱壅鬱宿糞不行蒸而為結漸至梗硬下之結糞一行瘀熱自除諸證悉去熱結傍流者類編曰熱邪將糞結住不能下糞旁止能流下臭水並所進湯藥此句當如是講以胃家熱內熱壅閉先大便閉結續得下利純臭水全然無糞日三四度或十數度宜大承氣湯得結糞而利立止服湯不得結糞仍下利臭水及所進湯藥因大腸邪勝失其傳送之職知邪猶在也病必不減宜下之大腸膠閉者其人平素大便不實設遇疫邪傳裡但蒸作極臭沕然如黏膠至死不結但愈蒸愈閉以致胃氣不能下行疫毒無路而出不下即死但得黏膠一去下證自除霍然而起同上原更有協熱下利證殊欠明瞭不録溫疫得里證神色不敗言動自如別無怪證忽然六脈微如絲細而軟甚至於無或兩手俱無或一手先伏察其人不應有此脈今有此脈者皆緣應下失下內結壅閉營氣伏於內不能達於四末此脈厥也亦多有過用黃連石膏諸寒之劑強遏其熱致邪愈結脈愈不行醫見脈微欲絶以為陽證得陰脈為不治委而棄之以此誤人甚衆若更用人參生脈散輩禍不旋踵宜承氣緩緩下之六脈自復同上案直格云脈須疾數以其極熱畜甚而脈道不利以致脈沉細而欲絶者脈厥也吳氏蓋本於此急證急攻溫疫發熱一二日舌上白胎如積粉早服達原飲一劑午前舌變黃色隨現胸膈滿痛大渴煩躁此伏邪即潰邪毒傳胃也前方加大黃下之以上治法不確煩渴少減熱去六七午後復加煩躁發熱通舌變黑生刺鼻如煙煤此邪毒最重復瘀到胃急投大承氣湯傍晚大下至夜半熱退次早鼻黑胎刺如失此一日之間而有三變數日之法一日行之因其毒甚傳變亦速用藥不得不緊設此證不服藥或投緩劑羈遲二三日必死設不死服藥亦無及矣當見溫疫二三日即斃者乃其類也溫疫論因證數攻古人皆云三下之熱未退即死矣亦有按法以下四五次利一二行宣明作一二十行心要作十數行熱方退而得活者免致不下退其熱而必死也下後熱稍退而未愈者黃連解毒湯調之或微熱未除者涼膈散調之或失下熱極以致身冷脈微而昏冒將死者若急下之則殘陰暴絶而死蓋陽氣後竭而然也不下亦死宜涼膈散或黃連解毒湯養陰退陽畜熱漸以宣數則心胸復暖脈漸以生至於脈復而有力方可以三一承氣湯下之直格溫疫下後二三日或一二日舌上覆生胎刺邪未盡也再下之胎刺雖未去已無鋒芒而軟然熱渴未除更下之熱渴減胎刺脫日後更復熱又生胎刺更宜下之餘里周因之者患疫月餘胎刺凡三換計服大黃二十兩始得熱不復作其餘脈證方退也所以凡下不以數計有是證則投是藥醫家見理不透經歷未到中道生疑往往遇此證反致擔閣但其中有間日一下者有應連下三四日者有應連下二日間一日者其中寬緩之間有應用柴胡清燥湯者有應用犀角地黃湯者至投承氣某日應多與某日應少與其間不能得法亦足以誤事此非以言傳貴乎臨時斟酌溫疫論更附一按録於後治驗中疫邪乘於胃而漸下蒸熱水穀或為硬糞或為臭穢一次下之邪不能盡故下之有至再至三之道但連下之故一因下後復熱下症不減而再下之三承氣湯選用一因下後元氣虛弱不敢峻下惟用熟大黃錢許加各證藥中以和之此微下法也一因下後虛脫下症又急即於補藥中以下之此補下兼施法一因腸胃乾枯燥糞黏結而用滋補潤下之品間服以和之結開燥潤為止此間下法也傷寒翼治驗有人病傷寒八九日身熱無汗時時譫語時因下利大便不通三日矣非煩非躁非寒非痛終夜不得臥但心中無曉會處或時發一聲如嘆息之狀醫者不曉是何證豫診之曰此懊憹怫鬱二證俱作也胃中有燥屎宜承氣湯下燥屎二十餘枚得利而解仲景云陽明病下之心中懊憹微煩胃中有燥屎者可攻又云病者小便不利大便乍難乍易時有微熱怫鬱不得臥者有燥屎也承氣湯主之素問云胃不和則臥不安此夜所以不得眠也仲景云胃中燥大便堅者必譫語此所以有時譫語也非躁非煩非寒非痛所謂心中懊憹也聲如嘆息而時發一聲所謂外氣怫鬱也燥屎得除大便通利胃中安和故其病悉去也本事案此云外氣怫鬱其義不瑩真定府趙吉夫約年三旬有餘至元丙寅五月間因勞役飲食失節傷損脾胃時發煩躁而渴又食冷物過度遂病身體困倦頭痛四肢逆冷嘔吐而心下痞醫者不審見其四肢逆冷嘔吐心下痞乃用桂末三錢匕熱酒調服仍以綿衣裹之作陰毒傷寒治之海受汗大出汗後即添口乾舌澀眼白睛紅項強硬肢體不柔和小便淋赤大便祕澀循衣摸床如發狂狀問之則言語錯亂視其舌則赤而欲裂朝輕暮劇凡七八日家人輩自謂危殆不望生全鄰人吉仲元舉豫治之診其脈六七至知其熱證明矣遂用大承氣湯苦辛大寒之劑一兩作一服服之利下三行折其勝勢翌日以黃連解毒湯大苦寒之劑二兩使徐徐服之以去餘熱三日後病十分中減之五六更與白虎加人參湯約半斤服之瀉熱補氣前證皆是戒以慎起居節飲食月餘漸得平復寶鑑案此下後之治似難法王叔雨寓錢唐病傷寒他醫至皆以為虛證常進附子持論未決其弟熙暘謁攖寧生曰舍兄病亟惟幾生忍坐視不救乎至切其脈兩手皆沉實而滑四末覺微青以燈燭之遍體皆赤斑舌上胎黑而燥如芒刺身大熱神恍惚多譫妄語攖寧生曰此始以表不得解邪氣入里裡熱極甚若投附必死乃以小柴胡湯益以知母石膏飲之終夕三進次日以大承氣湯下之調治兼旬乃安醫史東陽戚十八四月間得傷寒證惡寒發大熱而渴舌上白胎三日前身脊百節俱痛至第四日惟脅痛而嘔自利六日來召豫治診其脈左右手皆弦長而沉實且數甚豫曰此本三陽合病今太陽已罷而少陽與陽明仍在與小柴胡合黃連解毒服三服脅痛嘔逆皆除惟熱猶甚九日後漸加氣築痰響聲如拽鋸出大汗退後而身復熱愈甚法當死看其面上有紅色潔淨而無賊邪之氣言語清亮間有譫語而不甚含糊豫故不辭去而復與治用涼膈散倍大黃服二服視其所下仍如前自利清水其痰氣亦不息與大承氣湯合黃連解毒湯二服其所下亦如前豫曰此蓋熱結不開而燥屎不來耳後以二方相間日三四服每藥又各服至五貼始得結糞如肥皂子大者十數枚痰氣漸平熱漸減至十五日熱退氣和而愈正傳社友韓茂遠傷寒九日以來口不能言目不能視體不能動四肢俱冷衆皆曰陰證比豫診之六脈皆無以手按腹兩手護之眉皺作楚按其趺陽大而有力乃知腹有燥屎也欲與大承氣湯病家惶懼不敢進余曰吾郡能辨是證者惟施笠澤耳延至診之與余言若合符節遂下之得燥屎六七枚口能言體能動矣故按手不及足者何以救此垂絶之證耳必讀一婦人患傷寒十餘日手足躁擾口目瞤動面白身冷讝語發狂不知人事勢甚危篤其家以為風縛其手足或以為痰迷心竅或以為虛或以為寒或辭不起延豫診治切其脈全無問其證不知按其身不熱豫曰此證非是人參附子證即是大黃芒消證出此入彼死生立判因坐視良久聆其聲重而且長豫曰若是虛寒證到脈脫之時氣息沉沉將絶那得有如許氣力大呼疾聲久而不絶即作大承氣湯牙關緊閉穵開去齒藥始下咽黃昏即解黑糞半床次早脈出身熱人事亦知舌能伸出而黑又服小陷胸湯二劑而愈直解案小陷胸湯不妥朱海疇者年四十五歲患疫得下證四肢不舉身臥如塑目閉口張舌上胎刺問其所苦不能答因問其子兩三日所服何藥云進承氣湯三劑每劑投大黃兩許不效更無他策惟待日而已但不忍坐視更祈一診余診得脈尚有神下語悉具藥淺病深也先投大黃一兩五錢目有時而少動再投舌刺無芒口漸開能言三劑舌胎少去神思稍爽四日服柴胡清燥湯五日復生芒刺煩熱又加再下之七日又投承氣養營湯熱少退八日仍用大承氣肢體自能少動計半月共服大黃十二兩而愈又數日始進糜粥調理兩月平復凡治千人所遇此等不過三四人而已姑存案以備參酌耳溫疫論兼蓄血治驗來熙庵憲急召診乃侄方丈身體豐碩傷寒已二十八日人事不省不能言事手足揚擲腹脹如鼓而熱烙手目赤氣粗齒稿舌黑參附石膏硝黃芩連無不服諸名公巳言施矣診之脈濁鼓手用大黃一兩佐以血藥一劑下黑臭血一二斗少蘇四劑始清熙庵公問豫侄昏三日所存唯一息耳君何用劑且大且多幸遂生全何説何見豫曰治病用藥譬之飲酒滄海之量與之涓滴則唇喉轉燥矣顧若大軀殼病邪甚深不十倍其藥何效可克且此恙寒邪入胃畜血在中其昏沈揚擲是喜忘如狂之深者也不知為病而望之為死不棄之乎蓋大黃未嘗不用而投非其時品劑輕小不應則惑矣寧放膽哉芝園存案吾家有畤宗者三月病熱豫與仲遠同往視之身壯熱而讝語胎刺滿口穢氣逼人少腹硬滿大便閉小便短脈實大而遲仲遠謂熱結在裡其人發狂少腹硬滿胃實而兼蓄血也法以救胃為急但此人年已六旬證兼蓄血下藥中宜重加生地黃一以保護元陰一以破瘀行血豫然其言主大承氣湯消黃各用八錢加生地一兩搗如泥先炊數十沸乃納諸藥同煎連進五劑得大下數次人事貼然少進米飲一二口輒不食呼之不就欲言不言但見舌胎乾燥異常口內噴熱如火則知裡熱尚未衰減復用犀角地黃湯加大黃三劑又下膠滯二次色如敗醬臭惡無狀於是口臭乃除里燥仍盛三四日無小便忽自取夜壺小便一回豫令其子取出視之半壺鮮血觀者駭然經言血自下下者愈亦生地之功也復診之脈轉浮矣此潰邪有向表之機合以柴胡湯迎其機而導之但此時表裡俱還熱極陰津所存無幾柴胡亦非所宜惟宜白虎湯加生地黃芩以救里倍用石膏之質重氣輕專達肌表而兼解外也如是二劑得微汗而脈靜身涼舌胎退而人事清矣再用清燥養營湯二十劑而全愈舒氏白虎加地芩不妥挾虛證治病有先虛後實者宜先補而後瀉先實而後虛者宜先瀉而後補假令先虛後實者或因他病先虧或因年高血弱或因先有內傷勞倦或因新虛下血過多或舊有吐血及崩漏之證時疫將發即觸動舊疾或吐血或崩漏以致亡血過多然後疫氣漸漸加重以上並宜先補而後瀉瀉者謂疏導之劑並承氣下藥概而言之也凡遇先虛後實者此萬不得巳而投補劑一二貼後虛證少退便宜治疫若補劑連進必助疫邪禍害隨至假令先實而後虛者疫邪應下失下血液為熱搏盡原邪尚在宜急下之類編曰此虛乃因失下血液搏盡之虛非同平日虛怯之虛邪退六七急宜補之虛回五六慎勿再補多服則前邪復起下後畢竟加添虛證者方補若以意揣度其虛不加虛證誤用補劑貽害不少溫疫論病有純虛純實非補即瀉何有乘除設遇既虛且實者補瀉間用當詳孰先孰後從多從少可緩可急隨其證而調之吳江沈青來正少寡素多鬱怒而有吐血證歲三四發吐後即已無有他證蓋不以為事也三月間別無他故忽有小發熱頭疼身痛不惡寒而微渴若惡寒不渴者乃感冒風寒今不惡寒微渴者疫也至第二日舊證大發吐血倍常更加眩暈手振煩躁種種虛躁飲食不進且熱漸加重醫者病者但見吐血以為舊證復發不知其為疫也故以發熱認為陰虛頭疼身痛認為血虛不察未吐血前一日已有前證非吐血後所加之證也諸醫議補問豫可否余曰失血補虛權宜則可蓋吐血者內有結血正血不歸經所以吐也結血牢固豈能吐乎能去其結於中無阻血自歸經方冀不發若吐後專補內則血滿既滿不歸血從上溢也設用寒涼尤誤投補劑者只顧目前之虛用參暫效不能拔去病根日後又發也況又兼疫今非昔比今因疫而發血脫為虛邪在為實是虛中有實如投補劑始則以實填虛沾其補益既而以實填實災害並至於是暫用人參二錢以茯苓歸芍佐之兩劑後虛證咸退熱減六七醫者病者皆謂用參得效均欲速進余禁之不止乃恣意續進便覺心胸煩悶腹中不和若有積氣求噦不得此氣不時上升便欲作嘔心下難過遍體不舒終夜不寐喜按摩捶擊此皆外加有餘之變證也所以然者止有三分之疫只應三分之熱適有七分之虛經絡枯澀陽氣內陷故有十分之熱分而言之其間是三分實熱七分虛熱也向則本氣空虛不與邪搏故無有餘之證但虛不任邪惟懊憹鬱冒眩暈而已今投補劑是以虛證減去熱減六七所餘三分之熱者實熱也乃是病邪所致斷非人參可除者今再服之反助疫邪邪正相搏故加有餘之變證因少與承氣微利之而愈按此病設不用利藥宜靜養數日亦愈以其人大便一二日一解則知胃氣通行邪氣在內日從胃氣下趨故自愈間有大便自調而不愈者內有灣糞隱曲不得下下得宿糞極臭者病治愈設邪未去恣意投參病乃益固日久不除醫見形體漸瘦便指為怯證愈補愈危死者多矣同上時疫坐臥不安手足不定臥未穩則起坐才著坐即亂走才抽身又欲臥無有寧刻或循衣摸床撮空捻指師至才診脈將手縮去六脈不甚顯尺脈不至此平時斷喪根源虧損因不勝其邪元氣不能主持故煩躁不寧固非狂證其危有甚於狂也法當大補然有急下者或下後厥回尺脈至煩躁少定此因邪氣少退正氣暫復微陽少伸也不二時邪氣復聚前證復起勿以前下得效今再下之速死急宜峻補補不及者死此證表裡無大熱下證不備者庶幾可生闢如城郭空虛雖殘寇而能直入戰不可守不可其危可知同上治陰證以救陽為主治傷寒以救陰為主傷寒蓋謂陽證傷寒縱有陽虛當治必看其人血肉充盛陰分可受陽藥者方可回陽若面色黧黑原作面黧舌黑今從緒論身如枯柴一團邪火內燔者則陰已先盡何陽可回而敢助陽劫陰乎寓意草瘟疫其氣弱而感淺者固宜微汗微下或氣強而感深者非大汗大下邪何由去正何由復必至纏綿不休而死又謂有當從補治者用解毒丸散氣虛而用四君子湯送血虛而用四物湯送大非也蓋疫癘之氣其毒最為酷烈觸傷元氣日深一日即藥專力竭才尤懼弗勝況以半解半補之劑治之吾恐正氣欲補而未獲補邪氣不欲補而先受補邪得補而愈熾病日增加矣即不加甚定增纏擾誠為無益而又害之也故與其一劑之中用解而又用補孰若一二劑之內即解而旋即補使藥力精專而邪氣頓除除後或即平補或即峻補任我而施為也何畏首畏尾之若是乎古人朝用附子暮用大黃自非神聖其孰能與於斯會解失下致虛證治證本應下耽閣失治或為緩藥羈遲火邪壅閉耗氣搏血精神殆盡邪火獨存以致循衣摸床撮空理線筋惕肉瞤肢體振戰目中不了了皆緣應下失下之咎邪熱一毫未除元神將脫補之則邪毒愈甚攻之則幾微之氣不勝其攻攻不可補不可補瀉不及兩無生理不得已勉用陶氏黃龍湯此證下亦死不下亦死與其坐以待斃莫如含藥而亡或有回生於萬一者按前證實為庸書耽閣及今投劑補瀉不及然大虛不補虛何由以回大實不瀉邪何由以去勉用參地以回虛承氣以逐實此補瀉兼施之法也或遇此證純用承氣下證稍減神思稍蘇續得肢體振戰怔忡驚悸心內如人將捕之狀四肢反厥眩暈鬱冒項背強直並前循衣摸床撮空等證此皆大虛之候將危之證也急用人參養營湯虛候少退速可屏去蓋傷寒溫疫俱系客邪為火熱燥證人參固為益元氣之神品偏於益陽有助火固邪之弊當此又非良品也不得而用之溫疫論應下失下真氣虧微及投承氣下咽少頃額上汗出髮根燥癢邪火上炎手足厥冷甚則振戰心煩坐臥不安如狂之狀此中氣素虧不能勝藥名為藥煩凡遇此證急投薑湯即已藥中多加生薑煎服則無此狀矣更宜均兩三次服以防嘔吐不納溫疫論服承氣腹中不行或次日方行或半日仍吐原藥此因病久失下中氣大虧不能運藥名為停藥乃天元幾絶大凶之兆也宜生薑以和藥性或加人參以助胃氣更有邪實病重劑輕亦令不行同上類編云停藥外治用蔥尉法亦頗著效案尉法系景嶽方今録於結胸中用下不宜巴豆丸藥記一鄉人傷寒身熱大便不通煩渴鬱冒醫者用巴豆藥下之雖得溏利病宛然如舊豫觀之陽明熱結在裡非大柴胡承氣等不可巴豆止去積安能蕩滌邪熱蘊毒耶亟投大柴胡等三服得汗而解嘗謂仲景百一十三方為圓者有五理中陷胸抵當烏梅麻仁是以理中陷胸抵當皆大如彈子煮化而服與湯散無異至於麻仁治脾約烏梅治濕𧈟此當改治蛔厥皆用小圓以達下部其他逐邪毒破堅癖導瘀血潤燥屎之類皆憑湯劑未聞用巴豆小丸藥以下邪氣也既下而病不除不免重以大黃朴消下之安能無損也哉本事傷寒時氣瘟病嘗六七日之間不大便心下堅硬腹脅緊滿止可大小承氣湯下之其腸胃積熱慎勿用巴豆杏仁性熱大毒之藥雖用一二丸下之利五七行必反損陰氣涸枯津液燥熱轉增發黃譫語狂走斑毒血泄悶亂輕者為勞復重者或至死間有愈者幸矣不可以為法事親三承氣湯變諸方附導法承氣湯方枳實五枚芒消半升大黃四兩甘草三兩上四味㕮咀以水五升煮取二升去滓適寒溫分三服如人行五里進一服取下利為度若不得利盡服之千金生地黃湯治傷寒有熱虛羸少氣心下滿胃中有宿食大便不利方生地黃三斤大黃四兩甘草一兩芒消二合大棗二十枚上五味合搗令相得蒸五升米下熟絞取汁分再服千金辨注云上銼麻豆大分一半用水一盞半生薑三片煎至六分納硝煎一二沸絞去滓溫服直格案此方既出聖惠名大黃散不用生薑治傷寒未解煩熱口乾腹中有結燥不通劉河間又加甘草以為三一承氣以甘和其中最得仲景之祕也余嘗以大承氣改作調中湯加以薑棗煎之俗見薑棗以為補脾胃而喜服不知其中有大黃芒消也儒門事親成無己云大熱結實者大承氣小熱微結者小承氣以熱不甚大故於大承氣湯內去芒消又以結不至堅故減厚朴枳實也如不至大堅滿邪氣盛而須攻下者亦未可投大承氣湯必以輕緩之劑攻之於大承氣湯中去厚朴枳實加甘草乃輕緩之劑也若大承氣證反用調胃承氣湯治之則邪氣不散小承氣湯證反用大承氣下之則過傷正氣而腹滿不能食故有勿大泄之戒此仲景所以分而治之未嘗越聖人之制度後之學者以此三藥合而為一且云通治三藥之證及無問傷寒雜病內外一切所傷一概治之若依此説與仲景之方甚相違背又失軒岐緩急之旨紅紫亂朱迷惑衆聽一唱百和使病人暗受此弊將何訴哉寶鑑生地黃湯治傷寒有熱虛羸少氣心下滿胃中有宿食大便不利方生地黃三斤大黃四兩甘草一兩芒消二合大棗二十枚上五味合搗令相得蒸五升米下熟絞取汁分再服千金辨注云陰虛人大宜服之六一順氣湯治傷寒熱邪傳裡大便結實口燥咽乾怕熱譫語揭衣狂妄揚手擲足斑黃陽厥潮熱自汗胸腹滿硬繞臍疼痛等證悉皆治之大黃枳實黃芩厚朴甘草柴胡芒消芍藥上先將水二鍾滾三沸後入藥煎至八分槌法臨時服入鐵鏽水三匙調服立效取鐵性沉重之義最能墜熱開結有神六書案原云以代三承氣大柴胡三乙承氣大陷胸等之神劑殊為不法然其方非可棄故録存之黃龍湯原文主治系即承氣證今不敢取當考前失下條大黃芒消枳實厚朴甘草人參當歸年老氣血虛者去芒消水二鍾薑三片棗子二枚煎之六書按溫疫論更於此方後云如人方肉食而病適來以致停積在胃用大小承氣連下惟是臭永稀糞而已於承氣湯中但加人參一味服之雖三四十日所停之完穀及完肉於是方下蓋承氣藉人參之力鼓舞胃氣宿物始動也張氏醫通有用此方案蓋據其説云用人參者藉以資助胃氣行其藥力則大黃輩得以振破敵之功非謂虛而兼補也當知黃龍湯中用參則硝黃之力愈鋭用者不可不慎愚謂是亦不能無其理然胃實者固非此論節庵治一壯年夏間勞役後食冷物夜臥遺精遂發熱痞悶至晚頭額時痛兩足不溫醫不知頭痛為火熱上乘足冷為脾氣不下誤認外感來陰而與五積汗之則煩躁口乾目赤便祕明日便與承氣下之但有黃水身強如痙煩躁轉劇腹脹喘急舌胎黃黑已六七日矣診其脈六七至而弦徑急以黃龍湯下黑物甚多下後腹脹頓覺躁熱頓減但夜間仍熱舌胎未盡更與解毒湯合生脈散加地黃二劑熱除平調月餘而安緒論此案本證不了姑附於此承氣養營湯知母當歸芍藥生地大黃枳實厚朴水薑煎服溫疫論年老虛人傷寒可下者大承氣湯調胃承氣湯皆去硝慢火熬成入玄明粉量輕重而下之元戎若十餘日不大便者服承氣丸大黃杏仁各二兩枳實一兩芒消一兩搗蜜和丸如彈丸和湯六七合服之未通再服肘後辨注云上方即仲景承氣湯與麻仁丸變其制而用之三承氣功效俱在大黃余皆治標之品也不耐湯藥者或嘔或畏當為細末蜜丸湯下溫疫論油灌法倉卒無豬膽與蜜鄉村小民不便只以真麻油口含以竹筒磨光先入穀道中留一半在穀道外口含油一盞用力於竹筒內吹入盡少時大便出極效體仁彙編下後邪氣復聚身熱脈數里證下後脈不浮煩渴減身熱退越四五日復發熱者此非關飲食勞復乃膜原尚有餘邪隱匿因而復發此必然之理不知者每每歸咎於病人誤也宜再下之即愈但當少與慎勿過劑以邪氣微也溫疫論應下之證下後當脈靜身涼今反發熱者此內結開正氣通郁陽暴伸也即如爐中伏火撥開欲焰不久自息此與下後脈反數義同若溫疫將發原當日漸加熱胃尚無邪誤用承氣更加發熱實非承氣使然乃邪氣方張分內之熱也但嫌下早之誤徒傷胃氣耳日後傳胃再當下之又有藥煩者與此懸絶同上應下失下口燥舌乾而渴身反熱減四肢時厥欲得近火壅被此陽氣伏也既下厥回去爐減被脈大而加數舌上生津不思水飲此里邪去郁陽暴伸也宜柴胡清燥湯去花粉知母加葛根隨其性而升泄之此證類近白虎但熱渴既除又非白虎所宜也同上升泄之殊不妥下後諸證下後不解一日半日復熱或下未盡或下後熱邪未除或下後復結或因飲食起居或更冒虛風當詳審以治服下藥不行者藥力不當病勢也更宜大劑下之若誤用承氣不得下後必愈脹以里無熱結徒傷胃氣濕熱痰飲愈逆也有屢用承氣不行改月溫理脾胃藥即行者有下出稀糞色淡不黃不臭者急溫之下出純清水者死下出溏糞者防變溫熱時疫不在此例下如汙泥者死下出衃血及血水者死下出鮮血者危下瘀血如膠黏漆黑臭惡難近者死下之未盡驟用補截復發熱譫語妄亂脈躁不寧或忽大忽小者皆不治緒論神虛譫語奪氣不語應下稽遲血竭氣耗內熱煩渴譫語諸下證具而數下之渴熱並減下證悉去五六日後譫語不止者不可以為實此邪氣去元神未復宜清燥養營湯加辰砂一錢溫疫論時疫下後氣血俱虛神思不清惟向里床睡似寐非寐似寤非寤呼之不應此正氣奪與其服藥不當莫如靜守虛回而神思自清語言漸朗若攻之脈必反數四肢漸厥此虛虛之禍危在旦夕凡見此證表裡無大熱者宜人參養營湯補之能食者自然虛回而前證自除設不食者正氣愈奪虛證轉加法當峻補同上有陽腸證下後熱退脈平而神思恍惚昏昏不知痛癢處不省人事如癡如喑不可謂其為虛妄投補劑只一味參湯或不藥自愈要訣病愈結存下格溫疫下後脈證俱平腹中有塊按之則疼自覺有所阻而膨悶或時有升降之氣往來不利常作蛙聲此邪氣已盡其宿結尚未除也此不可攻攻之徒損元氣氣虛益不能傳送終無補於治結須飲食漸進胃氣稍復津液流通自能潤下也嘗遇病愈後食粥半月結塊方下堅黑如石溫疫論溫疫愈後脈證俱平大便二三旬不行時時作嘔飲食不進雖少與湯水嘔吐愈加此為下格蓋下既不通必返於上設誤認番胃乃與牛黃狗寶及誤作寒氣投藿香丁香二陳之類誤也宜調胃承氣熱服頓下宿結及溏糞黏膠惡物臭不可當者嘔吐立止所謂欲求南風須開北牖是也嘔止慎勿驟補若少與參耆則下焦復閉嘔吐仍作也此與病愈結存倣佛彼則妙在往來蛙聲一證故不嘔而能食可見毫釐之差遂有千里之異按二者大便俱閉脈靜身涼一安一危者在乎氣通氣塞之間而已矣同上下後治例補劑不可遽用傷寒內實大熱通利之後已得輕瘥且量進白粥三兩日未可遽與和胃之劑熱氣得之又復作也繼此旋以易簡溫膽湯入竹茹與之或二陳湯加前胡亦可矣二藥傷寒瘥後通用無熱者只守本方世俗以四君子湯為貴細循習用之不思內有白朮溫而閉氣往往因此而燥開矣總括凡治傷寒若汗下後不可便用參耆大補宜用小柴胡加減和之若大補使邪氣得補而熱愈盛復變生他證矣所謂治傷寒無補法也如曾經汗下後果是虛弱之甚脈見無力者方可用甘溫之劑補之六書若下後臍中虛軟脈無力者此為虛也以參胡三白湯和之若發熱或潮熱或往來寒熱不解者並宜小柴胡湯增損和之若煩熱不得眠者宜竹葉石膏湯或十味溫膽湯主之也蘊要下後以邪未盡不得已而數下之間有兩目加澀舌反枯乾津不到咽唇口燥裂緣其人所稟陽臟素多火而陰虧今重亡津液宜清燥養營湯設熱渴未除里證仍在宜承氣養營湯溫疫論夫疫乃熱病也邪氣內郁陽氣不得宣布積陽為火陰血每為熱搏暴解之後余焰尚在陰血未復大忌參耆白朮得之反助其壅鬱餘邪留伏不惟目下淹纏日後必變生異證或周身痛痹或四肢攣急或流火結痰或遍身瘡瘍或兩腿攢痛或勞嗽湧痰或氣毒流注或痰核穿漏皆驟補之為害也凡有陰枯血燥者宜清燥養營湯若素多痰及少年平時肥盛者投之恐有膩膈之弊亦宜斟酌大抵時疫愈後調理之劑投之不當莫如靜養節飲食為第一同上溫疫下後適有暫時之通即投人參因而不脹醫者以為用參之後雖不見佳處然不為禍便為是福乃恣意服之不知參乃行血里之補藥下後雖通餘邪尚在再四服之則助邪填實前證復起禍害隨至矣間有失下以致氣血虛耗者有因邪盛數下及大下而挾虛者遂投人參當覺精神爽慧醫者病者皆以為得意明後日再三投之即加變證蓋下後始則胃家乍虛沾其補益而快殊弗思餘邪未盡恣意投之則漸加壅閉邪火復熾愈投而變證愈增矣所以下後邪緩虛急是以補性之效速而助邪之害緩同上
