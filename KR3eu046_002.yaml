body:
  text: 卷二論察診法傷寒以脈大浮數動滑為陽沉澀弱弦微為陰然脈理精深初學未能識察予謂傷寒之中人由淺入深先自皮膚肌肉次入腸胃筋骨以浮中沉三脈候之似乎無所遁乎其情矣浮初排指於皮膚之上輕手按之便得曰浮此脈寒邪初入太陽病在表可發而去之中按至皮膚之下肌肉之間略重按之乃得謂之半表半裡證也沉重手按至肌肉之下筋骨之間方得此為沉脈然有二焉陰陽寒熱充沉脈中分若沉而有力則為陽為熱沉而無力則為陰為寒也六書此係節錄後條辨曰此言雖得一二然有力中亦有寒而實者不可不知脈大者為病進大因邪氣勝病日甚也脈漸緩者為邪退緩則胃氣至病將愈也此以大為病進固其然也然亦有宜大不宜大者又當詳辨如脈體本大而再加洪數此則病進之脈不可當也如脈體本小因服藥後而漸見滑大有力者此自陰轉陽必將汗解乃為吉兆蓋脈至不鼓者由氣虛而然無陽豈能作汗也景岳浮為在表沉為在裡此古今相傳之法也然沉脈亦有表證此陰實陽虛寒勝者然也浮脈亦有里證此陽實陰虛水虧者然也故凡欲察表邪者不宜單據浮沉只當以緊數與否為辨方為的確蓋寒邪在裡脈皆緊數緊數甚者邪亦甚緊數微者邪亦微緊數浮洪有力者即陽證也緊數浮沉無力者即陰證也以緊數之脈而兼見表證者其為外感無疑即當治從解散然內傷之脈亦有緊數者但內傷之緊其來有漸外感之緊發於陡然以此辨之最為切當其有似緊非緊但較之平昔稍見滑疾而不甚者亦有外感之證此其邪之輕者或以初感而未甚者亦多見此脈是又不可不兼證而察之也若其和緩而全無緊疾之意則脈雖浮大自非外邪之證同上周氏溫病方論云脈之盛而有力者每每帶弦豈可錯認為緊而誤以為寒乎表證脈不浮者可汗而解以邪氣微不能牽引正氣故脈不應里證脈不沉者可下而解以邪氣微不能抑鬱正氣故脈不應陽證見陰脈有可生者神氣不敗言動自如乃稟賦脈也再問前日無此脈乃脈厥也下後脈實亦有病愈者但得證減復有實脈乃天年脈也夫脈不可一途而取須以神氣形色病證相參以決安危為善溫疫論脈厥詳見陽明病夫陰症脈沉者沉而遲漫分明者也伏邪脈沉者沉而伏匿急數模糊者也正虛脈微者不拘浮沉脈來衰微按久無力者也故凡遲漫分明者裡寒也沉伏不出者表邪不得發越也陽症脈微者邪盛正虛也今有陽邪之症而見沉伏之脈誤認陰症而用溫熱陽邪內發死不旋踵若見煩躁不寧誤用寒涼則表汗抑遏故切脈之道先分症是何症然後以脈消息者也大白脾腎虛寒真陰症也陰盛之極往往格陽面目紅赤口舌破裂手揚足擲語言錯妄有似乎陽正如嚴冬慘肅而水澤腹堅堅為陽剛之象也邪熱未解真陽症也陽盛之極往往發厥厥則口鼻無氣手足逆冷有似乎陰正如盛夏炎灼而林木流津津為陰柔之象也大抵症既不足憑當參之脈理脈又不足憑當取諸久候沉候彼假症之發現皆在表也故浮取脈而脈亦假焉真症之隱伏皆在裡也故沉候脈而脈可辨耳且脈之實者終始不變脈之虛者乍大乍小如與人初交未得性情善惡之確必知交既久方能洞見情性善惡之真適當乍大之時便以為實適當乍小之時便以為虛豈不誤甚必反覆久候則虛實之真假判然矣然脈辨已真猶未敢恃更察稟之厚薄症之久新醫之誤否合參其究自無遁情錦囊人稟陰陽二氣陰根於陽陽根於陰往來流通而無間斷者也一或偏勝百病生焉蓋偏陽則多熱偏陰則多寒偏陰則六脈虛濡按之無力頗有細澀輕澀之狀病主沉寒法當溫散人所易知若夫病軀內外有熱其脈不數不洪但指下急澀而小緊如枝條刮刮之狀此則為陽勝陰當用寒涼之劑以解陽熱愆伏之邪以行血熱凝結之毒不可錯認以為脈小脾虛誤以溫藥益其疾也縱或嘔逆亦是熱邪乘虛熱氣閉隔斷不可以溫熱之劑投之否則墮厝火積薪之轍矣凡病皆當審斯總括有不因大汗下而兩手忽無脈謂之雙伏或一手無脈謂之單伏或利止如此必有正汗急用四逆輩溫之時有汗便安脈終不出者死總病夫頭疼發熱惡寒或一手無脈兩手全無者庸俗以為陽證得陰脈便呼為死症不治殊不知此因寒邪不得發越便為陰伏故脈伏必有邪伏也當攻之又有傷寒病至六七日以來別無刑剋證候或昏沉冒昧不知人理六脈俱靜或至無脈此欲正汗也勿攻之此二者便如久旱將兩六合陰晦雨後庶物皆蘇換陽之吉兆正所謂欲雨則天鬱熱晴霽天乃反涼理可見也六書明條此下云急用綿衣厚罨手足或置熱磚於足後卻將熱姜米湯飲之須臾得汗及愈按綿衣包手足本出總病論陰證無脈用好酒薑汁各半盞脈來者可治亦出六書當問病人有何疼痛處若有痛證要知痛甚者脈必伏宜隨病制宜尤當問病人若平素原無正取脈須用覆手取之脈必見也此屬反關脈診法與正取法同若平素有脈後因病診之無脈者亦當覆手取之取之而脈出者陰陽錯亂也宜和合陰陽如覆取正取俱無脈者必死矣同上按反關本于丹溪有脈歇至者雜病得之決無再生之理傷寒得之猶有可幹之方非若雜病正氣脫而至歇也此因邪氣壅窒經絡榮衛不疏以致脈來止而復動也觀人有精神別無怪證形現即當導引邪氣調暢經隧則脈自然流利而不斷續也若神氣昏憒鄭聲撮空頭汗喘促手足厥冷有此一二證見者此真死脈也切莫與之治為明條診傷寒熱盛脈浮大者生沉小者死傷寒已得汗脈沉小者生浮大者死溫病三四日以下不得汗脈大疾者生脈細小難得者死不治溫病穰穰大熱千金穰穰作時行其脈細小者死脈經原更有數條錄出次卷死證中當參察面凡看傷寒必先察色然後切脈審證參合以決死生吉凶也凡面青唇青者陰極也如夾陰傷寒小腹痛則面青也赤色屬火主熱在傷寒見之而有三陽一陰之分也若久病虛人午後面兩頰顴赤者此陰火也不可作傷寒治之凡病欲愈目睛黃也凡傷寒面白無神者發汗過多或脫血所致也蘊要此係節錄內經曰脈以應月色以應日然則色者觀之可得而見也如傷風闕庭必光澤傷寒闕庭必暗慘此傷風傷寒是謂表熱表寒面青黑為寒紫黑為熱若已發汗後面色赤盛此表邪出不徹也宜表之大抵黑色見者多凶為病最重黃色見者多吉病雖重不死五法大抵陰盛而面赤者其色黯而不光陽盛而面赤者其色明而且澤要在察其虛實而治不可但見面紅便作陽火而論之明條案此似不必陽證多為桃花色怫鬱證及熱盛陰虛其甚者多為黯赤金鑑云格陽浮赤兼厥利脈微者陽虛也赤色深重潮熱便鞭裡實也面赤有燥潤油妝之別斯症有虛實真偽之分油妝者面現油光面赤如妝也油妝多陰陽變形神得守者猶可商醫級原以油妝分之戴陽又醫說引夷堅志稱慕容彥逢母病召張銳於鄭至則死矣時方六月暑將就木銳曰傷寒法有死一晝夜復生者乃揭面帛注視語曰嘗見夏月死者面色赤乎汗不出而蹶爾煮藥灌之至夜半遺屎滿席出穢惡物鬥余數日良愈察目直視見次卷目皆黃必為欲愈之病也眼胞忽陷目睛直視必難治也開目欲視人屬陽閉目不欲見人屬陰目睛不明神水已竭不能照物者亦難治也六書凡目睛明能識見者可治睛昏不識人或反目上視或瞪目直視或目暗正圓或戴眼反折或眼胞陷下睛昏而不識人者皆不治也凡目中不了了睛不和熱甚於內也凡目疼痛者屬陽明之熱目赤者亦熱甚也目瞑者必將衄血也白睛黃者將發身黃也凡病欲愈目眥黃也蘊要凡治傷寒須觀兩目或赤或黃赤者為陽證凡目色清白而無昏冒閃爍之意者多非火證不可輕用寒涼眼眵多結者必因有火蓋凡有火之候目必多液液干而凝所以為眵即如肺熱甚則鼻涕出是亦目液之類也景岳目者至陰也五藏精華之所繫熱則昏暗水足則明察秋毫如常而瞭瞭者邪未傳裡也若赤若黃邪已入里矣若昏暗不明乃邪熱居內燒灼腎水枯涸自目無精華不能朗照急用大承氣下之蓋寒則目清未有寒甚而目不見人者也是以曰急下五法察耳耳者腎之竅察耳之好惡知腎之敗絕然腎為人之根本故腎絕者未有不死也五法凡耳輪紅潤者生或黃或白或黑或青而枯燥者死薄而白薄而黑皆為腎敗凡耳聾耳中疼皆屬少陽之熱而為可治若耳聾舌卷唇青此屬厥陰為難治也蘊要按陽虛亦有耳聾察鼻鼻孔乾燥者屬陽明之熱必將衄血也鼻孔乾燥黑如煙煤陽毒熱深也鼻孔冷滑而黑者陰毒冷極也鼻塞濁涕者風熱也鼻孔搧脹者為肺絕而不治也蘊要察口唇唇甲青見次卷口唇者肌肉之本脾之華也視口唇好惡可以知病之淺深五法凡口唇焦乾為脾熱焦而紅者吉焦而黑者凶唇口俱赤腫者熱甚也唇口俱青黑者冷極也口苦者膽熱也口中甜者脾熱也口燥咽乾者腎熱也舌乾口燥而欲飲水者陽明之熱也若唇青舌卷唇吻反青環口黧黑口張氣直口如魚口口唇顫搖不止氣出不返皆不治也蘊要察舌傷寒舌上胎何以明之舌者心之官法應南方火本紅而澤傷寒三四日已後舌本有膜白滑如胎甚者或燥或澀或黃或黑是數者熱氣淺深之謂也邪氣在表者舌上即無胎及邪氣傳裡津液結搏則舌上生胎也寒邪初傳未全成熱或在半表或在半里或邪氣客於胸中者皆舌上胎白而滑也經曰舌上如胎者以丹田有熱胸上有寒邪初傳入里者也陽明病脅下硬病不大便而嘔舌上白胎者可與小柴胡湯是邪氣在半表半裡者也陽明病若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之是邪客於胸中者也藏結宜若可下舌上胎滑者則云不可攻也是邪未全成熱猶帶表寒故也及其邪傳為熱則舌之胎不滑而澀也經曰傷寒七八日不解熱結在裡表裡俱熱時時惡風舌上乾燥而煩欲飲水數升者白虎加人參湯主之是熱耗津液而滑者已干也若熱聚於胃則舌為之黃是熱已深也金匱要略曰舌黃未下者下之黃自去若舌上色黑者又為熱之極也明理按此以胎滑為邪未入里之侯是在陽證理宜然然滑澀之異即里證寒熱真辨所存藏結胎滑亦是裡寒蓋非表候又胸上有寒丹田有熱是寒熱字互錯則其胎亦膈熱所致可知舌者內司腸胃傷寒傳裡則裡熱燒灼津液乾枯結於舌上為胎如鍋心滾沸米飲煎乾結衣一層於鍋底即此意也蓋傷寒自表傳裡全以舌胎為驗傳裡淺深亦以舌胎為驗裡熱既清漸進穀氣亦終以舌胎為驗故驗舌乃審察傷寒之大要其驗之之法舌潤而和為邪在裡舌苦而湯為邪將入里舌乾燥有胎則知邪已傳裡化而為熱如胎色白者為熱尚淺胎色黃者為熱漸深胎色黑及舌中心黑如小舌形而芒刺裂指者皆熱極之症也又驗其出舌出舌長而尖者為熱未甚出舌圓而平者為熱已甚若出舌短不能出齒外而形方者熱盛之極也問曰金鏡三十六舌以純黑者為水剋火系大寒症用理中湯救之今曰熱極不與古人之論逕庭乎曰大寒症而舌青黑者水來剋火也熱極症而舌紫黑色者火極似水也又水來剋火者水化也必津潤而滑無焦燥之理火極似水者火化也必焦燥有芒刺如銼而無津潤之理二者色黑雖似而青紫潤燥不同烏得以寒為熱以熱為寒乎又傷寒有陽似陰有陰包陽有陽極反發厥陰盛反發躁症脈俱不可辨者獨有舌胎可辨果見舌胎青黑而滑雖症脈俱陽知其內本虛寒何疑於表裡傳中之大辯乎孝慈備覽傷寒表裡輕重驗舌色亦得大半杜清碧有三十六法反覺太繁今余分立白胎黑胎黃胎燥胎滑胎五者以為要舌色如常身雖大熱是表熱里未有熱也但治其表如見白胎而滑邪在半表半裡未入於裡也但宜和解若見黃胎者熱在胃家胎黃而乾裂者熱已入里宜清裡熱若有下症者可以下之若見黑胎者有二條分別黑而焦裂硬刺者裡熱已極火極似炭之胎也黑而有水軟潤而滑者裡寒已甚水來剋火之寒胎也以上五者驗舌之大節目也然仍要看症切脈以參定之大白凡診傷寒者當以舌色辨表裡以舌色辨寒熱皆不可不知也若以舌色辨虛實則不能無誤蓋實固能黑以火盛而焦也虛亦能黑以水虧而枯也若以舌黃舌黑悉認為實熱則陰虛之證萬無一生矣景岳原附一按陰虛傷寒其證似陽舌黑如炭芒刺干裂者用甘溫壯水藥間飲涼水諸證漸退但其舌黑則分毫不減再後數日忽舌上脫一黑殼而內則新肉燦然始知其膚腠焦枯死而復活云云白胎舌上微白者未可便為熱證必胎白而厚其上如刺焦裂破紋摸之略無小潤甚成黑胎方為熱極加以下證悉具無表證方可用小承氣湯大柴胡湯亦有病屬陰證下利清穀陽氣客於上焦煩躁引飲舌胎如前證或鼻如煙煤欲去衣被不可誤以為陽附子理中湯四逆湯冷服要訣胎白而滑者邪熱未盛也胎黃而澀者邪熱漸深者胎黑而裂也邪熱亢極也又陰症亦能生胎驗之但冷而滑如法墨擦舌五法云以手摸之無芒剌而津潤者此陰寒也雖渴飲水須臾後轉口氣冷而促脈息沉而微此蓋無根之火遊於上而為之不可一概以作實火論也療此者必須用心於脈理明條舌乃心之苗心主火宜紅上有淡白苔此胃氣也俗醫不知見有苔便以為食而消之若胃氣虛穀氣少必光而無苔進以粥食而苔漸有此吉兆也又有滿舌厚苔忽然退去光而燥此胃氣將絕也又有舌如大紅色無苔此君火浮於外物極則反盛極將衰如火旺極將化而為灰之象直解胎黃而燥渴者熱盛也胎黑而燥渴者熱甚而亢極也若不燥渴舌上黑胎而滑者為寒為陰也舌卷而焦黑而燥者陽毒熱極也舌青而胎滑者陰毒冷極也凡舌腫脹舌上燥裂舌生芒刺皆熱甚也凡舌軟舌強舌短縮神氣昏亂誤言不清者死也蘊要舌色紅潤屬表屬陰屬寒屬虛舌乾有胎屬裡屬陽屬熱屬實如舌青紫陰寒也泥色虛極也舌乾舌胎邪初入里也黃胎熱甚黑胎如芒刺或捲縮極熱也凡面赤病熾面目黃色病已舌無胎結成干赤光皮似煨熟豬腎乃陽中伏陰也舌胎黑而濕滑者臟結證也舌胎黃燥足冷脈沉亦非純陽證切忌硝黃簡明醫彀有一種最薄黃胎如漆在舌上者雖宜清火必用參朮補正為主若一味清火必至氣脫而斃凡舌上無胎如去膜油豬腰子者名鏡面舌不治以其陰津虧竭故也又舌胎雖有而乾燥者可慮恐陰液竭也不可視為泛常須切記之西塘感症臍以上為大腹或滿或脹或痛此必邪已入里表症必無或存十之一二亦須驗之於舌或黃甚或如沉香色或如灰黃色或老黃色或中有斷紋皆當下之黃胎不甚厚而滑者熱未傷津猶可清熱透表若雖薄而乾者邪雖去而津受傷也苦重之藥當禁宜甘寒輕劑養之舌絳而乾燥者火邪刦營涼血清血為要舌絳而有碎點黃白者將生疳也其有雖絳而不鮮乾枯而痿者此腎陰涸也急以阿膠雞子黃地黃天冬等救之緩則恐涸極而無救也再有熱傳營血其人素有瘀傷宿血在胸膈中舌色必紫而暗按之潮濕當加散血之品否則瘀血與熱相搏阻遏正氣遂變如狂發狂之症若紫而腫大者乃酒毒衝心舌若淡紅無色或干而色不榮者乃是胃津傷而氣無化液也當用炙甘草湯不可用寒涼藥舌苔不燥自覺悶極者屬脾濕盛也或有傷痕血跡者必問曾經搔挖否不可以有血而便為枯症仍從濕治可也再有神情清爽舌脹大不能出口者此脾濕胃熱鬱極而毒延於口也用大黃磨入當用劑內則舌脹自消矣舌無苔而有如煙煤隱隱者慎不可忽視如口渴煩熱而燥者平時胃燥也不可攻之宜甘寒益胃若不渴肢寒而潤者乃挾陰病宜甘溫扶中此何以故外露而里無也若舌白如粉而滑四邊色紫絳者溫疫病初入募原未歸胃腑急急透解莫待傳入而為險惡之症且見此舌者病必見凶須要小心溫熱論節錄傷寒舌鑑張路玉長子張登誕先氏彙纂書止一卷共舌圖一百二十按舌胎但有白黃黑三者而已杜清碧推廣敖氏驗舌法為三十六圖其中又增純紅舌其餘等舌已半屬無據今廣至一百二十圖何其多歟就其中言紫色舌藍色舌亦甚有理蓋熱極則色紫寒極則色藍藍者微青色也至其言灰色黴醬色二舌亦甚不必蓋灰色即淡黑黴醬色即深紫也張氏每借一色即化為數十圖何其穿鑿辨注按張書系本於申鬥垣舌辨而稍加修飾者蓋驗舌之法不宜多端金鏡諸圖實眩人心目而此言稍得其當故附載於此察齒溫熱之病看舌之後亦須驗齒齒為腎之餘齦為胃之絡熱邪不燥胃津必耗腎液且二經之血走於此處病深動血結瓣於上陽血色紫紫如干漆陰血色黃黃如醬瓣然豆瓣色者多險惟症尚不逆者猶可治否則難治矣此何故耶蓋陰下竭陽上厥也齒若光燥如石者胃熱甚也若如枯骨色者腎液枯也為難治咬牙而脈證皆衰者胃虛無谷以內榮也若齒垢如灰糕樣者胃氣無權津亡而濕濁用事多死初病齒縫流清血痛者為胃火沖激不痛者為龍火內燔齒焦無垢者死齒焦有垢者腎熱胃刦也當微下之溫熱論察聲語言氣息凡察病者聲以清朗如平日者吉聲重鼻塞者傷風也聲如甕中出者中濕也言遲者風也言驟者火也聲喑不出而咳者水寒傷肺也聲啞如破而咳者客寒裡熱也驟然聲喑而咽痛如刺不腫不赤不發熱二便清利者陰寒也驟然聲喑而赤腫脹閉或發熱便秘者龍火也緒論此說欠精核舌燥而語言不清因燥而不清可治舌潤而語言不清所謂口雖欲言舌不得前死症也直解手足並冷脈息沉細口鼻氣息短少所說語言輕微無力接續或鼻息出入之氣且促或氣短少難以應息數者皆元氣將脫也若神昏上氣促急或吃逆不止神昏不知人事者死也蘊要有神思似清而時昏憒或語次間忽作鼾聲者大危候也西塘感症察身凡病人身輕自能轉動者易治若身體沉重不能轉側者多難治也蓋陰症則身重必足冷而踡臥惡寒常好向壁臥閉目不欲嚮明懶見人也又中濕風濕皆主身重疼痛不可轉側要當辨之也大抵陽症身輕而手足和暖開目而欲得見人也為之可治若頭重視身此天柱骨倒而元氣敗也凡病人皮膚潤澤者生枯燥者死蘊要察胸腹滿痛諸證詳見次卷胸者里也可以觀邪之傳與不傳也何者先看目舌次問病人胸前痛脹否若胸前不痛滿知邪不在半表半裡若脹滿未經下者即半表半裡症也已下過而其痛甚者即結胸症也如邪在表焉有胸痛脹滿之理吾故曰胸者可以知邪傳與不傳也五法腹者至陰也乃里症之中可以觀邪之實與不實也既問胸前明白次則以手按其腹若腹未痛脹者知邪不曾入里入里必脹痛若邪在表及半表半裡腹焉得痛脹乎若腹脹不減及腹痛不止此里症之實方可攻之若腹脹時減痛則綿綿此里症猶未實也吾故曰腹者可以觀邪之實與不實也同上小腹者陰中之陰里症之裡可以觀邪之結實也既問其胸腹後以手按其小腹蓋小腹藏糟粕之處邪至此必結實若小腹未硬痛者知非里症也若邪已入里小腹必硬痛硬痛而小便自利畜血症也宜桃仁承氣攻之若小腹繞臍硬痛小便數而短者燥糞症也當以大承氣湯攻之若小腹脹滿大便如常但此溺澀而不通故小腹脹滿當大利之若在表及在半表半裡豈有小腹硬痛之理同上臨初曰直中陰證亦有小腹痛者但不硬實耳當隨證辨之中胃按之而痛世醫便謂有食夫胃為水穀之海又為倉稟之官胃果有食按必不痛試將飽食之人按之痛否惟邪氣內結正氣不能從膈出入按之則痛又胃無穀神藏氣虛而外浮按之亦痛若不審邪正虛實概謂有食傷人必多又按者輕虛平按若按不得法加以手力未有不痛者張志聰集註察大小便醫者欲知病人臟腑必要問其從內走出者故凡病當驗二便仲景以小便不利小便赤定傷寒裡熱以小便利小便白定里無熱以大便不通大便硬定其裡熱自下利下利厥冷定其裡寒故治病以二便定人寒熱以二便定人燥濕以二便定人虛實再無差誤然論二便亦宜細詳例如大便乾結知其熱矣然大便滑泄黃色為熱人多忽之矣小便黃赤知其熱矣然小便色白而混濁亦為熱人多忽之矣又如大便乾結知其然矣亦有血枯津竭用不得苦寒者又如小便黃赤知其熱矣亦有食滯中焦黃赤混濁用寒涼反不清用香燥辛溫而清利者大白有頭疼身熱手足冷口燥大便結面赤小便淡黃而反為陰症者有頭不疼身不熱手足冷腹瀉而反為陽症者則火極似水水極似火似是而非將何以辨之乎只辨其大小便而已大便結而小便赤者陽結也陽症也大便結而小便白者亦陰結也陰症也大便雖瀉而中有小結屎傍流清黃水者協熱痢也亦陽症也此即熱結傍流以為協熱痢者誤大便瀉而其色白其形柔耎稀薄內無小結塊亦無清黃水者陰症也小便淡黃帶白而諸症未極大便雖下利而未至厥逆讝語者陽症也小便淡黃帶白色而諸症已極大便結燥面帶浮陽煩躁欲坐泥水中者下痢黑色雜色帶清白水如鴨溏者亦陰症也綱目傷寒病在表則大便如常病傳裡則大便方實邪熱入深則又燥而堅矣若熱蓄於胃胃土燥烈津液沁耗故大便秘澀而不通治宜鹹苦寒之藥以泄之若寒傷於胃胃土陰凝血結凍結故大便閉塞而不通治宜辛甘熱之劑以溫之又有瘥後食早胃氣不勝而不能運化致大便之不通者必當分輕重以消導之病久血少腸胃燥澀而不克運行致大便之不通者必當辯老壯以滋潤之明條熱結傍流協熱下利大便閉結大腸膠閉總之邪在裡其證不同者在乎通塞之間耳溫疫論四證詳出陽明病初便褐色者重再便深褐色者愈重三便黑色者為尤重色變者以其火燥也如羊血在日色中須臾變褐色久則漸變而為黑色即此意也當詳察之醫綱引海藏邪熱燥結色未嘗不黑但瘀血則溏而黑黏如漆燥結則硬而黑晦如煤此為明辨也準繩大便不解人皆以為熱不知寒凝斂結亦不大便如脈弦而緊舌白而滑腹不滿口不渴此虛寒也雖一二十日不大便照常飲食切不可餓溫補果足元氣復便自解矣直解醫治傷寒多問其小便利不利赤不赤以別其陰陽亦有小便自利遍數多所出自少色不甚清不可因其利而遽謂之陰必是小便如常清而不赤又無諸陽證方信里之無熱若病在太陽身體熱太陽屬膀胱未有小便不赤者不可因其赤遽謂之實熱必是小便如灰汁或如陳酒或如血色無諸表證方見其熱已入里又有因發汗過多津液枯竭以致小便不利或澀而赤醫者往往利之重竭其津液又陽明病不大便而小便赤澀或誤利其小便則津液愈無胃愈乾燥此又利小便之戒要訣緒論云汗後亡津液胃中干與陽明汗多者若誤利之重耗其陰反致泉竭多有涓滴不通而死者小便之多者似乎無熱其色尚有黃赤者或陰寒在裡氣化不行小便短少而色亦有黃者總之小便多則其色漸淡少則其色便黃又不可以陰陽寒熱拘也大約小便多者為無熱或熱在血分而無傷於氣分耳小便少者陰陽寒熱皆有之當以他證合辨則庶乎其不差矣溯源集有尿如蘇木汁者俗人不識認為尿血非也此緣膀胱熱甚故其尿色赤而獨與血相似也待其邪熱退其小便自然清矣明條
