body:
  text: 卷四太陽病桂枝湯證凡桂枝湯證病者常自汗出小便不數手足溫和或手足指稍露之則微冷覆之則溫渾身熱微煩而又憎寒始可行之若病者身無汗小便數或手足逆冷不惡寒反惡熱或飲酒後慎不可行桂枝湯也總病取汗法凡發汗須如常覆腰以上厚衣覆腰以下以腰足難取汗故也半身無汗病終不解凡發汗後病證仍存於三日內可二三發汗令腰腳周遍為度總病取汗在不緩不急不多不少緩則邪必留連急則邪反不盡汗多則亡其陽汗少則病必不除金鑑夫大汗將出者慎不可恨其煩熱而外用水濕及風涼制其熱也陽熱開發將欲作汗而出者若為外風涼水濕所薄則怫熱反入於裡而不能出泄病多危極而死矣亦不可恨其汗遲而厚衣壅覆欲令大汗快而早出也沸熱已甚而鬱極乃發其發之微則順甚則逆順則發易逆則發難病已怫熱作發而煩熱悶亂更以厚衣壅覆太過則陽熱暴然太甚陰氣轉衰而正氣不榮則無由開發即燥熱喘滿危而死矣直格汗難出證汗後熱不除傷寒欲得汗與麻黃湯數劑而汗不出者不治熱病脈躁盛而不得汗諸陽之極亦不治二者蓋真病也亦有寒熱而厥忽兩手或一手無脈是猶重陰欲雨之時必濈濈然大汗而解其或投藥無汗而脈不至者亦不可活也是可以容易談哉雖然諸虛少血津液中干亦不能作汗病人有挾宿恙如痰飲症癖之類又隔汗而不能出也少血者養血以汗之痰癖者開關散氣以汗之是為活法若夫汗出如油喘而不休未有能生者也總括汗後熱不止必有所因或因冷食不化或因汗後強進粥湯或汗後更冒虛風或動起不寧或勞心惱怒皆足以致熱也凡服麻黃重劑不得汗後必嘔血或衄亦有下如豚肝而死者以營血受傷故也緒論汗後死證見前卷死證中桂枝湯變諸方古今録驗療中風傷寒脈浮發熱往來汗出惡風頸項強鼻鳴乾嘔陽旦湯主之方大棗十二枚擘桂枝三兩芍藥三兩生薑三兩甘草三兩炙黃芩二兩上六味㕮咀以泉水四升煮取二升分四服日三外臺案千金陽旦湯即桂枝湯本方其加黃芩乾薑者名陰旦湯和解湯治血氣虛弱外感寒邪身體疼倦壯熱惡寒腹中㽲痛鼻塞頭昏痰多咳嗽大便不調白芍藥桂各三分厚朴甘草乾薑白朮各一兩人參茯苓各一兩半上為粗末每服二錢水一盞生薑三片棗一個煎至六分去滓溫服不拘時十便引雞峰方黃耆建中加當歸湯黃耆蜜炙當歸洗去蘆薄切焙乾稱各一兩半白芍藥三兩桂一兩一分去粗皮不見火甘草一兩炙上粗末每服五録生薑三片棗一個水一盞半同煎至八分去滓取七分清汗日三服夜二服尺脈尚遲再作一劑本事昔有鄉人丘生者病傷寒豫為診視發熱頭疼煩渴脈雖浮數而無力尺以下遲而弱豫曰雖麻黃證而尺遲弱仲景云尺中遲者營氣不足血氣微少未可發汗豫於建中湯加當歸黃耆令飲翌日脈尚爾其家煎迫日夜督發汗藥言幾不遜矣豫忍之俱只用建中調營而已至五日尺部方應遂投麻黃湯啜第二服發狂須臾稍定略睡已得汗矣信知此事是難是難仲景雖云不避晨夜即宜便治醫者亦須顧其表裡虛實待其時日若不循次第暫時得安虧損五臟以促壽限何足責也同上方龍潭本草切要治傷寒裡虛表實行發散藥邪汗不出身熱煩躁六脈空數用黃耆一兩桂枝三錢白芍藥人參各三錢甘草八分柴胡一錢五分加生薑三片黑棗三個水煎服本草匯言案此方先君子去人參名桂耆湯專治桂枝證人虛者有效故敘於茲嘔者不宜用桂枝湯合於本方加半夏一錢添姜煎此非合病之嘔系傷寒雜病即非正傷寒故可用也風寒二證理當發汗而其人虛不可汗者宜桂枝湯加黃耆半錢要訣葛根湯變諸方延年祕録解肌湯主天行病二三日頭痛壯熱者方乾葛四兩麻黃三兩去節芍藥二兩黃芩二兩甘草一兩炙大棗十二枚擘桂心一兩上七味切以水八升煮取二升半去滓分三服得汗愈忌海藻菘菜生蔥等蔣孝璋處外臺和劑名葛根解肌湯千金解肌湯於本方去桂心肘後葛根解肌湯古今録驗水解散活人知母桂心湯皆同類方也沃雪湯治傷寒溫疫濕疫熱疫蒼朮乾薑炮甘草炙各六兩防風乾葛厚朴制炒芍藥各四分上為銼散每服三錢半重水兩盞煎七分去滓服三因柴葛解肌湯原文主證不確今屬刪卻柴胡乾葛甘草黃芩芍藥羌活白芷桔梗無汗惡寒甚者去黃芩加麻黃水二鍾姜三片棗二枚槌法加石膏末一錢煎之熱服六書此方有柴胡然以解肌為主故次於茲麻黃湯變方五積散余家舊方博濟亦載小有不同蒼朮二十兩桔梗十兩陳橘皮六兩白芷甘草各三兩當歸二兩川芎一兩半芍藥白茯苓半夏湯洗各一兩麻黃春夏二兩秋冬三兩乾薑春夏一兩半秋冬二兩枳殼麩炒去穰四兩以後三味別搗和肉桂春夏三兩秋冬四兩厚朴二兩薑汁炙上前十二味為粗末分作六服大鍋內緩火炒令微赤香熟即止不可過焦取出以淨紙藉板床上晾令冷入後三物和之和氣二字活人作入瓷合盛似是每服三錢加薑棗煎至六分去滓服蘇沉和劑如傷寒時疫頭痛體疼惡風發熱項背強痛入蔥白三寸豉七粒同煎易簡生料五積散治感冒風寒肩背拘急發熱頭疼或為寒濕所搏一身凜然急用此藥以被蓋汗出即愈要訣云若的是傷寒有惡寒無汗等證可用五積散熱服厚被覆之取汗有初得病太陽證具但寒而未即熱五積散發汗丹溪心法附余云此藥氣味辛溫發表溫中開鬱行氣有殊功去寒濕之聖藥也豫當以防風通聖散為瀉熱燥之藥也生料五積為散寒濕之藥也案此方功用蘇沈原云傷寒手足逆冷虛汗不止脈沉細面青嘔逆又云內外感寒脈遲細沉伏手足冷毛髮恂栗傷寒里證之類活人書有人參亦云治陰經傷冷脾胃不和及感寒邪並似證方不相葉仍不取也大青龍湯變諸方古今録驗知母解肌湯療溫熱病頭痛骨肉煩疼口燥心悶者或是夏月天行毒外寒內熱者或已下之餘熱未盡者或熱病自得痢有虛熱煩渴者方麻黃二兩去節知母三兩葛根三兩石膏三兩甘草二兩炙上五味切以水七升煮取三升分為三服小品同外臺聖惠治時氣一日壯熱心神煩躁頭痛四肢不利葛根散於本方去知母加赤芍藥黃芩大青入薑棗煎熱服衣覆出汗深師石膏湯療傷寒病已八九日三焦熱其脈滑數昏憒身體壯熱沉重拘攣或時呼呻而已攻內體猶沉重拘攣由表未解今直用解毒湯則攣急不差直用汗藥則毒因加劇而方無表裡療者意思以三黃湯以救其內有所增加以解其外故名石膏湯方石膏黃連黃檗黃芩各二兩香豉二升綿裹梔子十枚擘麻黃三兩去節上七味切以水一斗煮取三升分為三服一日並服出汗初服一劑小汗其後更合一劑令兩日報常令微汗出拘攣煩憒即差得數行利心開令語毒折也忌豬肉冷水外臺六書名三黃石膏湯止汗法互見餘證篇當參汗出不止將病人發按在水盆中足冷於外用炒麥麩皮糯米粉龍骨牡蠣煅為末和勻周身撲之其汗自止赤水此本出六書彼方有藁本防風撲粉龍骨牡蠣糯米各等分為末服發汗藥出汗過多者以此粉撲之汗多有亡陽之戒故用龍骨牡蠣之澀以固脫入糯米者取其黏膩雲爾乃衛外之兵也醫方考案此方本出入門少陽病此篇當在陽明後今遵經於太陽篇載有柴胡諸條之例敢次於斯以便檢考小柴胡湯論人參宜否傷寒諸方惟小柴胡為用最多而諸病屢稱述之蓋以柴胡半夏能利能汗凡半表半裡之間以之和解皆可用也抑不知小柴胡非特為表裡和解設其於解血熱消惡血誠有功焉蓋傷寒發熱一二日間解撤不去其熱必至於傷血不問男女皆然小柴胡湯內有黃芩柴胡最行血熱所以屢獲奇功豫每見後學數輩療治傷寒輒用當歸其意蓋為調血計不思一滯中脘二動痰涎三壞胃氣而血熱又非當歸之所能除惑之甚矣否則熱入血室張氏特以小柴胡主之何哉然而學者亦不可以輕心而用小柴胡也脈之不審證之不詳縱橫泛應執小柴胡以為公據脫遇浮熱似陽其不誤人性命幾希矣甚者僅以小柴胡收效一二而乃不遵格法輕用小柴胡立意一差禍不旋踵籲可畏哉總括節録今世俗皆棄人參而不用以為穩當乃盲醫不知虛實之故也惟熱盛而邪實者乃可去之或有兼證之不相合者亦可去也若邪輕而正氣虛者未可概去也或邪氣雖盛而正氣大虛者亦當酌其去取也溯源集小柴胡湯但人參一味亦宜斟酌若邪氣未退不可輕用玉案小柴胡湯脈不虛者去人參西塘感症余用小柴胡往往減參且瘟疫原不宜於參說疫滄洲翁亦減參用有案見於後詳仲景之旨妙在再煎是藥性混和不敢住邪然今人厭其繁難不能不減去吳仁齊小柴胡湯加減法小柴胡湯近代名醫加減法若胸膈痞滿不寬或胸中痛或脅下痞滿或脅下痛去人參加枳殼桔梗各二錢名柴胡枳殼湯若胸中痞滿按之痛者去人參加瓜蔞仁三錢枳殼桔梗各二錢五分黃連二錢名柴胡陷胸湯此二方本出六書詳見第八卷結胸中若脈弱虛發熱口渴不飲水者人參倍用加麥門冬一錢五分五味子十五個名參胡清熱飲又名清熱生脈湯明條云傷寒脈弦虛無力或浮散發熱煩躁口渴不飲水者此屬虛熱去半夏黃芩倍加人參二錢麥門冬一錢半五味子十四粒名清熱生脈散若脈弦虛發熱或兩尺且浮無力此必有先因房事或曾夢遺走精或病中還不固者宜加知母黃連各二錢牡蠣粉一錢名滋陰清熱飲如有咳嗽者更加五味子十一個若脈弦虛發熱口乾或大便不實胃弱不食者加白朮白茯苓白芍藥各一錢五分名參胡三白湯更有一方見於後若發熱煩渴脈浮弦而數小便不利大便泄利者加四苓散用之名柴苓湯得效茈苓湯治瘧小柴胡湯合五苓散內熱多者此名協熱而痢加炒黃連一錢五分白芍藥一錢五分腹痛倍用撮要云再加黃柏名春澤湯若腹疼惡寒者去黃芩加炒白芍藥二錢桂一錢名柴胡建中湯若自汗惡風腹痛發熱者亦主之案合小建中本出要訣録於前卷譫語中若心下痞滿發熱者加枳實二錢黃連一錢五分案又更加桂枝名加味柴胡桂枝湯若血虛發熱至夜尤甚者加當歸身川芎白芍藥各一錢五分生地黃一錢若口燥舌乾津液不足者去半夏加栝蔞根一錢五分麥門冬一錢五味子十五粒明條云傷寒血虛發熱至夜尤其加當歸二錢芍藥生地黃麥門冬各一錢舌乾口燥去半夏加天花粉一錢五味子十四粒名柴胡養榮湯若內熱甚者錯語心煩不得眠者加黃建黃柏山梔仁各一錢名柴胡解毒湯案合黃連解毒本出正傳見次卷明條名柴胡三黃湯若脈弦長少陽與陽明合病而熱者加葛根三錢白芍藥二錢名柴葛解肌湯六書方既出與此不伺若脈洪數無外症惡熱內熱甚煩渴飲水者合白虎湯主之名參胡石膏湯蘊要柴胡白虎合方詳見於後大小柴胡湯變諸方治陽毒傷寒四肢壯熱心膈煩躁嘔吐不止宜服此方柴胡一兩黃芩一兩人參一兩甘草一兩麥門冬一兩半夏半兩上件藥搗粗羅為散每服四錢水一中盞入竹葉三七片生薑半分煎至六分去滓不計時候溫服聖惠十便引名人參飲子蘊要人參竹葉湯治過經煩熱不解於本方去半夏生薑若口若心煩者加炒黃連治熱病五日已得汗毒氣不盡猶乍寒乍熱惛惛如醉脅下牢痛骨節疼痛不能下食舌本乾燥口內生瘡宜服柴胡飲子方柴胡二兩川升麻一兩半赤芍藥一兩黃芩一兩半甘草一兩枳殼一兩半麥門冬二兩竹葉二兩梔子仁一兩上件藥都細銼和勻每服半兩以水一大盞入豉五十粒蔥白一莖煎至五分去滓不計時候溫服聖惠治傷寒汗後熱不除進退發歇身體溫溫心神煩悶口乾舌澀不思飲食宜服人參散方人參一兩犀角屑一兩麥門冬一兩柴胡一兩黃芩一兩川升麻一兩玄參一兩赤茯苓一兩地骨皮一兩葛根一兩梔子仁一兩甘草一兩上件藥搗粗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服聖惠案本事治邪熱客於經絡肌熱痰嗽人參散蓋自此方出有十四日外餘熱未除脈息未復大便不快小便黃赤或渴或煩不能安睡不思飲食此邪氣未淨正氣未復也當量其虛實調之用參胡芍藥湯人參芍藥柴胡黃芩知母麥門冬各一錢生地黃一錢半枳殼八分甘草三分生薑三片水二鍾煎至八分溫服明條治傷寒後虛煩不得眠睡心中懊憹宜服此方甘草半兩梔子仁半兩黃芩半兩烏梅肉十四枚微炒柴胡一兩上件藥搗篩為散每服四錢以水一中盞入生薑半分竹葉二七片豉五十粒煎至六分去滓不計時候溫服聖惠活人名梔子烏梅湯治傷寒後伏熱在心中恍惚多驚不得眠睡宜服茵陳散方茵陳半兩犀角屑半兩柴胡一兩茯神一兩赤芍藥一兩麥門冬半兩黃芩半兩梔子仁半兩甘草半兩上件藥搗篩為散每服四錢以水一中盞入生薑半分竹葉二七片生地黃一分煎至六分去滓不計時候溫服聖惠治壞傷寒日數多後煩熱不退頰赤口乾宜服犀角散方犀角屑一兩柴胡三分吳藍三分大青一兩川升麻一兩烏梅肉三分黃芩三分甘草半兩上件藥搗篩為散每服五錢以水一大盞入竹葉三七片煎至五分去滓不計時候溫服聖惠案此諸方不敢為本病設然俱堪臨時酌用因次於斯廣濟療天行惡寒壯熱頭痛大小便赤澀不下食飲柴胡湯方柴胡七分茵陳七分大黃十二分別漬升麻七分梔子四枚擘芒消四分湯成下芍藥七分黃芩十二分上八味切以水四升先漬藥少時猛火煮取一升八合分溫三服服別相去如人行六十里吃一服以快利為度第二服則利更不須服之忌熱食炙肉蒜黏食外臺少陽陽明合病胃中燥實大便難潮熱譫語者用大柴胡加芒消湯即大柴胡湯內加芒消二錢或三錢明條浙東運使曲出道過鄴病臥涵虛驛召翁往視翁察色切脈則面戴陽氣口皆長而弦蓋傷寒三陽合病也以方涉海為風濤所驚遂血菀而神懾為熱所搏遂吐血一升許且脅痛煩渴譫語為投小柴胡湯減浸加生地黃半劑後候其胃實以承氣下之得利愈醫史滄洲翁傳案小柴胡加地黃本出本事見第十二卷婦人中柴胡清燥湯下後或數下膜原尚有餘邪柴胡黃芩陳皮甘草花粉知母薑棗煎服溫疫論柴胡養營湯柴胡黃芩陳皮甘草當歸白芍生地知母天花粉薑棗煎服溫疫論案此本六書柴胡百合湯今去百合人參加歸芍花粉又清燥養營湯於本方去柴胡黃芩用地黃汁加燈心煎服升陽散火湯治有患人叉手冒胸尋衣摸床譫語昏沉不醒人事俗醫不識見病便呼為風症而因風藥誤人死者多矣殊不知肝熱乘於肺金元氣虛不能自主持名曰撮空證小便利者可治小便不利者不可治也人參當歸柴胡芍藥黃芩甘草白朮麥門冬陳皮茯神水二鍾姜三片棗二枚槌法入金首飾煎之熱服六書康熙三年孟秋余至渝州一老人謝彥一年五十餘因感冒內傷一醫以清暑益氣湯漫加諸熱藥發汗一劑而雙目俱瞽昏沉不醒復用滾痰丸並水藥下之其人周身不熱自下利清黑色溏糞數十行水穀不化昏迷仰睡手扯衣被尋衣摸床且鄭聲喃喃不字語請余視之六脈微緩非死脈也胃氣尚存此乃盛暑之日而老年內傷汗下非宜中氣已虛邪熱乘於肺經必變神昏不語余用升陽散火湯內有小柴胡湯散內外表里之寒邪又有五味異功散麥冬當歸甘芍補中益氣和脾肺一劑安睡再劑蘇更坐三日連進四劑而諸證悉愈述微參胡三白湯治傷寒過經不解脈虛數人弱發熱或潮熱口乾舌燥者人參二錢半白朮一錢半軟苗柴胡三錢白芍藥一錢半白茯苓一錢半上作一服水二鍾煎至一鍾去柤溫服若脈微弱口乾心煩不安加麥門冬一錢半五味子十五個若心煩熱口苦心下痞加黃連一錢枳實七分若不得眠者更加竹茹亦佳蘊要補中益氣湯黃耆勞役甚者一錢甘草炙已上各五分人參去蘆升麻柴胡橘皮當歸身酒洗白朮已上各三分上件㕮咀都作一服水二盞煎至一盞去柤早飯後溫服如傷之重者二服而愈量輕重治之內外傷辨惑論傷寒挾內傷者補中益氣湯氣虛甚者少加附子以行參耆之功丹溪纂要程氏醫彀軒岐救正論並有益氣湯加附治驗因勞役內傷元氣因重感寒補中益氣湯加姜附明醫指掌江應宿亦云補散加姜附而先君子名姜附益氣湯亦為陰證陽稍回後調理之劑其效最著小柴胡合白虎湯諸方有老妓金姓者其嫂三月患頭痛身熱口渴水瀉不止身重不能反側日漸昏沉耳聾眼合夢多亂語嘉秀醫者歷試視為必死豫適吳江歸便道過檇李訪南溪吉泉二兄吉泉兄以是證見詢且言諸醫有以補中益氣湯進者有以附子理中湯進者二藥已煎成未服幸弟至乞為診之六脈洪大觀其色內紅外黑口唇乾燥舌心黑胎不知人事豫曰此疫證也法宜清解急以小白湯進之猶可生也若附子理中湯殺之耳安可用南溪兄問小白何湯也豫曰小柴胡白虎湯合而一之是也南溪兄謂泄瀉昏沉如此恐石膏不可用也豫曰此挾熱下利但使清陽上升則瀉止熱退而神氣自清也服訖夜半神氣蘇醒惟小水不利熱渴不退豫思仲景法謂渴而身熱不退小水不利者當利其小水乃以辰砂六一散一兩燈心湯調服之兩帖而瘳南溪兄曰死生信乎命也弟頃刻不至必服理中湯此婦不為泉下人哉赤水又治文貴者案與此相類云人徒見其大便作瀉為漏底不察瀉皆清水無糟粕者為熱極所致症豈五苓散所能止哉止則誤事攖寧生醫案有小柴胡加知母石膏録於陽明病中治傷寒頭痛壯熱百節疼痛方柴胡梔子仁芍藥知母各四兩升麻黃芩大青杏仁各三兩石膏八兩香豉一升上十味㕮咀以水九升煮取二升七合分溫三服若熱盛加大黃四兩千金聖惠名柴胡散方中有大黃更入生薑煎活人名梔子仁湯加甘草亦入生薑此方與次方似當入於前柴胡變方中然以柴胡石膏同用姑列於此治時氣數日不解心煩躁渴小腹脹急臍下悶痛宜服赤芍藥散方赤芍藥三分知母三分黃芩三分玄參三分麥門冬三分柴胡三分石膏二兩甘草三分上件藥搗篩為散每服四錢以水一中盞入生薑半分竹葉三七片煎至六分去滓不計時候溫服聖惠又治熱病得汗後餘熱不退頭痛心煩石膏散於本方去芍藥玄參加人參犀角屑入蔥白兩莖豉五十粒煎景嶽柴胡白虎煎治陽明溫熱表邪不解等症於本方去芍藥知母玄參生薑戰汗諸證狂汗戰栗振辨見辨證篇中陰證亦為戰見少陰病中當參傷寒六七日欲解之時當戰而汗出其有但心栗而鼓頷身不戰者已而遂成寒逆似此證多不得解何者以陰氣內盛正氣太虛不能勝邪反為邪所勝也非大熱劑與其灼艾又焉得而御之明理論蘊要若不發戰心栗鼓頷云云須用大建中湯主之凡傷寒疫病戰汗者病人忽身寒鼓頷戰栗急與姜米湯熱飲以助其陽須臾戰定當發熱汗出而解或有病人惡熱盡去衣被逆閉其汗不得出者當以生薑豆豉紫蘇等服過發之有正氣虛不能勝邪作戰而無汗者此為難治若過半日或至夜而有汗又為愈也如仍無汗而神昏脈漸脫者急以人參薑棗煎服以救之又有老人虛人發戰而汗不行隨即昏悶不知人事此正氣脫而不復蘇矣明條余見疫病有五六次戰汗者不為害也蓋為邪氣深不得發透故耳又有二三次復舉者亦當二三次作戰汗出而愈同上應汗而脈虛弱者汗之必難戰不得汗不可強助無汗即死當戰不得用藥用藥有禍無功要助其汗多用薑湯繩墨案續醫說引王止仲文集云一人病傷寒期月體競競而振齒相擊不能成語仲賓以羊肉斤許熟之取中大臠別用水煮良久取汁一升與病人服須臾戰止汗大出而愈是亦勿藥助汗之法歟應下失下氣消血耗即下欲作戰汗但戰而不汗者危以中氣虧微但能降陷不能升發也次日當期復戰厥回汗出者生厥不回汗不出者死以正氣脫不勝其邪也戰而厥回無汗者真陽尚在表氣枯涸也可使漸愈凡戰而不復忽痙者必死痙者身如尸牙關緊目上視凡戰不可擾動但可溫覆擾動則戰而中止次日當期復戰溫疫論狂汗者伏邪中潰欲作汗解因其人稟賦充盛陽氣衝擊不能頓開故忽然坐臥不安且狂且躁少頃大汗淋漓狂躁頓止脈靜身涼霍然而愈同上類編曰戰汗已屬欲解之候然尚有戰而不得汗者狂汗則不然看來狂汗未有不愈者故不須服藥所以無方此竟系輕症病六七日候至寒熱作汗之頃反大躁擾復得汗而解蓋緣候至之時汗已成而未徹或者當其躁擾誤用冷劑為害非輕不可不審也要訣梔豉三黃湯變諸方治傷寒得汗後身熱未退心神煩躁宜服此方聖惠案即系仲景梔子檗皮湯仍不録柴胡梔豉合用方既見上崔氏若胃中有燥糞令人錯語正熱盛亦令人錯語若祕而錯語者宜服承氣湯通利而錯語者宜服下四味黃連除熱湯外臺又前軍督護劉車者得時疾三日已汗解因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不得臥余思作此黃連解毒湯方黃連三兩黃芩黃檗各二兩梔子十四枚擘上四味切以水六升煮取二升分二服一服目明再服進粥於此漸差余以療凡大熱盛煩嘔呻吟錯語不得眠皆佳傳語諸人用之亦效此直解熱毒除酷熱不必飲酒劇者此湯療五日中神效忌豬肉冷水同上肘後治六七日熱極心下煩悶狂言見鬼欲起走或大下後或再三下後熱勢尚甚而不能退本氣損虛而脈不能實擬更下之恐下脫而立死不下之則熱極而死寒溫諸藥宣明作寒涼之藥不能退其熱勢之甚者或濕熱內余下利不止熱不退者或因大下後濕熱宣明作熱退利不止而熱不退脈弱氣虛不可更下者或諸濕熱內余小便赤澀大便溏泄頻並少而急痛者必欲作痢也通宜黃連解毒湯以解之也直格一人年逾五十五月間因房後入水得傷寒證誤過服熱藥汗出如油喘聲如雷晝夜不寐凡數日或時驚悸發狂口中氣自外出諸醫莫措手郭診之曰六脈雖沉無力然晝夜不得安臥人倦則脈無力耳細察之尚有胃氣不澀可治也夫陽動陰靜觀其不得安臥氣自外出乃陽證也又誤服熱藥宜用黃連解毒湯衆皆危之一服尚未效或以為宜用大青龍湯郭曰此積熱之久病邪未退藥力未至也再服病減半喘定汗止而愈類案案郭謂白雲此湯合小柴胡既見於前婦人傷寒六七日胃中有燥屎大便難煩躁讝語目赤毒氣閉塞不得流通宜瀉心三黃湯總病治熱病壅熱大便不通宜服三黃丸方黃連一兩川大黃一兩黃芩一兩上件藥搗羅為末煉蜜和丸如梧桐子大每服不計時候以溫水下三十丸聖惠案此本千金消渴中方張文仲療天行若已五六日不解頭痛壯熱四肢煩疼不得飲食大黃湯方大黃半兩黃連半兩去毛黃檗半兩梔子半兩擘上四味切以水八升煮取六七沸內豉一升蔥白七莖煮取三升分三服此許推然方外臺案肘後千金並同云岐子保命治傷寒汗下後熱結胸中大便澀微小便赤者黃連梔子湯於本方去黃檗加黃芩不用蔥豉涼膈散一名連翹飲子治傷寒半入於裡下證未全或復未愈者或此六字宣明作下後二字燥熱怫結於內而煩心懊憹不得眠者及傷寒陽明胃熱發斑下證未全者或誤服暖藥過多為諸熱證連翹一兩山梔子大黃薄荷葉去毛黃芩各半兩甘草一兩半朴硝一分上為粗末每服二三錢水一盞蜜少許或無蜜亦可舊用竹葉或亦不須煎至七分濾去滓溫服熱甚者可服四錢亦有可服一二十錢者治咽喉加桔梗一兩荊芥穗半兩直格案此方本出和劑有竹葉七片又聖惠治傷寒四日脈浮而滑腹滿口熱舌乾而渴大便不利三黃散方用黃芩梔子大黃竹葉朴消五味乃似此方之祖黃連清心湯涼膈散加黃連是也三法六門回春有桔梗云加石膏知母以解表裡之熱最為穩當西塘感症去朴硝加玄明粉導赤各半湯治患傷寒後心下不硬腹中不滿大小便如常身無寒熱漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思形如醉人庸醫不識而誤人者多矣殊不知熱傳心心火上而逼所以神昏黃連黃芩甘草犀角麥門冬滑石山梔茯神知母人參水二鍾薑棗煎之加燈心一握煎沸熱服六書紫雪黃金百兩寒水石三斤石膏三斤磁石三斤滑石三斤玄參一斤羚羊角五兩屑犀角五兩屑升麻一升當一斤沉香五兩丁子香一兩青木香五兩甘草八兩炙上十三味以水一斛先煮五種金石藥得四斗去滓後內八物煮取一斗五升去滓取消石四升芒消亦可用朴消精者十斤投汁中微炭上煎柳木箄攪勿住手有七升投在木盆中半日欲凝內成研硃砂三兩細研麝香當門子五分內中攪調寒之二日成霜雪紫色病人強壯者一服二分當利熱毒老弱人或熱毒微者一服一分以意節之合得一劑支十年許用大神妙不同餘論腳氣病經服石藥發熱毒悶者服之如神水和四分服勝三黃湯十劑外臺腳氣門引蘇恭和劑同此方又古今諸家散方中所載無磁石滑石升麻上十味切以水三斗煮取一斗麝香一兩余同本方云腳氣乳石天行熱病等服之若神石膏下云一用滑石千金翼金一斤丁香四兩朴消四升麝香半兩無滑石余同云強人服三分匕老小以意增減外臺宋校引有滑石一斤邪火毒火穿經入臟無藥可治此能消解其效如神方中黃金百兩以飛金一萬頁代之尤妙蘭臺軌範紫雪治發斑讝語蓄血三陽症煩躁作狂氣喘赤金十兩升麻六錢寒水石石膏各四兩八錢犀角羚羊角各一兩玄參一兩六錢沉香木香丁香各五錢甘草八錢上以水五升以赤金同升麻先煮至三升去金入諸藥同煎至一升濾去滓投朴消三兩二錢微火煎熬即成紫雪玉案案本方有石膏等品似當隸白虎然驗之最妙清膈故附於此
