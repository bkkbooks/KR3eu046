body:
  text: 卷十一別證感冒感冒本與傷寒治證一同但有輕重之分耳故重者為傷輕者為感感冒之中有風有寒又須詳別夫感寒則必惡寒面色黯慘項背拘急亦或頭痛發熱其脈沉遲當以五積散藿香正氣散養胃湯表之感風則必惡風面色光浮身體發熱如瘧鼻塞聲重時出清涕或咳唾稠黏其脈多浮數當以十神湯敗毒散治或風寒兼之又當用和解之藥體虛之人不可過於發散恐致他疾醫方集成感冒為病亦有風寒二證即是傷寒外證初感之輕者故以感冒名之若入里而重則是正傷寒初感用藥與太陽證一同今病人往往惡言傷寒不知輕則為感重則為傷又重則為中有其病而諱其名甚為無義特以俗呼為大病故諱言之耳有微惡風微發熱起居飲食自如常但不甚清快又不可過用表劑若投以和解養胃對金之頭不效者宜神朮散有虛人感冒發熱僅得一日熱不為久又不為重便見讝語此乃虛不禁熱不可遽用十分冷劑要訣內經曰卑下之地春氣常在故東南卑濕之區風氣柔弱易傷風寒俗稱感冒受邪膚淺之名也由鼻而入在於上部客於皮膚故無六經形症惟發熱頭痛而已醫方集解傷寒見證輕者咳嗽有痰咽乾聲重鼻燥作癢或流清涕腹脹額悶口燥喉痛重者頭痛項強肢節煩疼憎寒壯熱頭眩嘔吐心煩潮熱自汗惡風亦有無汗而惡風者匯補傷寒大汗宜禁傷風症腠理疏泄但宜輕揚之劑徹越其邪不可與傷寒家大汗之藥恐蹈亡陽之弊同上傷風久虛宜補如虛人傷風屢感屢發形氣病氣俱虛者又當補中而佐以和解倘專泥發散恐脾氣益虛腠理益疏邪乘虛入病反增劇也同上引立齋案此即陶節菴所謂勞力感寒主以補中益氣湯者也傷風寒甚者遍傳經絡已見傷寒論此言其輕淺者邪止犯皮毛皮毛為肺之合皮毛開則肺氣不得外泄故上壅而嚏蒸成涕液壅塞鼻中故聲出重濁肺氣鬱而成熱故肺癢而咳其人平素體氣寒者則無汗熱者則有汗或發熱或不發熱或頭痛或不頭痛蓋雖輕證其中又分輕重也醫碥感冒固輕惟人以其輕忽之亦足以傷生其致不醒之故亦各有因我將為子備言之以告知命者當防微而杜漸也今人感冒每率己見用藥病未除而元氣先傷以致困者一也有未冒之前元氣先虛既冒之後乘虛陷里虛邪並病醫者未及辨明而誤藥者二也有稟性怯弱情志多郁素有骨蒸虛熱之恙重冒風寒而咳傷肺絡痰紅癆嗽者三也有沉湎酒色濕熱內傷當風露臥復感風邪而成癆瘵者四也有行房不謹汗出當風邪入三陰傳為虛萎或成癆風者五也有童子室女情性執滯素多愁郁天癸不通形神羸弱偶冒風寒內熱並病而成癆者六也有體肥氣盛情性素暴不耐病苦偶冒風寒而煩躁愈甚酒色不戒飲食失調以致痰嗽咳血音啞喉痹朝涼暮熱大肉脫盡而死者七也有勞形役心負重疾走因躁熱而浴寒飲冷當風露坐以致感冒咳血而成癆者八也有師尼寡婦嫁娶愆期憂思積忿以致心相二火熾然日甚偶感風邪內外鬱蒸而成癆嗽咳血者九也有産後氣血正虛失於謹慎為風所襲邪入至陰而為煩渴內熱之恙醫者誤為産虛不知清散補斂太早則虛熱與邪熱同病而成産癆者十也此十種死症餘三十年來所見指不勝屈而觸冒之因多由感冒豈感冒遂能殺人實由根本先敗而然也證治百問香蘇散治四時感冒頭痛發熱原云治四時瘟疫傷寒今據醫方集解考陳皮二兩不去白香附子炒香去毛紫蘇葉各四兩甘草炙一兩上為粗末每服三錢水一盞煎七分去滓熱服不拘時候日三服若作細末只服二錢入鹽點服和劑衛生家寶加減香蘇散於本方加麻黃蒼朮桔梗管見良方芎芷香蘇散於本方加川芎白芷得效加蒼朮云一方加沉香名沉香飲子十神湯治時令不正瘟疫妄行人多疾病或風寒濕痹可服之陳橘皮去白麻黃去根節川芎甘草炙香附子杵去毛紫蘇去粗梗白芷升麻赤芍藥各四兩乾葛十四兩上為細末每服三大錢水一盞半生薑五片煎至七分去滓熱服不拘時候和劑是齋神授太乙散於本方去麻黃加青皮得效香葛湯於本方去麻黃加蒼朮參蘇飲治一切發熱頭疼體痛前胡人參紫蘇葉乾葛半夏茯苓各三分枳殼陳皮甘草桔梗各半兩上㕮咀每服四錢水一盞半生薑七片棗子一個煎至六分去滓不以時候服尋常感冒風寒頭目昏重鼻流清涕宜用此藥加川芎半兩煎服易簡案此方本出三因痰飲門無干葛有木香云嘔者加乾葛腹痛加芍藥和劑加木香淡寮十味芎蘇散於本方去前胡人參加川芎柴胡敗毒散治傷風溫疫風濕頭日昏眩四肢痛憎寒壯熱項強目睛疼尋常風眩拘倦風痰皆服神效羌活洗去土獨活去蘆前胡去蘆柴胡去苗芎藭枳殼麩炒去穰白茯苓去皮桔梗去蘆頭人參已上各一兩甘草半兩炙上件搗羅為末每服三錢入生薑二片水一盞煎七分或沸湯點亦可老人小兒亦宜日三二服以知為度瘴煙之地或溫疫時行或人多風痰或處卑濕腳弱此藥不可闕也活人和劑名人參敗毒散入生薑薄荷煎方訣聖濟並同名羌活散方訣云此古方也簡易云初虞世究其方知出道藏聖濟前胡湯於本方去獨活茯苓桔梗加芍藥麻黃入蔥白煎如要發汗更入薄荷真武湯專一發散四時不正之氣及傷寒未分證候瘡疹欲出未出並宜服之苦桔梗荊芥穗薄荷葉紫蘇葉乾葛甘草節瓜蔞根牛蒡子各等分上八味並無制度同為粗末每服三錢水一盞煎至七分去滓不拘時候溫溫服日進三五服葉氏神朮散治傷風鼻塞聲重咳嗽頭昏蒼朮五兩米泔水浸一宿藁本去土香白芷羌活去蘆頭細辛去葉土甘草炙川芎已上六味各一兩上件為細末每服三錢水一盞生薑三片蔥白三寸同煎至七分溫服不拘時候如微覺傷風鼻塞只用蔥茶調下楊氏案潔古九味羌活湯蓋一類方也神白散治四時傷寒在表渾身壯熱口苦舌乾惡風無汗蒼朮米泔浸一宿去皮焙乾稱一兩半麻黃一兩去根節甘草一兩炙防風一兩去蘆石膏一兩研乾葛一兩川芎一兩香白芷半兩瓜蔞根半兩上為末每服二錢水一盞入生薑三片蔥白三寸煎至七分熱服如傷風身熱面赤脈大以衣覆出汗即愈家寶袖珍引祕方喝起散於本方去白芷瓜萎根加羌活小青龍湯若其狀灑淅惡寒但欲厚衣近火陰陽二字疑頭重時痛鼻窒塞濁涕如膿痰動輒汗出亦或無汗甚則戰栗此由寒邪之氣從外入中或因飲冷客於肺經內外合邪留於經絡謂之感寒寒從外至則兩手寸口脈俱緊或寒從內起其脈帶遲惡寒無汗者十便引指迷方即仲景原方三拗湯治感冒風邪鼻塞聲重語音不出或傷風傷冷頭痛目眩四肢拘倦咳嗽多痰胸滿氣短麻黃不去根節杏仁不去皮尖甘草生用各等分上㕮咀為粗末每服五錢水一盞半薑錢五片同煎至一盞去滓通口服以衣被蓋覆睡取微汗為度和劑淡寮五拗湯治感寒而語聲不出或至咽喉腫痛於本方加桔梗京芥穗五味各等分生薑三片同煎溫溫咽服咽痛痛甚熟後加朴消少許清肺湯深都正方陳紫蘇六兩陳皮六兩甘草三兩香附子六兩桑白皮三兩杏仁三兩桔梗三兩半夏四兩上件為粗末每服五錢水一盞半薑五片棗子一個煎七分去滓通口服方氏家藏方三奇湯治感寒語聲不出桔梗一兩銼蜜拌甑上蒸甘草半兩半生半炒訶子大者四個上為細末每服十錢匕入沙糖一小塊水五盞煎至三盞細細呷一日服盡效甚速聲未出再服十便引家藏方治傷風后耳聾仲淳定甘菊花二錢石菖蒲忌鐵一錢柴胡六分栝蔞根二錢貝母去心二錢前胡一錢甘草六分北細辛四分蘇梗一錢桑白皮忌鐵二錢加竹瀝一杯不拘時服廣筆記時毒大頭病夫時毒者為四時邪毒之氣而感之於人也其候發於鼻面耳項咽喉赤腫無頭或結核有根令人增寒發熱頭痛肢體痛甚者恍惚不寧咽喉閉塞人不識者將為傷寒便服解藥一二日腫氣增益方悟始召瘡醫原夫此疾古無方論世俗通為丹瘤病家惡言時毒切恐傳染考之於經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為謂之丹瘤與夫時毒特不同耳蓋時毒者感四時不正之氣初發如傷寒五七日之間乃能殺人治之宜精辨之先診其脈滑數浮洪沉緊弦澀皆其候也蓋浮數者邪在表也沉澀者邪氣深也認是時毒氣實之人急服化毒丹以攻之熱實以五利大黃湯下之其有表證者解毒升麻湯以發之或年高氣軟者五香連翹湯主之又於鼻內嗅通氣散取十餘嚏作效若嗅藥不嚏者不可治之如嚏出一血者治之必愈如左右看病之人日日用嗅藥嚏之必不傳染切須忌之其病人每日用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之服犀角散連翹散之類至七八日大小便通利頭面腫起高赤者可服托裡散黃耆散宜針鎌砭割出血泄其毒氣十日外不治自愈也此病若五七日已前精神昏亂咽喉閉塞語聲不出頭面不腫食不知味者必死之候治之無功矣然而此疾有陰有陽有可汗有可下嘗見一工但云熱毒只有寒藥殊不知病有微甚治有逆從不可不審者矣外科精義時疫胳𦞂腫毒病者古方書論所不見其説古人無此病故方無此説唯正隆楊公集拯濟方內言自天眷皇統間生於嶺北次於太原後於燕薊山野村坊頗罹此患至今不絶互相傳染多致死亡至有不保其家者狀似雷頭腫弘咽頸攻內則喉嚨堵塞水藥難通攻外則頭面如牛眼耳穴盈視聽俱非杜絶聞見病惡命危雖布避汗之益深疏利頗差初見憎寒稍厥飲水脈沉不可溫辛發汗急以大黃芒消之類苦泄寒涼之劑加倍並服得快利方可為救毒氣稍退漸減涼藥理之咽堵食藥不下先灌生油半盞自然能通後於本方選而用之道衰德廢仁殞義湮瘴厲戈烽兆彰惡貫端效方大頭者一曰時毒二曰疫毒也蓋天行疫毒之氣人感之而為大頭也或壯熱氣喘口乾舌燥或咽喉瘇痛不利其脈數大者普濟消毒飲主之若內實熱甚者以防風通聖散增損主之大抵治法不宜大速攻則邪氣不伏而反攻內必傷人也且頭面空虛之分邪既著空處則無所不至也所以治法必當先緩而後急則邪伏也凡先緩者且宜清熱消毒如虛人兼益元氣胃虛食少者兼助胃為主待其內實熱盛大便結以酒浸大黃下之則宣熱而拔其毒也此為先緩後急之法也蓋此毒先從鼻腫者次腫於目又次腫於耳從耳至頭上絡後腦結塊則止不散必出膿則愈也蘊要發毒看法初起寒熱交作頭面一處作腫紅赤發熱疼痛者易已成高腫發熱疼痛有時語聲清朗湯藥易入者輕已潰膿稠堅腫稍消疼痛稍減飲食漸進身溫者吉潰後膿水漸止腫退肌寬神彩精寧睡臥安穩者順初起多寒少熱頭面耳項俱腫光如水晶不熱者險已成漫腫無頭牙關緊閉湯水不入聲音不出者逆已潰膿水清稀氣味敗臭腫痛不除如尸發胖者死潰後臭水淋漓腫不知痛手足多冷常出譫言者死正宗時毒治法寒熱交作頭痃體痛六脈浮緊邪在表也宜汗散之頭面赤腫作痛口燥咽乾大便祕實邪在裡也下之外有寒熱內亦口乾脈弦有力表裡俱實發表攻裡表裡俱解腫痛仍不消者乃瘀血凝滯宜砭去惡血砭血之後腫痛仍作不消者已欲作膿宜托膿健脾腫痛日多而脹痛者已有膿急針之更兼補托脾胃潰後腫痛不減膿清腥穢脾胃弱也更宜溫中健脾飢年時毒流行傳染者忌用攻發當和解宜養正氣同上一男子先發寒熱次日頭面俱腫又二日口禁湯水不入診之脈洪數而有力此表裡俱實也又咽喉妨礙湯藥難下先用針刺咽間去惡血鍾許牙關稍開以防風通聖散一劑徐徐服之便去三四次腫上砭去惡血以金黃散敷之次日腫勢稍退又以普濟消毒飲二劑面腫漸消惟兩耳下堅腫不退此必作膿又以托裡散數服候膿熟而針之次以十全大補湯去肉桂加陳皮十餘劑而斂同上泰和二年先師以進納監濟源稅時四月時多疫癘初覺憎寒體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如染之多不救張縣丞侄亦得此病至五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至危篤或曰李明之存心於醫可請治之遂命診視具説其由先師曰夫身半以上天之氣也身半已下地之氣也此邪熱客於心肺之間上攻頭目而為腫盛以承氣下之瀉胃中之實熱是誅罰無過殊不知適其所至為故遂處方云云為細末半用湯調時時服之半蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有病者皆書方以貽之全活甚衆時人皆曰此方天人所制遂刊於石以傳永久普濟消毒飲子黃芩黃連各半兩人參三錢橘紅去白玄參生甘草各二錢連翹黍黏子板藍根馬勃各一錢白殭蠶炒七分升麻七分柴胡二錢桔梗二錢上件為細末服餌如前法或加防風薄荷川芎當歸身㕮咀如麻豆大每服稱五錢水二盞煎至一盞去滓稍熱時時服之食後如大便硬加酒煨大黃一錢或二錢以利之腫勢甚者宜砭刺之東垣試效方曾見患大頭瘟者頭面腫甚目不能開憎寒壯熱頭痛煩躁渴欲飲冷依法用普濟消毒飲解其表而清其里外用瓜蒂散嗅鼻取出黃水以瀉髓臟熱毒則頭痛自止再服前藥數劑而安舒氏漏盧湯治臟腑積熱發為腫毒時疫胳𦞂頭面洪腫咽嗌堵塞水藥不下一切危惡疫癘若腫熱甚加芒消快利為度利已去硝漏盧升麻大黃黃芩各一兩藍葉玄參各二兩上六味為粗末每服四錢水一盞半煎至六分去渣溫服腫熱甚加芒消二錢半端效方寶鑑同案此本聖惠治熱病毒氣攻皮膚生瘡漏盧散今去木通犀角梔子甘草加大黃黃芩消毒散消胳𦞂腫毒會洛州張孔目方大黃牙硝青黛等分上為細末水調鵝翎掃立消端效四神散大名王國祥方川大黃寒水石各一兩牛蒡子芒硝各半兩上為細末新水調塗腫上咽喉腫塞生蜜調時時含化咽津妙端效通氣散治時氣頭面赤腫或咽喉閉塞不通用之取嚏噴七八遍泄出其毒則差玄胡一兩五錢豬牙皂角川芎各一兩藜蘆五錢躑躅花二錢五分正宗作羊躑躅花上為細末每用紙捻子蘸一米許紝於鼻中取嚏取效精義荊防敗毒散治時毒初起頭痃惡寒腮項腫痛脈浮者服之即敗毒散加荊芥防風正宗蘊要更加牛蒡子若內熱加酒炒黃芩一錢熱盛更加酒炒黃連五利大黃湯治時毒焮腫赤痛煩渴便祕脈實有力者服之大黃煨黃芩升麻各二錢芒硝梔子各一錢二分水二鍾煎八分空心服未利者渣再煎正宗案此即千金五利湯連翹消毒飲治時毒表裡二證俱罷余腫不消疼痛不退者連翹川芎當歸赤芍藥牛蒡子薄荷黃芩天花粉甘草枳殼桔梗各一錢升麻五分水二鍾煎八分食後服便燥者加灑炒大黃正宗案蘊要發頤門方與此稍異云未消加穿山甲防風通聖散治時毒惡寒發熱煩躁口乾表裡脈症俱實者防風白芍薄荷川芎桔梗山梔黃芩白朮當歸連翹荊芥麻黃滑石石膏各一錢甘草五分芒硝一錢五分大黃酒炒二錢水二鍾煎八分空心溫服正宗此本河間方牛蒡芩連湯治積熱在上頭項腫起或面腫多從耳根上起俗曰大頭瘟黃芩酒炒二錢黃連酒炒一錢半桔梗一錢半連翹牛蒡子微炒玄參各一錢大黃荊芥防風羌活石膏各一錢半甘草一錢上銼一劑生薑一片水煎食後細細呷溫服每一盞做二十次服常令藥在上勿令飲食在後也回春案此本六書芩連消毒湯今去柴胡枳殼射干白芷加玄參石膏托裡消毒散治時毒表裡俱解腫尚不退欲其作膿者服之正宗十全大補湯治時毒潰後膿水清稀形容消瘦脾胃虛弱飲食減少虛熱不睡自汗盜汗及不收斂者服之正宗
