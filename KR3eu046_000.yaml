body:
  text: 序余弟亦柔夙承箕業與余同硯席交師友議論切劘矻矻窮年以研方術為念頃著一書謂余曰傷寒之為病也自古稱以大病謂為難治南陽張子所以傷宗族之淪喪慨時士之矇昧尋訓以定經方也苟志於醫者固當究之急務孰不講明其理乎然退而思繹歷代諸家治傷寒之法似不甚通曉張子之意先君子所編輯義芟除轇轕精義入神經旨於是無復余蘊焉弟更憾古人之為其説者雜糅多歧有使後學猶不得窺張子之門牆者蓋軒岐所敘只是熱病表陽里陰以分六經準日期擬汗下言常而不及變舉綱而不及目張子觸類長之以陰陽標寒熱以六經配表裡虛實常變兼該細大不遺立名約而析事明使人易辨識但總外感而名傷寒先聖後聖其揆一也後人不察張子內經兩途分鑣之故彼此傅會強配其目或不知傷寒為外感總謂實求邪氣以立名類若夫據當時流傳之證與自己試驗之方以為一家言有強辨奪理眩人心目欲高駕於張子之上以律千百世者於是爾來醫流或尊一繼禰之小宗而置大宗乎不問或自命太高徒懸揣經文不欲旁涉群典以為會通張子之微言奧義幾熄矣要之宋以上則因循套習金源以下則務標新異然至其深造自得之妙則所謂治彼雖偏治此則是者未始不補張子萬分之一而有功於救生也弟不顧譾劣竊裒諸家之要而成此編以其廣經旨題曰廣要然豈敢謂列於作者之林不過為自驗學術之地與備及門之尋檢而已余執而閲之書凡十二卷為篇凡十有四其所採録凡一百五十餘家詮次排類原之經旨自診候平證以至飲食將養之法莫不賅載其醇駁異同之際精汰嚴收去取有法而不敢贊一辭於其間意在於尊古也亦柔為人清修謹飭不類余落落然宜乎擇言之精援證之確至於斯矣夫傷寒證有真假而表裡虛實固無定局治有權宜而補瀉溫涼又無常套自非平素講求探其理致則於見病知源之理未必能有所領會焉亦柔克踵先君子輯義之著而為此舉其意微矣余今更記亦柔之言以為之序諭後之讀是書者云文政丁亥仲夏胞兄元胤紹翁識於蒼雪山房之南軒
