body:
  text: 卷九兼變諸證下嘔吐病後嘔吐乾嘔嘔者有聲者也吐者吐出其物也故有乾嘔而無干吐是以於嘔則曰食谷欲嘔及吐則飲食入口即吐則嘔吐之有輕重可知矣傷寒嘔有責為熱者有責為寒者至於吐家則悉言虛冷也經曰太陰之為病腹滿而吐食不下又曰胃中虛冷故吐也嘔家則不然嘔有熱者有寒者有停飲者有胃脘有膿者諸如此者雖為殊別大抵傷寒表邪欲傳裡裡氣上逆則為嘔也是以半表半裡證多雲嘔也嘔家之為病氣逆者必散之痰飲者必下之千金曰嘔家多服生薑此是嘔家聖藥是要散其逆氣也金匱要略曰嘔家用半夏以去其水水去嘔則止是要下其痰飲也嘔多雖有陽明證不可攻者謂其氣逆而未收斂為實也其嘔而脈弱小便複利身有微熱見厥者已為難治蓋謂其虛寒之甚也醫者必審其邪氣之虛實疾證之逆順為施藥丸治則當矣明理此係節錄案總括亦辨生薑半夏云嘔有熱有寒生薑於寒證最便若太陽不與少陽陽明合病而獨見太陽證或吐瀉者此句恐訛恐病人膈間素有痰飲停飲傷滯且以二陳湯定之候嘔吐定徐進解太陽經藥詐大凡得之太陽而嘔者必是合病嘔乃病漸入內非正太陽也曾記有人初得病太陽證有嘔吐不住藥投暖劑莫能治之知太陽已汗解固當用冷劑是太陽見嘔非合陽明則合少陽其嘔屬熱用暖劑非矣曾見太陽證大嘔因嘔吐藥只解表有除又記有人初病具太陽證而嘔一家少長患狀悉類與養胃湯八服無不立效此時行之氣適然如此是為傷寒雜病又非可以正經傷寒律之要訣凡嘔而不止者藥內必少加生薑汁一二匙服之最效凡服藥宜徐徐呷下不可急也蘊要範汪方治傷寒五六日嘔而利者黃芩湯方黃芩三兩半夏半升人參二兩桂心二兩乾薑三累大棗十二枚凡六物水七升煮得二升分再服醫心方案此方既出金匱附方中據外臺本是仲景方友人王曉同寓雲中一僕十九歲患傷寒發熱飲食下咽少頃盡吐喜飲涼水入咽亦吐號叫不定脈洪大浮滑此水逆證江應宿投五苓散而愈類案治傷寒嘔噦心下悸動胸膈有滯水往往頭眩茯苓半夏湯方赤茯苓去黑皮二兩半夏湯洗七遍炒乾三兩陳橘皮湯浸去白焙一兩上三味粗搗篩每服五錢匕水一盞半人生薑一分拍碎同煎至七分去滓溫服晚再服聖濟案此即二陳湯去甘草大汗下後惡寒厥逆水藥不得入口身痛自利真武湯加半夏下黑錫丹與太陽病發汗後水逆之五苓散證不同嘔吐煩渴者白虎湯緒論曾氏家學治吐逆大小便不通厥逆無脈大承氣下之愈治例案此本出本草衍義云此關格之病極難治蘆根飲子治傷寒後嘔噦反胃及乾嘔不下食方生蘆根切青竹茹各一升粳米三合生薑三兩上四味以水七升先煮千里鞋底三隻取五升澄清下藥煮取二升半隨便飲不差重作取瘥千金案今用伏龍肝以代鞋底為佳聖惠治傷寒乾嘔不下食於本方加陳橘皮不用鞋底治時氣病差後勞復發熱嘔吐不下宜服蘆根飲子方蘆根二兩竹茹二兩人參二兩陳橘皮一兩生薑二兩石膏四兩上件藥都銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服聖惠又治時氣十日已上時有嘔逆欲得飲水此胃中伏熱不散宜服犀角散於本方去人參橘皮加犀角麥門冬黃芩川樸消有陽證病新瘥後見嘔別無所因此餘熱在胃脘也宜竹葉石膏湯案此本於活人云加生薑或橘皮竹茹湯要訣加味竹茹湯治胃中壅熱而噦嘔者橘紅二錢半夏二錢茯苓二錢甘草五錢竹茹一團黃連姜炒一錢葛根一錢半上用水二鍾煎至一鍾若心下痞滿加綠枳實麩炒一錢蘊要熱氣在脾胃也或發汗解後或大下之後胃中不和尚有蓄熱熱氣上熏則心下否結故乾嘔也巢源治傷寒乾嘔不止心胸煩躁四肢熱宜服柴胡散方柴胡一兩半黃芩三分麥門冬一兩半夏半兩枳殼一兩枇杷葉三分甘草半兩人參半兩上件藥搗粗羅為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服聖惠疫邪留於心胸胃口熱甚皆令嘔不上下之嘔當去今反嘔者此屬胃氣虛寒少進粥飲便欲吞酸者宜半夏藿香湯一服嘔立止穀食漸加溫疫論半夏藿香湯半夏一錢五分真藿香一錢乾薑炒一錢白茯苓一錢廣陳皮一錢白朮炒一錢甘草五錢水姜煎服溫疫論噦本門方說其云咳逆咳噫呃忒者並系噦之謬稱伏熱在胃令人胸滿則氣逆氣逆則噦若大下後胃氣虛冷亦令致噦也巢源呃忒有因胃熱失下而作有因胃中有痰飲而作有因寒涼過多中虛冷而作且其氣皆從胃中起至胸嗌之間而為呃忒矣易老治法失下胃熱因實大便硬者以承氣湯下之大便軟者以瀉心湯主之胃虛有熱者橘皮竹茹湯主之有痰飲者半夏生薑湯主之或茯苓半夏湯主之若胃冷者橘皮乾薑湯加味理中湯主之如冷極呃逆不止者或灸期門中脘氣海關元亦佳但要取手足溫暖脈生陽回陰退則可生矣蘊要節錄案活人若服藥不差者灸之必愈其穴似期門當考胃氣逆則為呃逆治法各從其本證而消息之如見白虎證則投白虎見承氣證則投承氣膈間痰閉則宜導痰如果胃寒丁香柿蒂散宜之不若四逆湯功效殊捷要之但治本證呃自止其他可以類推矣溫疫論類編云柿蒂治呃寒熱藥中俱可加入猶茵陳之兼治陰黃陽黃也不可不知夫傷寒與痢疾至發呃病已篤矣非大溫補不可然而呃有虛呃有實呃有敗呃虛者溫補之敗呃死實呃者乃氣機不得流通升降失其常度氣反上衝而兀兀有聲也直解打呃一證有虛寒有實火若胃實閉結陽火上衝而打呃者真陰立盡之候也法宜急下以救其陰若脾氣虛寒健運無權氣不調達而打呃者其勢緩非死證法宜溫中散逆舒氏傷寒當下失下胃火上衝而呃者其證燥渴內熱大便閉結大柴胡湯下之便不結瀉心湯主之三陰中寒胃氣欲絕而呃者其證厥冷惡寒下利清穀附子理中湯合丁香散溫之呃止則吉不止則凶也心悟凡噦而二便不通者屬實熱厥逆自利為虛寒兼呃逆者為停飲案此句意不了設非此三種則為胃氣垂絕之候多難治若有疝瘕動氣又當別論不可忽也有因誤服寒涼或飲冷水水停心下胃中虛冷而作脈必結代當與溫中利水此為夾水勿疑代脈為死證也凡久病而見呃逆者此真氣已衰不治呃逆脈散舌短灰黑反頭汗不得尿與大便自利而腹滿者皆死緒論以上總證黃連解毒湯白虎湯傷寒熱症醫者誤用薑桂等藥助起火邪相搏而呃逆者回春三黃瀉心湯小承氣湯調胃承氣湯並治實熱發呃準繩凡咳逆多有先熱而吃生冷或涼藥多相激而成蓋陰陽二氣相搏林人之僕本發大熱以涼藥下之想大甚咳逆四五日竟至於服丁香柿蒂而後卻以小柴胡之屬解其餘熱遂愈下後蓋有身熱不解活人以上胃熱若飲水過多心下否而咳逆者五苓散主之別無惡侯是也略例有旋覆代赭湯證其人或咳逆氣虛者先服四逆湯胃寒者先服理中湯次服旋覆代赭湯為良活人案噦有宜旋覆代赭湯者然不須先服他藥半夏生薑湯治噦欲死生薑二兩切半夏洗一兩一分上以水二盞煎至八分去渣分二服活人案煎服法當從金匱以上停水簡要濟眾治傷寒咳噫不止及噦逆不定丁香一兩乾柿蒂一兩焙乾搗羅為散每服一錢煎人參湯下無時服證類濟生名柿蒂湯每服四錢水一盞半姜五片煎至七分去滓熱服不拘時服中藏經治傷寒咳逆噎汗於本方加甘草良薑為末用熱湯猛點乘熱一服效活人引名丁香散心悟同以乾薑代良薑治傷寒後嘔噦不下食方半夏一兩草豆蔻一兩去皮丁香半兩上件藥搗細羅為散每服不計時候以濃生薑湯調下一錢聖惠又治產後咳癔丁香散於本方去半夏草蔻加白豆蔻伏龍肝愚每治噦於套劑中加伏龍肝得效因附之治傷寒嘔噦不止柿蒂湯方乾柿蒂七枚白梅三枚上二味粗搗篩只作一服用水一盞煎至半盞去滓溫服聖濟呃逆用乾柿蒂七枚煎湯呷之發厥厥冷脈細氣短即加白沉香散黑錫丹極則臍心著灸家寶傷寒後咳噫肉豆蔻湯肉豆蔻一個石蓮肉炒茴香各一分丁香半分生薑人參各二兩杷葉五片拭去毛㕮咀水三升煎至一升半分四服空心暖飲之總病加味理中湯即理中加丁香一錢橘紅二錢半夏二錢柿蒂炒五分蘊要加味附子湯人參二錢白朮二錢白芍藥炒一錢白茯苓二錢附子用半正大者一個生薑自然汁和麵包裹於熱灰火中煨熟去皮臍切作八片用乾薑炒二錢肉桂一錢吳茱萸一錢茴香炒一錢沉香一錢丁香一錢上用水二鍾煎至一鍾服蘊要聖濟人參湯與此相類錄出病後虛弱中當參以上胃寒自利滯下病後利傷寒病若表實裡虛熱乘虛而入攻於腸胃則下黃赤汁若濕毒氣盛則腹痛壯熱下膿血如魚腦如爛內汁若寒毒入胃則腹滿身熱下清巢源自利者有不經攻下自然溏泄者謂之自利也傷寒自利多種須知冷熱虛實消息投湯無致失差雜病自利多責為寒傷寒下利多由協熱其與雜病有以異也表邪傳裡裡虛協熱則利不應下而便攻之內虛協熱遂利是皆協熱也案此云協熱者本於傷寒例乃指熱陷入里而言以下諸說皆為然自利宜若可溫理中白通諸四逆輩皆溫藏止利之劑又有腸胃有積結與下焦客邪皆溫劑不能止之必也或攻泄之或分利之而後已大抵下利脫氣至急五奪之中此為甚者其或邪盛正虛邪擁正氣下脫多下利而死明理協熱利者臍下必熱大便赤黃色及腸間津汁垢膩謂之陽垢寒毒入胃則臍下必寒腹脹滿大便或黃白或青黑或下利清穀濕毒氣盛則下利腹痛大便如膿血或如爛肉汁也寒毒入胃者四逆湯理中湯白通湯加附子四逆散加薤白主之協熱利者黃芩湯白頭翁湯三黃熟艾湯薤白丸赤石脂丸濕毒下膿血者地榆散黃連阿膠散活人案黃連阿膠散不是仲景方寶鑑補遺作仲景黃連阿膠湯宜從大抵陽熱之利與陰寒之利自不同陽利糞色必焦黃熱臭出作聲臍下必熱得涼藥則止得熱藥則愈增陰利必洞下清穀糞色或白或淡黃臍下多寒宜溫中止瀉之劑此之謂陰利云云緣陰中亦有陽利不可因下利便以為陰也又有內不太滿猶生寒熱未可下而便下之內虛熱入挾熱自利臍下必執大便赤黃色及下腸間津汁垢膩名曰利腸當作刮腸宜白頭翁湯黃芩湯身熱下利皆屬陽經然陰利有反發熱或初病無熱利後卻熱或初得病即身熱繼而自利寒既在裡為主則陽氣必客於外所以外反熱十八字依發熱條補又有大便秘五六日以藥利之利遂不止用極熱劑方差陽有利陰有秘當更以他證別之要訣大便瀉利小便清白不澀完穀不化其色不變有如騖溏或下利腥穢小便澄沏清冷口無燥渴其脈多沉或細或遲或微而無力或身雖發熱手足逆冷或惡寒踡臥此皆屬寒也凡熱症則口中燥渴小便或赤或黃或澀而不利且所下之物皆如垢膩之狀或黃或赤所去皆熱臭氣其脈多數或浮或滑或弦或大或洪也亦有邪熱不殺穀其物不消化者但脈數而熱也口燥渴小便赤黃以此別之矣蘊要凡大柴胡湯小承氣湯大承氣湯皆主下利之藥也蓋傷寒內實腹中有燥屎結滯則稀糞水從溏流下為利也故其脈則滑數有力或潮熱譫語乃可下之必再以手按臍腹少腹硬痛者是也三方俱為通因通用之法炒在能識之矣同上手足厥冷惡寒腹痛脈微欲絕下利清穀之類此固陰寒之甚者也其於疑似之間則猶有真辨凡傷寒下利由熱邪者必有煩躁大熱酷欲冷水等證亦必有洪滑強盛數實等脈如果表裡俱熱方可作火證論治若其脈雖數而無力外雖身熱而不惡熱內雖渴而不喜冷此其內本不熱而病為下利者悉屬腎寒瀉利亡津無有不渴但渴欲飲水愈多愈快者為陽證若口雖欲水而腹不欲咽者即非陽證矣此外如渴欲茶湯者乃瀉渴之當然也不得悉認為陽證景岳傷寒熱甚失於汗下唇焦口燥能飲水大便秘硬小便赤澀時有稀糞水利出者此內有燥屎結聚乃旁漏之物非冷利也再審有屎氣極臭者是也其脈雖沉切之必滑有力或時躁熱不欲衣被或揚手擲足或詀語有力此陽氣亢極輕者人參白虎湯或小柴胡湯合解毒湯主之內實者須下之有潮熱者大柴胡加芒消西塘感症下利有利膿血者有利稀溏糞者有利清穀者有利清水汁沫者下清穀者為虛為寒下清水者為實為熱惟膿血稀溏汁沫有寒有熱有虛有實有寒熱相半虛實相兼須要細察病源用藥方無有誤若後重逼迫解後仍不減腹痛喜按作嘔不食心恍惚而煩或動悸或頭暈耳鳴口淡燥而不欲飲脈弦而大或數而虛現此脈證者無論膿血稀溏汁沫皆虛寒也若腹痛後重解後稍減意欲暢解而不得能食食下即脹腹中有塊按之痛口苦舌乾渴喜冷飲或熱湯病雖憊而神不減或新病氣實未經消導即消導亦不甚多脈滑而長或緩而緊反不數無虛證此實熱也然亦有實寒者又當臨時審證察脈而得之書不能盡言也直解以上總證脈浮表不解自利或小便不利者五苓散一切瀉痢間作桂苓甘露飲溫濕內甚而作痢者黃連解毒湯標本治傷寒吐熱頭痛四肢煩疼未經發汗下之太早遂令汗出下痢不止宜服阿膠散方阿膠一兩黃連三分葛根一兩黃芩三分上件藥搗粗羅為散每服三錢以水一中盞煎至六分去滓不計時候溫服聖惠治傷寒吐下後毒氣不解致成下痢是陰陽二氣未和宜服黃連散方聖惠案此係乾薑黃芩黃連人參湯仍不錄崔氏療時行數日而大下熱痢時作白通諸藥多不得止吾思舊方多療傷寒後下痢耳未有尚在數日便兼除熱止下者也四順湯熱白通苦溫故吾思作此湯以救數十人兼主傷寒黃連龍骨湯方黃連三兩止利除熱黃檗三兩止利除熱熟艾如雞子一枚除熱毒止利龍骨二兩止利除熱上四味切以水六升煮取二升半分三服無不斷者忌豬肉冷水外臺活人三黃熟艾湯於本方去龍骨加黃芩集驗療傷寒後下利膿血蘗皮湯方黃蘗二兩黃連四兩梔子仁十四枚擘阿膠一兩炙上四味切以水六升煎三味取二升去滓內膠令烊溫分再服忌豬肉冷水範汪同外臺活人黃連阿膠湯治傷寒熱毒入胃下利膿血即本方治傷寒煩熱不解下痢困篤宜服大青散方大青一兩甘草一兩阿膠一兩赤石脂一兩梔子仁半兩上件藥搗篩為散每服五錢以水一大盞入豉五十粒薤白三莖煎至五分去滓不計時候溫服聖惠案此本出肘後今加梔子仁薤白治傷寒熱毒入胃大便膿血腹中㽲痛宜服此方黃連半兩赤石脂一兩當歸半兩乾薑一分赤芍藥半兩黃芩半兩上件藥搗篩為散每服三錢以水一中盞入粳米五十粒煎至六分去滓不計時候溫服聖惠此本外臺崔氏療傷寒熱利黃連丸今加芍藥黃芩粳米為散用治熱病毒氣攻腸胃大便或時瀉血煩悶妄語升麻散方川升麻一兩川大黃半兩地榆半兩當歸三分赤芍藥半兩枳殼半兩黃芩半兩甘草半兩上件藥搗粗羅為散每服三錢以水一中盞煎至五分去滓不計時候溫服聖惠下後脈數不退下利不止必協熱而便膿血用犀角地黃湯明條以上陽證肘後療傷寒若下膿血者赤石脂湯方赤石脂二兩碎乾薑二兩切附子一兩炮破上三味以水五升煮取三升去滓溫分三服後臍下痛者加當歸一兩芍藥二兩用水六升煮忌豬肉範汪張文仲同外臺案聖濟加當歸芍藥名赤石脂湯又白通湯療傷寒泄痢不已口渴不得下食虛而煩方大附子一枚生削去黑皮破八片乾薑半兩炮甘草半兩炙蔥白十四莖上四味切以水三升煮取一升二合去滓溫分再服渴微嘔心下停水者一方加犀角半兩大良忌海藻菘菜豬肉範汪同張仲景傷寒論云云本無甘草仍不加犀角外臺案聖惠加犀角治上證範汪療傷寒下利脈微足厥冷通草湯方通草一兩乾薑一兩枳實四兩炙人參一兩附子一枚炮令裂破上四味切以水六升煮取二升適寒溫飲五合日三不差稍加至七合忌豬肉外臺四柱散治陰證內寒腹痛泄瀉不止人參木香原作白朮據和劑改白茯苓各二錢附子炮去皮臍一個切作八片用生薑五片大棗二枚上水二鍾煎至一鍾一方加肉豆蔻訶子一錢五分名六柱散蘊要案本方出和劑六柱散出濟生以上陰證下痢膿血更加發熱而渴心腹痞滿嘔而不食此疫痢兼證最為危急夫疫者胃家事也蓋疫邪傳胃十常八九既傳入胃必從下解疫邪不能自出必藉大便之氣傳送而下而疫方愈夫痢者大腸內事也大腸既病失其傳送之職故正糞不行純乎下痢膿血而已所以向來穀食停積在胃直須大腸邪氣將退胃氣通行正糞方能自此而下今大腸失職正糞尚自不行又何能與胃載毒而出毒既不前羈留在胃敗壞真氣在胃一日有一日之害一時有一時之害耗氣搏血神脫氣盡而死凡遇疫痢兼證者在痢尤為吃緊疫痢俱急者宜檳芍順氣湯誠為一舉兩得溫疫論檳芍順氣渴專治下痢頻數裡急後重兼舌胎黃得疫之裡證者檳榔芍藥枳實厚朴大黃生薑煎服溫疫論吳又可用檳芍湯系治瘟疫之裡證而兼痢者若有外證仍當解表必如喻嘉言分三次治法始足以盡其變至表裡俱病者又當表裡分治總宜活變不可膠執說疫案喻說出法律而三次治法實不外仲景合病下利之例以上兼滯下案前所錄諸家論方亦概似滯下兼證但其言不了晰耳傷寒病後胃氣不和利候此由初受病時毒熱氣盛多服冷藥以自瀉下病折已後熱勢既退冷氣乃動故使心下幅牢噫噦食臭腹內雷鳴而泄利此由脾胃氣虛冷故出巢源案此即生薑瀉心湯證傷寒汗下後氣逆利不止者寒也枳實芍藥乾薑甘草湯芍藥甘草枳實炒乾薑炮各半兩上銼細每服五錢水煎服云岐子保命案此四逆散變方傷寒後便膿血裡急後重數至圊而不能便或少白膿有似於痢者切不可痢治以內虛而風邪下陷乘虛入客大腸也慎勿利之升舉其陽而陰氣自降矣升陽除濕除風湯蒼防朮茯芍大還案此方本出東垣先君子加葛根用效最著傷寒將退十餘日或二七外或瘥後半月餘忽腹中窘迫疼痛數起後重不快蓋因余垢未淨重傷飲食新舊相雜變為積滯當與痢疾同治明條治傷寒後一切痢疾無問冷熱腹痛黃連丸方黃連去須炒二兩木香吳茱萸湯洗三遍炒乾各一兩上三味搗羅為末麵糊和丸如梧桐子大每服二十丸空心食前米飲下聖濟傷寒汗下後裡急後重下利者七宣丸大黃一兩桃仁十二個去皮尖木香五分檳榔五錢訶子皮五錢上為細末煉蜜為丸如桐子大每服五十丸溫水下云岐子保命案此本出和劑今去柴胡枳實甘草加檳榔溫疫愈後三五日或數日反腹痛裡急者非前病原也此下焦別有伏邪所發欲作滯下也案此句不確宜芍藥湯愈後大便數日不行別無他證此大腸虛燥不可攻飲食漸加津液流通自能潤下也覺穀道夯悶宜作蜜煎導甚則宜六成湯案此證與方無類可附並存於此病愈後脈遲細而弱每至黎明或夜半後便作泄瀉此命門真陽不足宜七成湯亦有雜證屬實者宜大黃丸下之立愈溫疫論芍藥湯白芍一錢當歸一錢檳榔二錢厚朴一錢甘草七分水姜煎服裡急後重加大黃三錢六成湯當歸一錢五分白芍藥一錢地黃五錢天門冬一錢肉蓯蓉三錢麥門冬一錢照常煎服日後更燥者宜六味丸七成湯破故紙炒鍾碎三錢熟附子一錢遼五味八分白茯苓一錢人參一錢甘草照常煎服愈後更發者宜八味丸倍加附子並溫疫論以上病後蛔蟲胄中冷必吐蛔吐蛔人能皆知為陰也然亦有陽證吐蛔者蓋胃中空虛既無穀氣故蛔上而求食至咽而吐又看別證如何不可專以胃冷為說曾記一人陽黃吐蛔又大發斑陽毒證口瘡咽痛吐蛔皆以冷劑取效是亦有陽證矣要訣蛔上膈煩躁昏亂欲死兩手脈沉遲足冷便秘者多難治若蛔色赤而活或多者屬胃熱猶可治之蛔死色白而扁者屬胃敗必不治也此說殆錯舌辨云邪熱過極口閉目開譫語獨語者宜用大承氣下之燥糞必黑蛔蟲必死凡人胃脘忽痛忽止身上乍熱乍涼面上乍赤乍白脈倏亂倏靜口中吐沫不食者便是蛔厥之候緒論以上總證疫邪傳裡胃熱如沸蛔動不安下既不通必反於上蛔因嘔出此常事也但治其胃蛔厥自愈溫疫論馬印麟曰蛔厥有熱渴者黃連解毒湯有下症者承氣湯瘟疫類編若腹滿不大便熱甚昏憒而吐蛔者此胃邪薰蒸蟲不得安故逆而上或有大便糞與蛔同出者用大柴胡湯明條清中安蛔湯治胃實熱嘔吐長蟲黃連薑汁炒三錢黃柏灑炒錢半枳實麩炒二錢烏梅三個川椒去目炒去汗三十粒上五味共劑水二鍾加生薑三大片煎八分細口服如病人胃中虛熱而嘔者去枳實加人參一錢五分辨注溫熱病而吐蛔者此胃熱也胃虛有熱蟲隨熱氣上行亦吐出也宜犀角黃連湯黃連三錢犀角四錢木香五錢烏梅三個水一鍾半煎七分服大還案此本出外臺引深師療䘌瘡以上陽證如蛔厥胃中有冷飢不能食或食吐蟲宜理中湯加烏梅如宜劉氏曰凡厥陰蛔厥傷寒煩躁吐蛔口燥舌乾但欲涼水浸舌並口唇時不可離不欲咽者宜理中加烏梅選錄凡蛔厥者輕者吐小蟲重者吐長蟲舌燥口乾常欲冷水浸口不欲咽蛔上煩躁昏亂欲死兩手脈沉遲足冷至膝甚者連蛔並屎俱出大便秘而不行此症雖出多可救活也宜加味理中安蛔散並烏梅丸治之蘊要案二說似不切姑存之理中安蛔散陶尚文秘方累用之效人參三錢白朮一錢半白茯苓一錢半乾薑一錢半烏梅三個上作一服水二鍾煎七分服凡吐蛔未止加黃連黃柏各五分川椒十四粒若足冷甚者必加附子半錢或五錢量病輕重酌量用之也蘊要案原論治蛔不可用甘草並甜物今不具錄先君子曰烏梅丸主胃虛而寒熱錯雜以致蛔厥者故藥亦用寒熱錯雜之品治之而有胃虛以偏於寒而動蛔者陶華因立安蛔理中湯主之而有胃不虛以偏於熱而動蛔者因制清中安蛔湯主之此各取烏梅丸之半而治其所偏也對證施之皆有奇效蓋蛔賴食以養若病人日久不食致蟲上攻咽胃者謂之蟲因飢起人有病愈方食蟲聞食氣亦令上攻咽胃謂之蟲因食起二者皆用理中烏梅丸治之五法以上陰證
