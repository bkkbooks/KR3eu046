body:
  text: 卷七兼變諸證上誤治虛乏脈沉而數按之無力口渴身熱不退即退亦不淨神氣恍惚與湯水則飲不與則不飲時思食食亦不能下舌上微燥得湯即潤或淡紅色或有微苔或無苔此裡虛熱而少津液也直解案此不謂誤治證然以下諸方所主多有如此者仍出於茲人參奪命散無問陰陽二證傷寒日子深淺差誤服藥而成壞證垂死者服之再生人參二兩緊實者上為粗末分再服生薑三片水一盞半煎至七分通口服一時辰間連進三服覺鼻上汗出無不即活家寶破證奪命散一作丹治傷寒陰陽二證不明或投藥錯誤致患人困重垂死七日以後皆可服傳者云千不失一好人參一兩去蘆細切水一大升銀石器內煎至一盞新水沉之取冷一服而盡汗不自它出只在鼻梁尖上涓涓如水是其應也蘇韜光云侍郎方丈嘗以救數十人余宰清流日申屠倅行父之子婦産後病時疫二十餘日已成壞證偶見問因勸其一味只服人參遂安是時未知有此方偶暗合耳是齋治傷寒壞證時或發熱消渴煩躁用新羅人參不拘多少煎湯浸令冰冷候盛渴之時與之頓服熱則隨去易簡世謂傷寒汗吐下三法差謬名曰壞證昔張致和用獨參湯救治一人垂死手足俱冷氣患將絶口張不能言致和以人參一兩去蘆加附子一錢於石𤕷內煎至一碗以新汲水浸之若冰冷一服而盡少頃病人汗從鼻梁尖上涓涓如水此其驗也蓋鼻梁上應脾若鼻端有汗者可救以土在身中周遍故也近陸同婦産後患疫證二十餘日氣虛脈弱即同壞證亦以此湯治之遂愈孫真人云人參湯須用長流水煎服若用井水則不驗蓋長流水取其性之通達耳續醫説是治壞病中之誤汗吐下真氣脫而致虛者服之如神辨注凡發汗太過一時將至亡陽或身寒而栗或氣脫昏沉等候速宜煎獨參湯一兩許飲之或甚者以四味回陽飲速為挽回庶可保全否則恐致不救景嶽人參膏用頂參六兩水五碗煎取二碗復渣用水二碗煎取一碗去渣將三碗參汁合為一處緩火煎熬以箸常常攪之候汁稠厚即成膏矣凡救虛危將脫之症得此為善心悟生脈散主證互見前人參麥門冬五味子各等分上細切水煎人參之甘補氣麥門冬苦寒瀉熱補水之源五味子之酸清肅燥金名曰生脈散內外傷辨原無分量煎法今據正傳録大白誤汗太過津液外亡用生脈益氣湯即本方合補中益氣湯人參三白散發汗後脈虛人弱者人參三錢白朮白芍藥白茯苓各二錢生薑三片大棗二枚上用水二鍾煎一鍾溫服之蘊要原加桂枝今刪去寶鑑補遺不用大棗云手足冷或身微熱脈皆沉細微弱而煩躁者或用人參三白湯加竹茹案此方未審其出典先君子曰要訣云欲用真武湯且用三白湯蓋即是已而類方錯舉和劑治膀胱蘊熱方考婦人良方治血虛肌熱乞力伽散用朮苓芍甘四味殆此原方也又加減十三方加減玄武湯其方與乞力伽散相同癸未仲秋比鄰林楚畹之母勞力感寒頭眩發熱前醫誤以為太陽表症而投辛發之劑連五劑不痊及延余治六脈洪緩無力兩手微見瞤動此乃過飲表劑因致元氣大虛血不榮筋法當溫補遂用補中益氣湯加肉桂灼芍兩服熱退身涼脈亦斂再劑瞤動亦止軒岐救正論加味人參養營湯治發汗過多氣血俱虛而筋惕肉瞤者人參二錢半白朮當歸身生地黃有熱用此無熱用熟者麥門冬各一錢半茯苓甘草炙川芎肉桂有熱者減半各一錢五味子十五粒黃耆二錢半有自汗者用三錢生薑三片棗子二個水二鍾煎至一鍾去渣溫服如陰虛相火動者加知母黃柏各一錢酒炒用若陽虛下寒脈微者加熟附子一錢肉桂倍之不得眠加遠志酸棗仁各一錢蘊要案人參養營湯本出和劑痼冷門今於彼方去芍藥陳皮遠志加川芎麥門冬明條汗下過多津液衰少或病方瘥血氣尚虛是以心火不降腎水不升而口燥咽乾者必當滋陰補血之劑用滋陰養營湯於本方去朮苓芎桂耆薑棗加知母黃柏溫疫論人參養營湯於滋陰養營湯方中去黃柏加陳皮溫經益元湯治因汗下大虛頭眩振振欲劈地並肉瞤筋惕及因發汗太多衛虛亡陽汗不止熟地黃人參白朮黃耆當歸白芍藥生地黃白茯苓陳皮肉桂甘草大附子水二鍾薑一片棗一枚槌法加糯米一撮煎之溫服六書原脫附子今據赤水補撮要孫氏集效方並去熟地茯苓陳皮加乾薑案此方原為代真武湯然稍屬緩慢仍録於此韓氏曰産脫血虛者宜用羊肉湯傷寒汗下太過亡陽失血若只用救逆效必遲矣與羊肉湯為效神速病人面色雖見陽是客熱上焦中下二焦陰氣已盛若調得下焦有陽則上焦陽氣下降丹田知所歸宿矣夫氣有高下病有遠近證有中外治有輕重各適其至所為故病八九日汗下太過二脈沉細無力多踡足臥惡聽人聲皮有粟時戰如瘧宜羊肉湯主之羊肉湯方當歸白芍藥各一兩黑附子四錢炮裂去皮臍龍骨半兩燒通赤生薑二兩牡蠣一兩燒赤桂枝一錢半上為粗末每服二兩羊肉四兩蔥白四寸去黃心同銼爛以水五升一升今之大盞熬至一半以來濾絞去滓分三服服之海云陽證大汗大下後亡陽於外亡血於內上而津脫下而液脫津液兩亡宜以此湯補之矧陰證者豈可不溫補哉此與傷寒太陽證振搖與真武湯一例外之陽症至此尚溫況之陰候豈得不補耶略例案此方即當歸生薑羊肉湯合桂枝加龍骨牡蠣湯而變化之者發痙痙為發汗太過血不榮筋之候故亡血新産瘡家虛家易犯此證無論陰陽剛柔脈類總之正衰邪盛卒難救療緒論痙者發熱腹痛口噤頭搖瘛瘲不語項強背直腰身反張或目疼或目赤或閉目或反目或足冷或足溫或妄行其脈沉弦而遲亦或帶緊此為惡候不救者多若脈如雨濺散出於指外者旦暮殂也傷風頭痛發熱常出微汗又自嘔逆汗之必發痙新産血虛汗出傷風亦致發痙大發濕家汗亦作痙熱而死痙初發來多有腹痛之證內經曰戴眼反折瘛瘲汗出如珠著身不流太陽絶也其謂是乎總括初發多有腹痛似不必若發熱畏寒無汗開目仰臥口燥渴脈浮緊而數此屬陽名剛痓若自汗不惡寒閉目合面四肢不收口中和脈沉細而澀此屬陰名柔痓夫二痓皆有搐搦反張口噤咬齒等證但剛痓手足抽掣極能駭人柔痓四肢不收時或發作耳明條以上總證剛痓為之發汗柔痓為之解肌並以小續命湯加減剛痓去附子用麻黃柔痓去麻黃用生附子大便利而厥逆者則以熟附佐之嬰兒指要案小續命湯剛柔通用本出總病論見於下凡二痓並可與小續命加減服之又有大豆紫湯與竹瀝並可與服然得斯疾十愈二三耳管見良方小續命湯附子生削去皮臍五錢防風一兩半芍藥白朮人參川芎麻黃去節湯泡三次焙乾防己黃芩桂枝甘草各一兩上銼如麻豆大每服五錢匕水一盞半煎至一盞去滓取八分清汁入生薑汁再煎一二沸溫服日三夜二若柔痓自汗者去麻黃加葛根活人加葛根三字據本書痙論補案此方本出千金治中風冒昧不知痛處拘急不得轉側總病加葛根名葛根麻黃湯治小續命湯主之此言未可憑也如柔痓有汗須去麻黃無熱有寒須去黃芩防己乃可用之若剛痓熱多須去附子恐不為續命湯也用者詳之大豆紫湯治中風痱痙或背強口噤節録大豆五升清酒一斗上二味以鐵鐺猛火熬豆令極熱焦煙出以酒沃之去滓服一升日夜數服服盡更合小汗則愈一以去風二則消血結千金此本出婦人中療産後中風角弓反張又出傷損中療破傷風入四體角弓反張口噤不能言凡得此者不過五劑肘後療中風無問男子婦人中風脊急身痓如弓紫湯方雞屎二升大豆一升防風三兩切上三味以水三升先煮防風取三合汁豆雞屎二味鎗中熬之令黃赤色用酒二升淋之去滓然後用防風汁和分為再服相去如人行六七里衣覆取汗忌風外臺案千金外臺更有類方數首當考以上總治王朝奉桂枝加葛根栝蔞湯治證同栝蔞桂枝湯桂枝芍藥各一錢甘草葛根栝蔞根各二錢上㕮咀每服五錢水二盞薑五片棗二枚煎至一盞去滓服元戎若汗多亡陽下多亡陰致筋脈失養不柔和而成痙無外邪可解者惟宜補養氣血闡要編緒論云十全大補人參養營大建中湯選用凡陰證脈沉細者附子湯芍藥甘草附子湯桂枝加附子湯選用服藥後汗出身和者吉若脈來沉遲或緊細而大便自利者皆死證也緒論案三方之目原作附子散附子白朮湯其方本出聖惠活人等一系辛燥痙病液干實非所宜今所不取考醫通舉金匱諸條必配仲景溫補方亦屬牽強然此三方特為合轍仍從改易以上柔痙痙病通宜三承氣合解毒下之標本傷寒瘡瘍破傷風與傷寒治法一同但以涼膈白虎承氣臨時斟酌用之心要治傷寒剛痓壯熱頭痛筋脈不能舒展犀角大黃湯方犀角鎊大黃銼炒各一兩芎藭半兩石膏二兩牛黃研半分上五味搗羅四味為散入牛黃同研令勻每服一錢匕不拘時煎淡竹葉湯調下聖濟以上剛痙風濕大抵濕之為病易至沉深漸漬之餘淪肌浹隨於斯時也須以朮附薑桂作大劑與之藥力相接病當漸解不可以旦暮而責效焉要之治濕莫若生附蒼朮為快直指治濕莫如術然白朮性緩不如蒼朮之烈芎藭亦能逐水其説見於左傳若更挾熱而小便不利則須用茯苓防己之類以通之然亦視其輕重淺深若所感重而濕已達於藏府必不入食為嘔為泄為喘滿為四支重痛為鄭聲為眼直視睛不能轉為腳腫若臍下堅硬為虛汗非若風寒之易攻直須以雄附薑桂橘術之類作大劑與服使藥氣相接浸漬攻之積日持久乃當漸去要以生附蒼朮為主也不可以數服不見效用別藥簡易其寒多者為痛為浮腫非附子桂術不能去也其風多者為煩熱為流走為拘急非麻黃薏苡烏頭輩不能散也活人注治傷寒中風骨節疼痛煩悶不得屈伸近之則痛劇汗出短氣小便不利惡風或身微腫宜服此方麻黃二兩附子一兩白朮二兩桂心二兩赤芍藥一兩甘草一兩上件藥搗粗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服每日四五服聖惠案此本出中風中然是甘草附子湯變方三因附子麻黃湯治寒濕所中昏暈緩弱或腰背強急口喎語聲混濁心腹䐜脹氣上喘不能動轉於本方去桂心芍藥生薑加乾薑人參案此等方白朮不如用蒼朮朮附湯若但寒頭重動則眩運肌肉痠疼牽急不得轉側漐漐汗出惡寒小便不利大便反快短氣眩運足寒或時咽痛發熱此由寒濕之邪客搏經絡陽氣不得發泄蘊於肌肉之間謂之寒濕其脈遲緩而小弦蒼朮四兩芍藥茯苓各三兩人參甘草各一兩附子一兩半上為粗散每服五錢水二盞煎一盞去滓溫服十便引指迷方易簡附子湯治風寒濕合痹骨節疼痛皮膚不仁肌肉重著四肢緩縱腰腳痠疼於本方去蒼朮茯苓加白朮官桂用生附入薑煎以上重證傷濕又兼感寒則拳攣掣痛無汗慘慘煩痛五積散要訣傷濕而兼感風者若大發其汗則風去濕在已得汗而發熱不去者敗毒散加蒼朮一錢防己半錢同上防己一作防風論風濕不可汗下春夏之交人病如傷寒其人汗自出肢體重痛轉仄難小便不利此名風濕非傷寒也陰雨之後卑濕或引飲過多多有此證但多服五苓散小便通利濕去則愈切忌轉瀉發汗小誤必不可救初虞世云醫者不識作傷風治之發汗死下之死己未年京師大疫正為此豫自得其説救人甚多壬辰年豫守官洪州一同官妻有此證因勸其服五苓散不信醫投發汗藥一夕而斃不可不謹也大抵五苓散能導水去濕耳胸中有停飲及小兒吐哯欲作癇服五苓散最妙初君之説詳矣豫因廣此説以信諸人醫説引信效方凡冒露感雨濕氣內攻而胸前凝滯者此但可燥濕和中若誤下之則濕氣內攻損傷脾胃隨必變痢久則五液注下即俗名五色痢變為四肢冰冷手足開撒昏沉神倦尺寸沉微瀉遺無度錦囊以上輕證金鑑曰溫病復傷於濕曰濕溫而活人則曰傷濕而又中暑曰濕溫味其義意當遵金鑑為是蓋傷濕而又傷暑只可謂之傷暑濕而不可謂之濕溫也夫曰濕溫者是濕而兼瘟也或先瘟而中濕或先濕而患溫與暑何涉焉第瘟疫兼濕又最難辨唯於一身盡痛痛極且不能轉側惡飲湯水目中視物皆紅黃身目色微黃而無譫妄等症者辨之始得而濕症之中又有濕熱寒濕之分濕熱者小便赤澀如馬溺渾濁色白且有煩熱大便祕結諸症宜人參白虎湯主之或四苓散大小分清飲茵陳飲之類皆可擇用若天久陰雨濕氣過勝其人藏府虛大便滑小便清乃是寒濕宜朮附湯但瘟疫兼濕熱者多而兼寒濕者少北方風高土燥患此者少唯南方水鄉卑濕天氣炎熱患者但多春冬感者恆少而夏秋患者恆多所宜隨其時地而變通之説疫白虎加蒼朮湯治濕溫多汗知母六兩甘草炙二兩石膏一斤蒼朮三兩粳米三兩上銼如麻豆大每服五錢水一盞半煎至八九分去滓取六分清汁溫服此方出傷寒微旨亦仿金匱白虎加桂湯活人以小濕溫停水治傷寒中風發熱六七日不解而煩渴欲飲水而吐逆豬苓散方豬苓一兩澤瀉一兩赤茯苓一兩桂心半兩白朮半兩葛根一兩上件藥搗粗羅為散每服三錢以水一中盞煎至六分去滓溫溫頻服聖惠治時氣結胸心下滿實煩悶宜服豬苓散方豬苓一兩澤瀉一兩桂心半兩赤茯苓三分川朴消三兩上件藥搗細羅為散每服不計時候以粥飲調下二錢聖惠辰砂五苓散治傷寒表裡不解頭痛發熱心胸鬱悶唇口乾焦神思昏沉狂言譫語如見鬼神及治瘴瘧煩悶不省者木豬苓去黑皮白朮洗去蘆澤瀉洗銼赤茯苓去皮辰砂研各十二兩肉桂去皮八兩上為細末每服二錢沸湯點服和劑減桂五苓散治傷寒時氣燥渴飲水赤茯苓豬苓白朮各二兩半澤瀉四兩上㕮咀萬安方引良驗方得效名四苓散案此方本出小兒方訣瘡疹論桂苓甘露飲一名桂苓白朮散治傷寒中風濕熱內甚或頭痛口乾或吐瀉煩渴或小便赤澀桂半兩茯苓白朮各半兩甘草炙澤瀉石膏寒水石各二兩滑石二兩上為極細末熱湯調下三錢欲冷飲者新水調下或生薑湯調下尤良小兒服一錢直格宣明論有豬苓案小兒方訣玉露散一名甘露散治傷熱吐瀉黃色石膏寒水石各半兩甘草生一分為末每服一字或半錢食後溫湯調下蓋河間合之五苓散者益元散一名天水散一名太白散消畜水止渴利中除煩熱心躁滑石六兩白膩好者甘草一兩上為細末每服三錢蜜多許溫水調下或無蜜亦可每時日三服或欲冷飲者新井泉調下亦得直格御藥院方名六一散標本淡滲湯即本方合五苓散導赤散治小水不利小腹滿或下焦畜熱或引飲過多或小水短赤而渴脈沉數者以利小便為先茯苓豬苓澤瀉桂枝白朮甘草滑石山梔中濕身目黃者加茵陳水二鍾薑一片燈心二十莖槌法入鹽二字調服六書咳喘肺主氣形寒飲冷則傷之使氣上而不下逆而不收衝擊膈咽令喉中淫淫如癢習習如梗是令咳也甚者續續不已連連不止坐臥不安語言不竟動引百骸聲聞四近矣咳之由來有肺寒而咳者有停飲而咳者有邪氣在半表半裡而咳者雖同曰咳而治各不同也停飲而咳者小青龍湯所主為水飲與表寒相合而咳者真武湯所主為水飲與裡寒相合而咳者又不可不知也咳為肺疾治之必發散而可矣而又有不可發汗者經曰咳而小便利者不可發汗發汗則四肢厥逆冷又曰咳而發汗踡而苦滿腹中復堅明理論肺主氣形寒飲冷則傷肺故其氣逆而上行沖沖而氣急喝喝而息數張口抬肩擷身滾肚是為喘也傷寒喘者有邪氣在表氣不利而喘者有水寒之氣射肺而喘者各不同也經曰喘而汗出者與葛根黃芩黃連湯以利之汗出而喘者與麻黃杏子甘草湯以發之二者如何而然也且邪氣內攻氣逆不利而喘者有因喘而汗出見其邪氣在裡也雖表未解未可和之若邪氣外盛壅遏使氣不利而喘者雖汗而喘不已見其邪氣在表也雖經汗下亦可發之此亦古人之奧義傷寒止於邪氣在表而喘者心腹必濡而不堅設或腹滿而喘則又為可下之證經曰短氣腹滿而喘有潮熱者此外欲解可攻裡也為因滿脹而喘矣又或邪氣內盛正氣欲脫氣壅上逆亦主喘也經曰直視讝語喘滿者死又汗出發潤喘不休者此為肺絶身汗如油喘而不休此為命絶皆為不治之喘也同上並節録治傷寒四日因下後大渴服冷藥過多喘急者陰盛故也宜服小青龍湯方於仲景原方中加杏仁入生薑煎服聖惠節録杏子湯治一切咳嗽不問外感風寒內所傷生冷及虛勞咯血痰飲停積悉皆治療人參半夏茯苓細辛乾薑芍藥甘草官桂五味子各等分上㕮咀每服五錢水一盞半杏仁去皮尖銼五枚薑五片煎至六分去滓食前服易簡今去人參不用石頑治里醫吳佩玉次女傷風咳嗽先前自用疏風潤肺止嗽之藥不應轉加嘔渴咽痛求治於余診之六脈浮滑應指作半夏散與之三啜而病如失或問咳嗽咽痛而渴舉世咸禁燥劑而用半夏輒效何也曰用藥之權衡非一言而喻也凡治病必求其本此風熱挾飲上攻之暴嗽故用半夏桂枝以開通經絡迅掃痰涎兼甘草之和脾胃而致津液風痰散而營衛通則咽痛燥渴自已設泥其燥渴而用清潤滋其痰濕經絡愈壅津液愈結燥渴咽痛愈無寧宇矣緒論加減瀉白散治煩熱胸膈不利上氣喘促口乾或咳者桑白皮二錢橘紅知母貝母桔梗甘草各一錢半地骨皮一錢細黃芩瓜蔞仁去殼各一錢五分上用水二鍾煎至一鍾去渣溫服蘊要案此本出寶鑑今去青皮加貝母瓜蔞仁又瀉白散本是小兒方訣方用桑白皮地骨皮甘草三味蔞貝養營湯治解後痰涎湧甚胸膈不清者知母花粉貝母瓜蔞實橘紅白芍當歸紫蘇子水薑煎服溫疫論因發汗時汗出如水漏下還復汗少喘促不止脈促而按之濡者合當汗而解脈促而汗之實者死若脈浮手足微厥面垢唇青昏憒而喘者陰陽未和尚阻升降宜服順陰陽五味子湯案此主證可疑麻黃半兩人參五味子麥門冬杏仁橘皮生薑各一分大棗七枚㕮咀水三升煮七合去滓通口服一盞未差再作二三服手足厥甚者厚衣護其厥總病活人五味子湯治傷寒喘促脈伏而厥於本方去麻黃入門名加味生脈散凡傷寒大下後氣虛發喘目反脈微者急用上黨人參五錢甚者一兩水一鍾半煎至半鍾服之喘定生不定死明條陰證發喘尤為惡候斫喪之人腎氣上乘而用腎氣丸雜以黑錫丹導火歸元然多不救加以動息搖肩戴眠直視汗出厥逆者立斃大抵邪壅上盛正氣欲脫必至喘滿緒論有病後氣虛不能接續非喘也乃氣短也方書用大劑生脈散少佐陳皮二母主之然此乃急症須大劑八味加人參兩許方效西塘感症失血雜病衄者實熱在裡傷寒衄者實熱在表千金翼曰吐血有三種一曰肺疽二曰傷胃三曰內衄既吐血家謂之內衄則其鼻中出血者可謂之外衄是經絡之血妄行也經絡熱盛陽氣擁重迫血妄行出於鼻則為衄桂枝湯麻黃湯治衄者非治衄也即是發散經中邪氣耳若邪氣不得發散擁盛於經逼迫於血則因致衄也即非桂枝麻黃湯專治衄也太陽病脈浮緊發熱身無汗自衄者愈是經中之邪隨而散則解矣故知衄者不待桂枝湯麻黃湯發散之也衄者若但頭汗出身無汗及汗出不至足者死黃帝亦以為不治之疾明理凡候熱病而應衄者其人壯熱頻發汗未出或未及發汗而鼻燥喘息鼻氣鳴即衄凡衄小兒止一升數合則熱因之為然若一升二升者死巢源據溫病鼻衄候然字當作歇字若衄而成流者不須服藥少刻自解若點滴不成流者必用服藥無疑經曰奪血者無汗奪汗者無血俗人以血為紅汗厥有旨哉六書又曰若點滴不成流者其邪在經未解凡得衄血而解者邪之輕也若邪重者雖衄血亦不解也凡脈浮數口乾鼻燥熱者必衄也凡吐血衄血無表證脈不浮緊者不可發汗也大抵衄血吐血脈滑小者生脈實大者死或吐或衄後脈微者易治若熱反盛脈反數急者死也凡血得熱則行得冷則凝見黑則止所以犀角地黃湯中加好京墨一二匙攪藥令黑與之最效也蘊要案大白雲外感之衄脈大者易治沉澀者難醫亦一説也傷寒發熱無汗因致衄者此熱隨衄散謂之紅汗不可即止亦不可太多即止熱不能解太多又能虛人即止者還宜清涼解表太多者又宜滋補氣血直解麻黃升麻湯治傷寒發熱解利不行血隨氣壅世謂紅汗是也麻黃去節湯二兩半升麻一兩一分黃芩芍藥甘草生石膏煅茯苓各一兩上銼散每服四大錢水一盞半薑三片煎七分去滓熱服微汗解三因石頑治歙客黃姓者正月間患傷寒衄血甚多必發於卯刻數日不止面上怫鬱頭痛身微熱脈浮大而數按之則芤意謂衄血既多則熱邪當解此獨不解者先必邪氣在經點滴之衄誤服涼血止截藥所致遂與越脾湯一劑熱服得汗而解但至夜則身有微熱更與當歸補血湯四劑而安緒論若衄已而熱不退者惟升麻葛根湯敗毒散陽旦湯為穩要訣曾氏家學治傷寒七八日不解自胸上至頭目黑紫壅腫寸脈浮大而數是欲作衄而不能出也西北方人或於兩尺澤中出血如射即安治例深師黃土湯療鼻衄去五藏熱氣結所為或吐血者方當歸甘草炙芍藥黃芩芎藭各三兩桂心一兩生地黃一斤青竹皮一兩釜月下焦黃土如雞子一枚碎綿裹上九味切以水一斗三升煮竹皮減三升去滓內諸藥煮取三升分四服忌海藻菘菜生蔥外臺案千金無桂心聖惠治熱病鼻衄黃龍湯於本方去芎藭桂心加川升麻川朴消治傷寒心肺熱毒鼻衄不止或兼唾血宜服黃連散方黃連三分黃芩一兩梔子仁半兩甘草半兩伏龍肝三分淡竹茹一兩上件藥搗篩為散每服五錢以水一大盞入生薑半分煎至五分去滓入生地黃汁一合亂髮灰一錢攪令勻更煎三兩沸不計時候放溫頻服之以差為度聖惠治時氣鼻衄煩躁不止頭痛氣逆宜服石膏飲子方石膏二兩甘草半兩赤芍藥一兩黃芩一兩柴胡一兩桂心半兩生地黃三兩上件藥細銼和勻每服半兩先以水一大盞半浸伏龍肝二兩澄取清一大盞煎至五分去滓不計時候溫服聖惠治傷寒上膲壅熱心神煩躁鼻衄不止宜服黃芩散方黃芩三分川大黃三分梔子仁一分犀角屑半兩石膏三兩羚羊角屑半兩藍葉三分甘草半兩川朴消一兩上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服以差為度聖惠衄而煩者竹葉石膏湯以散經中之邪入門生地芩連湯治鼻衄成流久不止者或熱毒入深吐血不止者黃芩山梔桔梗甘草生地黃黃連柴胡川芎芍藥犀角如無升麻代之外用劫法水紙搭於鼻沖次條山梔方是水二鍾棗二枚煎至八分槌法臨服入茅根搗汁磨京墨調服如無茅根以藕搗汁亦可六書傷寒鼻衄成流久不止者將山梔炒黑色為細末吹入鼻內外將水紙搭於鼻沖其血自止六書凡時行衄不宜斷之如一二升已上恐多者可斷即以龍骨末吹之千金治傷寒鼻衄肺間有餘熱故也熱因血自上不止用此方牡蠣二兩半石膏一兩六銖上二味治下篩酒服方寸匕日三四亦可蜜丸如梧子大用治大病瘥後小勞便鼻衄者千金案此本出肘後治傷寒口鼻俱出血可及三五升宜服此方亂髮灰半兩伏龍肝一兩上件藥同研令細每服不計時候以新汲水調下二錢頻服以差為度聖惠治傷寒衄血滑石湯滑石末不以多少飯丸如桐子大每服十丸微嚼破新水咽下立止只用藥末一大錢飯少許同嚼下亦得老幼皆可服湯晦叔云鼻衄者當汗不汗所致其血青黑時不以多少勿得止宜服溫和藥以調其營衛才見血鮮急以此藥止之本事三黃補血湯治衄血下血人弱者服之即止熟地黃二錢生地黃二錢當歸二錢柴胡五分芍藥三錢升麻一錢牡丹皮一錢半川芎一錢黃耆一錢上用水二鍾煎至一鍾服蘊要有衄後病反重者更傷其陰也大為危候其衄勢必大甚六味飲加生地黃生白芍若血來太多致耗中氣當大補其陽當歸補血湯加人參甘草慮虛火上浮加麥冬五味西塘感症當歸補血湯系當歸黃耆二味本出東垣以上衄血衄出於肺行清道吐出於胃行濁道衄血之熱在經在表吐血之熱在腑主裡血之存於胃中者為守營之血守而不走諸陽受熱當汗不汗熱毒深入於中其血為火所逼而上逆隨從肺竅出於咽而為吐矣亦有蓄血上焦而吐者瘟疫患此始終一於為熱實者犀角地黃湯稍虛者黃芩芍藥等湯加減出入便可奏效説疫常見世醫每每遇傷寒吐血則曰傷寒變成火疾是以實為虛妄投滋陰降火等藥致病者斃而後已深可嘆也不知傷寒吐血乃表邪入里為有餘之邪可攻之可清之可破之邪去則血止矣若火症吐血乃內傷七情陰虛陽盛為不足之症可補之可溫之可滋之陰盛則血止二症一虛一實以此觀之大相矛盾又安得以傷寒吐血為虛症吐血乎五法攖寧生卮言云血溢血泄諸畜妄證其始也豫率以桃仁大黃行血破瘀之劑折其鋭氣而後區別治之雖往往獲中猶不得其所以然也後來四明遇故人蘇伊舉問論諸家之術伊舉曰吾鄉有善醫者每治失血畜妄必先以快藥下之或問失血復下虛何以當則曰血既妄行迷失故道不去畜利瘀則以妄為常曷以御之且去者自去生者自生何虛之有豫聞之愕然曰名言也昔者之疑今釋然矣準繩昔陶尚文治一人傷寒四五日吐血不止醫以犀角地黃湯茅花湯等藥治之而反劇遂請陶公視之切其脈浮緊而數若不汗出邪無由而解矣遂用麻黃湯一服汗出而愈此陶公可謂得仲景之心法矣蘊要凡吐血不止以三稜針刺衝陽穴出血最效同上傷寒咯血猶難救療況吐血乎凡吐血皆非美恙初病猶可用工有陸續而來或經數時而復吐者斷不可救藥也通用蘿蔔汁一小盞入新汲水煎茅花主之血熱者黃連阿膠湯證治書括此有論字通用地血散蘗皮湯三黃瀉心湯總括緒論云血虛而熱雖赤不結黃連阿膠湯大還云吐鮮血不止躁渴者黃連解毒湯加丹皮茅花京墨治傷寒吐血心煩不食宜服伏龍肝散方伏龍肝三兩生乾地黃一兩柏葉一兩茜根一兩阿膠一兩黃芩一兩黃連一兩甘草一兩半上件藥搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服聖惠又治傷寒心熱及餘毒不退吐血一二升不止生乾地黃散於本方去柏葉茜根阿膠甘草加黃檗吳藍麥門冬治傷寒吐血不止柏葉散方青柏葉一兩生乾地黃一兩阿膠一分上件藥搗篩為散以水一大盞半煎至一盞去滓別攪馬通汁一合相和更煎一兩沸不計時候分溫三服聖惠此即仲景柏葉湯變方治傷寒壅極吐血百治不差方生地黃汁一中盞川大黃一分銼微炒杵末上件藥先煎地黃汁三兩沸內大黃末調令勻不計時候溫服聖惠總病名大黃散案此方本出千金治虛勞吐血吐血雖屬傷陰之證宜滋陰養血然亦有陽虛不能攝血而血外溢者宜用參苓耆朮補氣以攝血若陽虛已極兼畏寒足冷飲食不進嘔吐泄瀉急用薑桂附子之類不可泥以為吐血屬火而概用滋陰也直解失血少血或尺脈遲或諸脈不出湯劑中須以人參為佐總括有陰症凝寒脈來遲細腹痛厥逆嘔吐紫黑色者亦不可治之矣明條若暴吐腐臭之血名曰內潰內潰者死金鑑以上吐血凡下血便膿血有陽證陰證冷熱之不同要在辨之而已古人言見血無寒又言血得熱而行皆大概之言也大抵十分中有八九分屬熱間有一二屬寒也故不可一概而治之矣略例曰原作要略曰今改陽證內熱則下鮮紅之血陰證內寒則下紫黑成塊或如豚肝也案明條亦曰熱傷其血血得熱而暴行所下者必紅赤成流寒傷其血血得寒而凝結所下者必紫黑成塊愚意似未必然又緒論曰陰證內寒則下衃血若紫黑成塊或如豚肝及下血水多者皆難治也且夫陽證則脈數若數而有力者為實熱可以純苦之藥治之要當養血藥中少佐一二味寒藥可也若陰證則脈遲遲而有力者為有神可治遲而無力者為無神難治若下血脈洪大急硬不和者死若脈雖大而和者乃可治也蘊要孫用和治陽毒入胃下血頻疼痛不可忍鬱金五個大者牛黃一皂莢子大別細研二味同為散每服用醋漿水一盞同煎三沸煎服證類聖濟治傷寒汗後陽毒入胃下血頻並痛不可忍勝金散即本方桂附六合湯治陰證下血紫黑如豚肝川芎上當歸上芍藥中熟地黃中官桂下附子下炮上水二鍾煎至一鍾蘊要案略例云下而血者芎歸朮附湯桂附六合湯而不載其方蓋即是也凡陰症內寒下血必用乾薑炒半黑用之如神其效也同上以上下血瘀血胃實兼蓄血亦見陽明病中衝脈為血之海即血室也男女均有此血氣亦均有此衝脈沖之得熱血必妄行在男子則為下血讝語在婦人則於經水適來適去之時經氣尚虛邪乘虛入或熱退而胸滿讝語或蓄血而寒熱似瘧皆謂之熱入血室私竊怪夫世俗常談凡病皆先調氣而血之一字念不到焉其間一二亦知理血則曰婦人有之不思血氣即陰陽也負陰抱陽中兩間而為人誰獨無此血氣哉否則張朱之書所謂桃仁承氣湯抵當湯丸之類是特為婦人設耳然而血證之脈何如曰挾血者脈來乍澀乍數閃灼明滅或沉細而隱伏也若夫血熱交盛則寸關洪盛大抵多於左手見之左手主血固如是爾經云血上逆則妄血下蓄則狂下焦蓄血小便必自利血結之處又當以此推之總括緒論云凡血滯不行則脈乍澀乍數或沉或伏若血熱交併則洪盛血虛則芤虛中有瘀則芤中帶弦此一定法也諸陽受熱其邪在表當汗不汗致使熱毒入臟積瘀於內成吐血蓋傷寒失汗則邪熱化為惡血或蘊毒不除亦能腐其血凡眼閉目紅神昏語短心忪痛悶眩冒迷忘漱水燥煩嘔吐喘促驚狂讝語鼻衄唾紅背冷足寒骨熱膚哄四肢厥逆多汗頑痰胸脅小腹滿急大便黑而微利小便多而不禁此等皆瘀血證也男女均有此血脈婦人傷寒尤多見之以其得病於經水來去之期或受病中間經水適至耳血之為痛大抵夜重日輕或晝明瞭而暮讝語血屬陰從其類也前證不必悉具但見其一二分曉便作血證主張犀角地黃湯小柴胡湯又云小柴胡加桃仁大黃桃仁承氣湯三黃湯丸酌量輕重用瘀血結甚抵當湯丸主之原此下云諸湯皆以川芎為佐取盡大便黑物則佳同上若病人無表證不發寒熱胸腹滿唇燥但欲漱水不欲唾者此為有瘀血必發狂也輕者犀角地黃湯甚者抵當湯活人胃實失下至夜發熱者熱留血分更加失下必致瘀血初則晝夜發熱日晡益甚既投承氣晝日熱減至夜獨熱者瘀血未行也宜桃仁承氣湯服湯後熱除為愈或熱時前後短縮再服再短畜血盡而熱亦盡大勢已去亡血過多余焰尚存者宜犀角地黃湯調之又有熱入血室非畜血未可下宜審溫疫論大便溏膩如漆者為畜血若黑燥如煤者為燥結非畜血也畜血證舌胎有邊白中黑而極薄潤必無乾燥焦黃者以血屬陰無大實熱故也緒論小品芍藥地黃湯療傷寒及溫病應發汗而不發之內瘀有畜血者及鼻衄吐血不盡內余瘀血面黃大便黑者此主消化瘀血案大白雲衄血吐血若畜聚淤結犀角地黃凝滯此説不必且此云瘀血蓋非凝堅之謂也芍藥三分千金三兩地黃半斤千金生地黃丹皮一兩千金二兩犀角屑一兩上四味切以水一斗煮取四升去滓溫服一升日二三服有熱如狂者加黃芩三兩其人脈大來遲腹不滿自言滿者為無熱不用黃芩外臺千金名犀角地黃湯喜忘如狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方不須有所增加聖惠治熱病發汗而汗不發致內有積瘀故吐血不止生乾地黃散於本方加刺薊柏葉元戎犀角地黃湯治心經邪熱及發狂於本方去芍藥加硃砂黃連白茯苓此猶用之本方證而膈熱甚者為佳故録於茲蘊要加味犀角地黃湯治血結胸中手不可近其人漱水不欲咽或喜忘如狂或大便黑色小便自利此血結胸中於本方加大黃血未下者更加桃仁入門表熱加柴胡黃芩鼻衄加山梔內熱甚加黃連溫疫論先將地黃溫水潤透銅刀切作片石臼內搗爛再加水如糊絞汁聽用其滓入藥內煎藥成去滓入前汁合服血積胸中熱之甚也以犀角地黃湯生地黃二兩黃芩一兩半黃連一兩大黃半兩上㕮咀水三盞稱一兩煎至二盞去滓食後服之潔古注脈訣案方中無犀角蓋犀角消毒飲之例然加用最妙又諸家所稱犀角地黃湯皆是前方非此方也韓氏微旨方地黃湯治病人七八日後兩手脈沉遲細微膚冷臍下滿或喜或忘或狂或躁大便實而色黑小便自利者此畜血證具也若老年及少年氣虛弱者宜此方主之生地黃自然汁一升如無生地黃只用生乾地黃末一兩生藕自然汁半升如無藕以刺薊汁半升如無刺薊汁用刺薊末一兩藍葉一握切碎乾者末半兩虻蟲三十個去足翹炒黃大黃一兩銼如骰子大桃仁半兩微炒水蛭十個上同一處水三升半同慢火熬及二升以來放冷分三服投一服至半日許血未下再投之此地黃湯比抵當湯丸其實甚輕也如無地黃汁與藕汁計升數添水同煎元戎生漆湯病人七八日後兩手脈沉細而數或關前脈大臍下滿或狂走或喜忘或譫語不大便小便自利若病人年少氣實即血凝難下恐抵當丸力不能及宜此生地黃汁一升如無汁只用生乾地黃三兩半犀角一兩鎊為末大黃二兩銼碎如骰子大桃仁三十個拍碎上作一處用水三升好酒一升慢火熬三升以來傾出濾去滓再入鍋投點先生漆一兩半再熬之至二升即住淨濾去滓放冷作三服每投服候半日許血未下再投一服候血下即止服藥如無生地黃汁更添水一升同煎元
