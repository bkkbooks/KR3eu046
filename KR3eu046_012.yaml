body:
  text: 卷十二婦兒婦人傷寒總說古人治病先論其所主男子調其氣婦人調其血雖然婦人傷寒與男子治法不同男子先調氣婦人先調血此大略之詞耳要之脈緊無汗名傷寒脈緩有汗為傷風熱病脈洪大中暑脈細弱其證一也假如中暍用白虎胃實用承氣豈必調血而後行湯耶仲景傷寒論所以不分婦人良亦以此學者皆可隨病於男子藥證中以意選用也活人夫婦人女子傷寒六經傳變治例皆與男子同法惟經水適來適斷熱入血室與夫胎前産後崩漏帶下則治有殊別也蘊要熱入血室當參産後熱陷血室之證多有譫語如狂之象與陽明胃熱相似此種病機最須辨別血結者身體必重非若陽明之輕便者何以故耶陰主重濁絡脈被阻身之側旁氣痹連及胸背皆拘束不遂故去邪通絡正合其病往往延久上逆心胞胸中痛即陶氏血結胸也溫熱論案血結胸本出活人乾薑柴胡湯治婦人傷寒經水方來初斷寒熱如瘧狂言見鬼者柴朔四兩去蘆栝樓根二兩桂枝一兩半牡蠣一兩熬乾薑一兩炮甘草炙一兩上銼如麻豆大每服四錢水一盞半煎至七分去滓溫服初服微煩再服汗出而愈活人案黃芩遵柴胡桂薑湯加用為是治婦人室女傷寒發熱或發寒熱經水適來或適斷晝則明瞭夜則譫語如見鬼狀亦治産後惡露方來忽爾斷絶小柴胡加地黃湯柴胡一兩一分去苗淨洗人參去蘆半夏湯洗七次黃芩去皮甘草炙生乾地黃各半兩上粗末每用五錢水二盞生薑五片棗二個同煎至八分去滓溫服本事云岐子保命産後往來寒熱而脈弦者少陽也小柴胡加生地黃湯於本方更加梔子枳殼辛亥中寓毗陵學官王仲禮其妹病傷寒發寒熱遇夜則如有鬼物所憑六七日忽昏塞涎響如引鋸牙關緊急暝目不知人疾勢極危召豫視豫曰得病之初曾值月經來否其家云月經方來病作而經遂止得一二日發寒熱晝雖靜夜則有鬼祟從昨日來涎生不省人事豫曰此熱入血室證也仲景云婦人中風發熱惡塞經水適來晝則明瞭暮則譫語如見鬼狀發作有時此名熱入血室醫者不識以剛劑投之遂致胸膈不利涎潮上脘喘急息高昏冒不知人當先化其涎後除其熱豫急以一呷散投之兩時頃涎下得睡省人事次授以小柴胡加地黃湯三服而熱除不汗而自解矣本事一呷散用天南星一味為細末服又記一婦人患熱入血室證醫者不識用補血調氣藥涵養數日遂成血結胸或勸用前藥豫曰小柴胡用已遲不可行也無已則有一焉刺期門穴斯可矣豫不能針請善針者治之如言而愈或者問曰熱入血室何為而為結胸也豫曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乘虛而入血室血為邪迫上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸也何以言之也婦人平居水當養於木血當養於肝也方未受孕則下行之以為月既妊娠則中蓄之以養胎及已産則上壅之以為乳皆血也今邪逐血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故當刺期門也同上張太學璇浦內人患熱入血室發狂欲殺人白下醫以傷寒治之煎藥未服陳錫玄邀仲淳往診仲淳云誤矣覆其藥投一劑而安先與童便繼與涼血行血安心神藥遂定廣筆記妊娠傷寒妊婦傷寒仲景無治法非無治法也以其有岐伯有故無損可犯衰其大半一條更不必云謂紛紛也豈可云仲景無治法不言婦人妊娠之的方也仲景一書婦人小兒兼之矣元戎孕婦時疫設應用三承氣湯須隨證施治切不可過慮慎毋惑於參朮安胎之說病家見用承氣先自驚疑或更左右嘈雜必致醫者掣肘為子母大不祥若應下之證反用補劑邪火壅鬱熱毒愈熾胎愈不安耗氣搏血胞胎何賴是以古人有懸鐘之喻梁腐而鍾未有不落者惟用承氣逐去其邪火毒消散炎熇頓為清涼氣回而胎自固用當此證候反見大黃為安胎之聖藥歷治歷當子母俱安若腹痛若錐腰痛如折此時未墮欲墮之候服藥亦無及矣雖投承氣但可愈疾而全母昧者以為胎墮必反咎於醫也或詰余曰孕婦而投承氣設邪未逐先損其胎當如之何餘日結糞瘀熱腸胃間事也胎附於脊腸胃之外子宮內事也藥先到胃瘀熱始通胎氣便得舒養是以興利除害於頃刻之間何慮之有但毒藥治病衰去七八餘邪自愈慎勿過劑耳凡孕婦時疫萬一有四損者不可正治當從其損而調之産後同法非其損而誤補必死溫疫論吳又可云大黃為安胎之聖藥是專為里證應下者言之若邪尚在表者當速散其表邪毋使內陷為上乘也說疫凡胎前疫證與傷寒陽明府證內實便祕須急通大便方不損胎若大便自利者真氣下泄胎必難保惟大小便如常知里無熱則不傷胎氣醫通成州團練使張鋭字子剛以醫知名居於鄭州政和中蔡魯公之孫婦有娠及期而病國醫皆以為陽證傷寒懼胎之墮不敢投涼劑魯公密邀鋭視之鋭曰兒之一作處胎十月將生矣何藥之敗即以常法與藥且使倍服之半日而兒生病亦失去明曰婦人一作大泄而喉閉不入食案醫復指言其疵且曰二疾如冰炭又産蓐甫近雖扁鵲復出無活理也鋭曰無庸憂將使即日愈乃入室取藥數十粒使吞之咽喉即通下泄亦止逮滿月魯公開宴自諸子諸孫及女婦孫壻合六十人請鋭為客公親酌酒為壽曰君之術通神吾不敢知敢問一藥而治二疾何也鋭說此亦無所載一作鋭曰此於經無所載特以意處之嚮者所用乃附子理中丸裹以紫雪爾方喉閉不通非至寒藥不為用既已下咽則消釋無餘其得至腹中者附子力也故一服而兩疾愈公大加嘆異盡斂席上金匕箸遺之醫說引夷堅志妊娠傷寒倘見腰腹痛必墮無疑須預言之藥無及矣若其脈數疾無倫喘脹嘔逆腹中重墜不能轉側當臍久按覺冷或有瘀垢下行但看舌色及爪甲青色其胎已死也急宜平胃散煎成調芒硝半兩許下之虛極不勝藥力者加人參兩許駕馭之若並唇面青黑而嘔噦不止口中有穢氣者子母俱死切勿用藥緒論熱病胎死腹中者何答曰因母患熱病至六七日以後臟腑極熱熏煮其胎是以致死緣兒身死冷不能自出但服黑神散暖其胎須臾胎氣暖即自出何以知其胎之已死但看産婦舌色青者是其候也産育寶慶方黑神散桂心當歸芍藥甘草炙生乾地黃乾薑炮各一兩黑豆炒去皮二兩附子炮去皮臍半兩上為末每服二錢空心溫酒調下一方無附子有蒲黃寶慶方罩胎散治妊娠傷寒大熱悶亂燥渴恐傷胎臟卷荷葉嫩者焙乾一兩蚌粉花半兩上為末每服二錢入蜜少許新汲水調下食前服三因治妊娠遭時疾令子不落方取灶中黃土水和塗臍干腹塗之一方酒和塗方五寸又泔清和塗之並佳千金案此法似迂然嘗見一老醫屢試得效産後傷寒王子亨曰婦人新産去血過多津液燥少陰陽俱虛大凡有疾如中風傷寒時氣之類雖當發汗如麻黃謹不可用取汗毋勞過多以意斟酌婦人良方凡新産後患傷寒不可輕易而發汗也蓋有産時傷力發熱去血過多發熱惡露不去發熱三日蒸乳發熱或有早起動勞飲食停滯一皆發熱狀類傷寒要在仔細詳辨切不可輒便發汗大抵産後失血空虛若汗之則變筋惕肉瞤或鬱冒昏迷而不省或風搐搦而不定或大便祕澀而難去其害非輕要在審察而已蘊要案婦人良方云産後發熱頭痛身疼不可便作感冒治之多是血虛或敗血作梗夫産後久病之人不可大發表大攻裡發表則重虛其陽攻裡則重虛其陰以致虛虛令人夭亡産後久病固不宜大汗大下設病勢危篤又當從權不可拘執此活法也然則産後及久病之人若感寒邪以此氣血大虛之證惡可一概作正傷寒治乎五法新産感冒發熱大有危候然有産時傷力或去血過多或惡露不行或早起勞動或飲食停滯及蒸乳一切發熱不可誤認外感妄施汗劑以其氣血大虧百病乘虛而入即使更受風寒亦宜調理氣血為主其脈以小弱滑利為吉緊實堅大為逆數大散漫亦危更須問惡露行與不行小腹痛與不痛若痛者以行氣導血為先緒論産後之法按方書謂慎用苦寒藥恐傷其已亡之陰也然亦要辨其邪能從上中解者稍從證用之亦無妨也不過勿犯下焦且屬虛體當如虛怯人病邪而治總之毋犯實實虛虛之禁況産後當血氣沸騰之候最多空竇邪勢必乘虛內陷虛處受邪為難治也溫熱論黃龍湯治胎前産後寒熱小柴胡去半夏加芍藥是也元戎案小柴胡名黃龍湯本出千金活人去半夏治産後惡露方下忽爾斷絶晝日明瞭暮則譫語寒熱往來如見鬼狀此由為熱入血室不即治之諸變不測宜服柴胡地黃湯四物湯加北柴胡婦人良方凡産後暴病禁犯不可拘也如産後熱入血室者桃仁承氣抵當湯之類是也胃堅燥者大承氣不可以泄藥言之産後世人多用烏金四物是不知四時之寒熱不明血氣之虛與實盲然一概用藥如此而愈加增劇是醫人殺之耳保命集傷寒産後惡露為熱搏不下煩悶脹喘狂言者抵當湯及桃仁承氣湯主之總病治傷寒小産惡露不行腹脹煩悶欲死大黃桃仁湯朴消大黃二味等分末之每一錢或二錢桃仁去雙仁皮尖碎之濃煎湯調下以通為度日三服總病凡傷寒小産夏月宜少用醋炭多有煩悶運死者傷寒産後惡血衝心悶亂口乾生薑當訛小便飲子生地黃汁藕汁小便各一盞和勻煎三兩沸溫熱分作三服總病胡茂林子婦魏仲彬妹也新産二日惡露不行臍腹痛頭疼身寒熱當隆冬時衆醫皆以為感寒溫以姜附益大熱手足搐搦語譫目攛仲彬因邀生往診脈弦而洪數面赤目閉語喃喃不可辨舌黑如炲燥無津潤胸腹按之不勝手蓋燥劑搏激血內熱而風生血蓄而為痛也生日此産後熱入血室因而生風即先為清熱降火治風涼血兩服頗爽繼以琥珀牛黃等稍解人事後以張從正三和散行血破瘀三四服惡露大下如初時産已十日矣於是諸證悉平醫史攖寧生傳案張從正三和散無考或是三和湯方以四物湯涼膈散當歸各中停水煎服月水不來用出三法六門治法雜論蕭熙宇乃媳産後患傷寒發熱頭疼本族醫者用參耆歸術芍附薑桂治之一帖而病劇熱甚眼直視瘈瘲口吐沫豫診其脈極數一息十餘至乃寒邪在中驟用參耆朮附以實其邪故變證若此夫附子號將軍乃回陽物也豈可常用今醫者不察脈證凡遇産後每用附子害人多矣而受害者卒不怨亦謂産後虛極宜用不知産後血虛其火易炎再以附子益之則陰血愈爍為禍不輕故必陽虛寒厥及陰陽俱虛方可酌用不則為妄施耳豫與四神湯炒黑乾薑肉桂芎歸服一劑而證退脈斂兩劑全愈程氏醫彀小兒傷寒夫小兒未能冒涉霜雪乃不病傷寒也大人解脫之久傷於寒冷則不論耳然天行非節之氣其亦得之有時行疾疫之年小兒出腹便患斑者也治其時行節度故如大人法但用藥分劑小異藥小冷耳千金小兒傷寒與大人法度則同惡風惡寒者必隈人藏身引衣密隱是為表證可微取其汗也惡熱內實者必出頭露面揚手擲足煩渴燥糞掀衣氣粗是為里證可略與疏利也至若頭額冷手足涼口中冷氣面色黯淡大便瀉青此則陰病裡虛當以溫藥救其里也舉是三者汗下溫之法可以類推矣亦視其小便或赤或白可以知裡熱之有無或清或濁可以知裡熱之輕重其證某方皆無越張朱格例特不過小小分劑而中病則止也不然幼幼新書駢集小兒傷寒雖略舉巢源一二而終篇以活人書為法果何意哉總括節録夫小兒傷寒六經治例皆同但有胎熱驚熱血熱客熱寒熱潮熱痰熱食熱變蒸發熱痘疹發熱傷風發熱一皆發作狀似傷寒要在明辨之也蘊要凡小兒感冒風寒瘧痢等證人所易知一染時疫人所難窺所以擔誤者良多何也蓋由幼科專於痘疹吐瀉驚疳並諸雜證在傷寒時疫甚略之一也古人稱幼科為啞科不能盡罄所苦以告師師又安能悉乎問切之義所以但知其身熱不知其頭疼身痛也但知不思乳食心胸膨脹疑其內傷乳食安知其疫邪傳胃也但見嘔吐噁心口渴下利以小兒吐瀉為常事又安知其協熱下利也凡此何暇致思為時疫二也小兒神氣嬌怯筋骨柔脆一染時疫延挨失治即便二目上吊不時驚搐肢體發痙十指鉤曲甚則角弓反張必延幼科正合渠平日學習見聞之證是多誤認為慢驚風遂投抱龍丸安神丸竭盡驚風之劑轉治轉劇因見不啼不語又將神門眉心亂灸艾火雖微內攻甚急兩陽相搏如火加油紅爐添炭死者不可勝記深為痛憫今凡遇疫毒流行大人可染小兒豈獨不可染耶但所受之邪則一因其氣血筋骨柔脆故所現之證為異耳務宜求邪以治故用藥與大人倣佛凡五六歲以上者藥當減半二三歲往來者四分之一可也又腸胃柔脆少有差誤為禍更速臨證尤宜加慎溫疫論芍藥四物解肌湯治少小傷寒方芍藥黃芩升麻葛根各半兩上四味以水三升煮取九合去滓分服期歲以上分三服千金惺惺散治傷寒時氣風熱痰壅咳嗽及氣不和桔梗細辛人參甘草白茯苓白朮瓜蔞根各等分上為末每服二錢水一盞入薄荷五葉煎至七分溫服不拘時如要和氣入生薑五片同煎一方有防風川芎各減半方訣外編活人有川芎云凡小兒發熱不問傷風風熱先與此散數服往往輒愈小兒傷寒始因壯熱不除被湯丸下後其項強眼翻弄舌搐搦如發癇狀久則哽氣啼聲不出醫以為驚風屢服硃砂水銀牛黃汞粉巴類疑巴豆竹瀝之類藥皆無效此由誤下後毒氣結在心胸內熱生涎裹諸藥不能宣行所致也蕩涎散粉霜一錢膩粉一匝芫花一分細末暖漿水調下一歲半錢病熱大者再服白色著底者粉霜也宜盡唯之唯字疑良久得睡取下黑黃涎裹包丹砂之類皆成顆塊啼聲便出立安總病小兒結胸亦如前狀但啼聲出醫亦多作驚風治之其脈浮滑試以指按心下則痛而啼宜半夏黃連栝蔞湯斟酌服當下黃涎便差總病小兒傷寒里不解發驚妄語狂躁潮熱鉤藤大黃湯鉤藤皮當歸甘草炙芍藥各半兩大黃三分粗末每三錢水一盞煎六分溫溫服以利為度總病雜載炙艾大抵不可刺者宜灸之一則沉寒病冷二則無脈知陽絶也三則腹皮急而陽陷也舍此三者余皆不可灸蓋恐致逆也若表見寒證身汗出身常清數栗而寒不渴欲覆厚衣常惡寒手足劂皮膚乾枯其脈必沉細而遲但有一二證皆宜灸之陽氣下陷故也若身熱惡熱時見躁作或面赤面黃咽乾嗌乾口乾舌上黃赤渴咽嗌痛皆熱在外也但有一二證皆不宜灸其脈必浮數或但數而不浮不可灸灸之災害立至若有鼻不聞香臭鼻流清涕眼瞼時癢或缺或嚏惡寒其脈必沉是脈證相應也或輕手得弦緊脈者是陰伏其陽也雖面赤宜灸之不可拘於面赤而禁之也玉機渴與水法當參診察渴條凡病非大渴不可與冷水若小渴口咽乾小小呷滋潤之若大渴煩躁甚能飲一斗者與五升能飲一升者與半升若乃不與則乾燥無由作汗煩喘而死者多矣但勿令足意飲也若大汗將來躁渴甚者但足意飲之勿疑當人見因渴飲水而得汗見小渴遂強與之致停飲心下滿結喘而死者亦多矣其有熱脈數尚可作汗而解者出於天幸也總病案此本於傷寒例十勸云病人縱飲由是為嘔為喘為咳逆為下利為腫為悸為水結為小便不利者多矣大抵與水當察病人大小壯怯邪熱之輕重多少與之若人壯熱盛者必多與之人怯熱少者必少與之要在得中而已或從不及不可太過也若水多熱少不能滲化則停蓄為害多矣此所以前病未除新病更起可不謹哉凡與水須新汲井水以滿碗與之熱多能飲者一半而止熱少者只可與三四口而止也少頃又欲飲水少少再與之如碗內水少則不涼須滿碗則涼氣重也案又云新汲井水味甜而涼者最佳須以大碗滿盛之則涼若飲少者三五口而止能飲者半碗而止少待半時或一時而口又渴欲飲者須仍前新汲與之蓋頻與水不妨但不宜一飲而吐也凡飲水後必令人摩揉心下則不得停蓄也案此語本於儒門事親凡熱病熱甚大便實者以玄明粉一二錢加入水中飲之最效凡中暑煩渴者加辰砂天水散調入水中尤妙如虛人煩渴不可飲水者以燈心煎湯水中浸冷與之亦可凡口渴細茶湯白梅湯緑豆湯清米湯皆可飲之若胃弱者以炒黃米湯飲之凡口渴者香水梨雪梨嫩藕涼西瓜皆可少少用之橘子須去囊但吮其漿則可也凡用冰須用涼水洗過一二遍乃可用之若不洗去鹽味其咸反作渴也若臘水雪最解煩渴矣凡井華水一夜不曾動至天明初取者是也可解煩渴用之也蘊要煩渴飲酌量與之若引飲過多自覺水停心下名停飲宜四苓散最妙如不欲冷當易百滾湯與之乃至不思飲則知胃和矣溫疫論案四苓散系去澤瀉加陳皮者飲水一證本以內熱極而陽毒甚者最其相宜若似乎止宜實邪不宜於虛邪也而不知虛證亦有不同如陽虛無火者其不宜水元待言也其有陰虛火盛者無氣既弱精血又枯多見舌裂唇焦大渴喜冷三焦如焚二便閉結等證使非藉天一之精何以濟然眉之急故先宜以冰水解其標而繼以甘溫培其本水藥兼進無不可也其有內真寒外假熱陰盛格陽等證察其元氣則非用甘溫必不足以挽回察其喉舌則些微辛熱又不可以近口有如是者則但將甘溫大補之劑或單用人參煎成湯液用水浸極冷而飲之此以假冷之藥解上焦之假熱而真溫之性復下焦之真陽是非用水而實亦用水之意余用此活人多矣誠妙之甚者也惟是假熱之證則證雖熱而脈則微口雖渴而便則不閉者此而欲水必不可與若誤犯之則其敗泄元陽為害不小有不可不慎也景嶽按蘊要論附子湯冷服既出厥陰病中飲食夫病之新瘥後但得食糜粥寧少食乃飢慎勿飽不得他有所食雖思之勿與引日轉久可漸食羊肉糜若羹慎不可食豬狗等肉巢源當參食復凡新瘥後只宜先進白稀粥湯次進濃者又次進糜粥亦須少少與之常今不足則可不可盡意過食之也其諸般肉食等物皆不可食之蘊要凡病新瘥自宜先用陳倉米少許煎湯少飲俟其無恙漸次增濃胃氣漸旺穀食漸增至胃氣復舊然後少進肉味撙節愛養自無復證若不遵法度餘熱未除元氣未復飲食驟進腥膻雜沓未有不復熱者溯源集時疫有首尾能食者此邪不傳胃切不可絶其飲食但不宜過食耳有愈後數日微渴微熱不思食者此微邪在胃正氣虛弱強與之即為食復有下後一日便思食食之有味當與之先與米飲一小杯加至茶甌漸進稀粥不可盡意飢則再與如忽加吞酸反覺無味乃胃氣傷也當停谷一日胃氣復復思食也仍如漸進法有愈後十數日脈靜身涼表裡俱和但不思食者此中氣不蘇當與粥飲迎之得谷後即思食覺飢久而不思食者一法以人參一錢煎湯與之少喚胃氣忽覺思食余勿服溫疫論凡人胃氣強盛可飢可飽若久病之後胃氣薄弱最難調理蓋胃體如灶胃氣如火穀食如薪合水穀之精微升散為血脈者如焰其糟粕下轉為糞者如爐是以灶大則薪多火盛薪斷而余焰猶存雖薪從續而火亦燃若些小鐺鍋正宜薪數莖稍多則壅滅稍斷則火絶死灰而求復燃不亦難乎若夫大病之後蓋客邪新去胃口方開幾微之氣所以多與早與遲與皆不可也宜先與粥飲次糊飲次糜粥次要飲食尤當循序漸進毋先後其時當設爐火晝夜勿令斷絶以備不時之用思谷即與稍緩則胃飢如灼再緩則胃氣傷反不思食矣既不思食若照前與之雖食而弗化弗化則傷之又傷不為食復者當如初進法若更多與及黏硬之物胃氣壅甚必脹滿難支若氣絶谷存乃致反復顛倒形神俱脫而死矣同上傷寒初病起不可恣意飲酒蓋酒乃大熱之物能熏蒸臟腑助火發病謹當戒守明條傷寒得汗後不得飲酒飲之者殺人難救瑣碎録吳介臣傷寒餘熱未盡曲池壅腫不潰不消日發寒熱瘍醫禁止飲食兩月餘日服清火消毒藥上氣形脫倚息不得臥渴飲開水一二口則腹脹滿急大便燥結不通兩月中用蜜導四五次所去甚艱勢大瀕危邀石頑診之其脈初按繃急按之絶無此中氣逮盡之兆豈能復勝藥力耶乃令續進稀糜榻前以鴨煮之香氣透達徐以汁啜之是夕大便去結糞甚多喘脹頓止飲食漸進數日後腫亦漸消此際雖可進保元獨參之類力不能支僅惟穀肉調理而安近松陵一人過餌消導胃氣告匱聞穀氣則欲嘔亦用上法不藥而痊醫通此案無類可附姑録於此調養總略病人禁忌不可不知昔有人春月病瘟三日之內以驢車載百餘里比及下車昏瞀不知人數日而殂又有人飲酒過傷內外感邪頭痛身熱狀如傷寒三四日間以馬馱還家六七十里到家百骨節皆痛昏憒而死此余親睹若此之類不容更述假如瘟病傷寒熱病中暑冒風傷酒慎勿車載馬馱搖撼頓挫大忌夫動者火之化靜者水之化也靜為陰動為陽陽為熱陰為寒病已內擾又復外擾是為至擾奈人之神詎能當之故遠行得疾者宜舟行床抬無使外擾故病不致增劇凡有此者宜清房涼榻使不受客熱之邪明窗皓室使易見斑出黃生之變病者喜食涼則從其涼喜食溫則從其溫清之而勿擾休之而勿勞事親案原文稍系當考瘟疫愈後調養之方往往不講而抑知此乃後一段工夫所關甚巨也即如過飽者曰食復惱怒者曰氣復疲於筋力者曰勞復傷於色欲者曰女勞復載在經書世皆知之尚有時而觸犯此外人所最易忽者猶有三焉不在諸復之條者也雖已愈多日而氣血苟不充足犯之隨有釀成終身之患者焉一日淫欲凡人房事必撮周身之精華以泄氣血未充七日未能來復欲事頻數勢必積損成勞尩羸損壽一曰勞頓或遠行或作苦疲弊筋力當時不覺將來肢體解㑊未老先衰其苦有莫可名言者一曰忍飢愈後凡有覺飢必得稍食萬毋強耐過時反不欲食強食亦不能化是飢時既傷於前強食又傷於後中州敗而肺金損則勞嗽脾胃之病成矣三者人多忽之故不可不謹說疫
