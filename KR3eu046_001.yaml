body:
  text: 卷一綱領陰陽總説王叔和曰夫病發熱而惡寒者發於陽無熱而惡寒者發於陰發於陽者可攻其外發於陰者宜溫其內發表以桂枝溫里宜四逆外臺凡人稟氣各有盛衰宿病各有寒熱因傷寒蒸起宿疾更不在感異氣而變者假令素有寒者多變陽虛陰盛之疾或變陰毒也素有熱者多變陽盛陰虛之疾或變陽毒也總病孫兆云本是陽病熱證為醫吐下過多遂成陰病者卻宜溫之有本是陰病與溫藥過多致胃中熱實或大便硬有狂言者亦宜下也類證辨惑入式元戎王朝奉辨陰陽證中亦引孫兆清碧杜先生曰傷寒陽熱之證傳經之邪變態不一辨之不精則汗吐下三法之治一差死生反掌矣非比陰寒之邪中在一經不復傳變易於治也不過隨寒邪輕重用溫藥治之一定之法耳同上傷寒治法陽有此證陰亦有此證似陽而陰似陰而陽最難分別毫毛之差千里之謬要訣傷寒有陰證而頭或疼未有正陽證而頭略不疼者有陰證而反發熱未有正陽證而身不熱者有陰證而或小便自赤未有正陽證而小便不赤者此當正法治也同上元是陽證因汗下太過遂變成陰便當作陰證治卻不可謂其先初是陽拘拘於陽傳陰之説乃是三陽壞證傳為陰也此為陽之反而非陽之傳同上蓋證似陽而脈病屬陰者世尚能辨若脈證俱是陰而病獨屬陽者舉世莫辨而致夭折者滔滔皆是醫綱傷寒綱領惟陰陽為最此而有誤必致殺人然有純陽證有純陰證是當定見分治也又有陰陽相半證是寒之即陰勝熱之即陽勝或今日見陰而明日見陽者有之今日見陽而明日變陰者亦有之其在常人最多此證盤珠膠柱惟明哲者之能辨也然以陰變陽者多吉以陽變陰者多凶是又不可不察景嶽脈證總説韓氏曰大抵治傷寒病見證不見脈未可投藥見脈未見證雖少投藥亦無害也凡治雜病以證為先脈為後治傷寒病以脈為先證為後醫綱常法清高貴客脈證兩憑勞苦粗人多憑外症又有信一二分證者又有信一分脈者須要臨時參酌傷寒陽證似陰陰證似陽全憑脈斷入門大抵傷寒先須識證察得陰陽表裡虛實寒熱親切復審汗吐下溫和解之法治之庶無差誤先看兩目次看口舌後以手按其心胸至小腹有無痛滿用藥六書傷寒證候頃刻傳變傷寒治法繩尺謹嚴非可以輕忽視之也其間種類不一條例浩繁是固難矣至於陰極發躁熱極發厥陰證如陽陽證如陰腳氣似乎傷寒中暑似乎熱病與夫蓄血一證上熱下冷乍哄乍寒其至四肢發厥昏迷悶亂凡此等類尤當審思而明辨之總括邪之著人如飲酒然凡人醉酒脈必洪而數氣高身熱面目俱赤乃其常也及言其變各有不同有醉後妄言妄動醒後全然不知者有雖沉醉而神思終不亂者醉後應面赤而反刮白者應委弱而反剛強者應發熱而反惡寒戰栗者有易醉而易醒者有難醉而難醒者有發呼欠及嚏噴者有頭眩眼花及頭痛者因其氣血虛實之不同藏府稟賦之各異更兼過飲少飲之別考其情狀各自不同至論醉酒則一也及醒一時諸態如失凡人受疫邪始則晝夜發執日晡益甚頭疼身痛舌上白胎漸加煩渴乃衆人之常也及言其變各自不同或嘔或吐或咽喉乾燥或痰涎湧甚或純純發熱或發熱而兼凜凜或先凜凜而後發熱或先一日惡寒而後發熱以後即純純發熱或先惡寒而後發熱以後漸漸寒少而熱多以至純熱者或晝夜發熱者或但潮熱余時稍緩者有從外解者或戰汗或狂汗自汗盜汗或發斑有潛消者有從內傳者或胸膈痞悶或心腹脹滿或心痛腹痛或胸脅痛或大便不通或前後隆閉或協熱下利或熱結傍流有黃胎白胎者有口燥舌裂者有舌生芒刺舌色紫赤者有鼻孔如煙煤之黑者有發黃及畜血吐血衄血大小便血汗血嗽血齒衄血有發頤疙瘩瘡者有首尾能食者有絶谷一兩月者有無故最善反復者有愈後漸加飲食如舊者有愈後飲食勝常二三倍者有愈後退爪脫髮者至論惡證口禁不能張昏迷不識人足屈不能伸唇口不住牽動手足不住振戰直視圓睜目瞑上視口張聲啞舌強遺尿遺糞項強發痙手足俱痙筋惕肉瞤循衣摸床撮空理線等證種種不同因其氣血虛實之不同藏府稟賦之有異更兼感重感輕之別考其證候各自不同至論受邪則一也及邪盡一時諸證如失所謂知其一萬事畢知其要者一言而終不知其要者流散無窮此之謂也溫疫論案此條意以現證百端受邪則一為主今標出於斯以為證候數般因人不同之徵疫邪為病有從戰汗而解者有從自汗盜汗狂汗而解者有無汗竟傳入胃者有自汗淋漓熱渴反甚終得戰汗方解者有胃氣壅鬱必因下乃得戰汗而解者有表以汗解里有餘邪不因他故越三五日前證復發者有發黃因下而愈者有發黃因下而斑出者有竟從發斑而愈者有里證急雖有斑非下不愈者此雖傳變不常亦疫之常變也有局外之變者男子適逢淫欲或向來下元空虛邪熱乘虛陷於下焦氣道不施以致小便閉塞小腹脹滿每至夜即發熱以導赤散五苓五皮之類分毫不效得大承氣一服小便如注而愈者或素有他病一隅之虧邪乘宿昔所損而傳者如失血崩帶經水適來適斷心痛疝氣痰火喘急凡此皆非常變大抵邪行如水惟窪者受之傳變不常皆由人而使蓋因疫而發舊病治法無論某經某病但治其疫而舊病自愈同上治要明寒熱虛實夫百病不外乎三因而三因之中俱各有寒熱虛實不獨傷寒為然也然能明乎傷寒之寒熱虛實反覆變遷則百病之寒熱虛實瞭如指掌矣傷寒雖有三陰三陽之分膚皮肌腠胸脅腹胃臟腑形層之異大約不外乎寒熱虛實四者而已虛寒之與實熱如冰炭之相反虛寒固不可誤為實熱實熱又豈可誤為虛寒哉或有過於溫補而虛寒化為實熱過於涼瀉而實熱變為虛寒豈可膠柱而鼓瑟偏於涼瀉者不敢遽用溫補畏參附如蛇蠍偏並溫補者不敢輕用涼瀉視芩連為虎狼一失之虛虛一失之實實甚至堅執已見不肯活變未免輕病必重重病必死均失也不知寒有表寒有裡寒熱有表熱有裡熱虛有表虛有裡虛實有表實有裡實即寒熱之中有虛寒實寒虛熱實熱有上焦熱中下焦寒有上焦虛中下焦實有真實真熱真虛真實有假寒假熱假虛假實有內真寒而外假熱有內真熱而外假寒是以無論外感六淫內傷七情皮毛肌腠經俞營衛膜原臟腑莫不有虛實寒熱之分焉即靈素傷寒金匱千言萬語反覆辨論亦不過辨其為寒熱虛實而已任其鉤深致遠探索精微總不能出此四者範圍之外今之醫者不患乎不知寒熱虛實而患乎誤識寒熱虛實以致變證百出莫可名狀病者束手待斃醫者張皇失措更有些小微病不識寒熱虛實妄加攻補遂成不起之證此皆醫之誤也直解附余蒸熱自汗口渴飲冷白虎湯此散漫之熱可清而不可下潮熱譫語腹滿便閉宜攻之承氣湯此結聚之熱徒清無益也夫病當用承氣而只用白虎則結聚之熱之除當用白虎而遽用承氣則散漫之邪復聚而為結熱之症夫石膏大黃同一清劑而舉用不當尚關成敗何況寒熱相反者乎甚矣司命之難也心悟按原文作白虎加人參湯調胃承氣湯今刪正孫思邈曰服承氣得利謹不中補熱氣得補覆成此所以言實熱也王叔和有曰虛熱不可大攻熱去則寒起此所以言虛熱也二人之言殊途同歸是虛實之不可不辨也如此總括案孫言出千金治病略例中王言無考蓋誤憶傷寒例若不宜下而便攻之內虛熱入數句也又案此説本出活人書治不可拘次第脈有沉浮轉能變化或人得病數日方以告醫雖云初覺視病已積日在身其疹瘵結成非復發汗解肌所除當診其脈隨時形勢救解求免也不可苟以次第為固失其機要乃致禍矣千金病有難正治有傷寒雜病有傷寒正病傷寒雜病者難以正病治如病人證狀不一有冷有熱陰陽顯在目前當就其中大節先治其餘證則徐治然亦不可用獨熱獨寒之劑又如嘔渴煩熱進小柴胡湯嘔渴煩熱止矣而下利不休以小柴胡湯為非則嘔渴煩熱不應止以為是則下利不應見吐利厥逆進薑附湯吐利厥逆止矣而熱渴譫語昏不知人以薑附為非則吐利厥逆不應去以為是則熱渴譫語不應見此亦傷寒雜病雖無前項冷熱二證顯然並見之迹而陰中有陽陽中有陰潛伏其間未即發見用藥一偏此衰彼盛醫者當於有可疑之處能反覆辨認無致舉一廢一則盡善矣要訣老少異治三春旱草得雨滋榮殘臘枯枝雖灌弗澤凡年高之人最忌剝削誤投承氣以一當十設用參朮十不抵一蓋老年榮衛枯稿幾微之元氣易耗而難復也不比少年氣血生機甚捷其勢浡然但得邪氣一除正氣隨復所以老年慎瀉少年慎補何況誤用耶萬有年高稟厚年少賦薄者又當從權勿以常論溫疫論治當照管胃津治感症大法總以始終照管胃中津液為第一奧旨蓋邪之所處皮毛閉塞氣不外達鬱而成熱熱積皮毛不解漸而肌肉熱矣漸而各經絡無不熱矣漸而熱氣皆壅塞陽明腑中熱矣此必然之勢也又況後代血氣未盛早御酒肉厚味胃中素有濕熱者多一旦客熱交併區區陰津幾何能當此烈焰燎原乎凡感症之死皆由胃汁乾枯故死也是以古人立法及其邪之在表血氣未傷之時當汗汗之欲熱從汗解則清寧安固而血氣全保不傷矣當其邪之在裡血氣漸虧之際可下下之欲熱隨便通則焦灼頓除而氣血可徐俟其來復矣至所謂胃中之津液非他即周身血氣所化積疊胃底此後天之本也凡人平日之強弱及遇外感賊邪之難治易治可治不可治強半憑此粗工不知無論新久虛實表裡苟見身熱風藥混表一覺悶滿攻中破氣雜投不效大黃枳朴繼進必求一便以畢其技能豈慮熱得風而益熾陰被劫而速亡何其與先賢之意適相反哉西塘感症按董氏更有滋陰液充則實邪自解不須用承氣之説故末段以大黃枳朴同風藥混表為嗤點之實屬僻謬真虛者難治傷寒不問陰證陽證陰毒陽毒要之真氣完壯者易醫真氣虛損者難治諺云傷寒多死下虛人誠哉是言也蓋病人元氣不固真陽不完受病才重便有必死之道何也陽病宜下真氣弱則下之多脫陰病宜溫真氣弱則客熱便生故醫者難於用藥非病不可治也主本無力也自身無病入門作惟寡欲真氣完固雖有寒邪易於用藥是知傷寒以真氣為主發微論傷寒溫疫其不可治及難治者皆屬下元虛廣筆記凡人大勞大欲及大病久病後氣血兩虛陰陽並竭名為四損當此之際忽又加疫邪氣雖輕併為難治以正氣先虧邪氣自陷故諺有云傷寒偏死下虛人正謂此也蓋正氣不勝者氣不足以息言不足以聽或欲言而不能感邪雖重反無脹滿痞塞之證誤用承氣不劇即死以正氣愈損邪氣愈伏也若真血不足者面色萎黃唇口刮白或因吐血崩漏或因産後亡血過多或因腸風藏毒所致感邪雖重面目反無陽色誤用承氣速死以營血愈消邪氣益加沉匿也若真陽不足者或四肢厥逆或下利清穀肌體惡寒恆多泄瀉至夜益甚或口鼻冷氣感邪雖重反無發熱燥渴胎刺等證誤用承氣陽氣愈消陰凝不化邪氣留而不行輕則漸加委頓重則下咽立斃若真陰不足者自然五液乾枯肌膚甲錯感邪雖重應汗無汗應厥不厥誤用承氣病益加重以津液枯涸邪氣澀滯無能輸泄也凡遇此等不可以常法正治當從其損而調之調之不愈者稍以常法治之治之不及者損之至也是故一損二損輕者或可挽回重者治之無益乃至三損四損雖盧扁亦無所施矣更以老少參之少年遇損或可調治老年遇損多見治之不及者以枯魄獨存化源已絶不復滋生也溫疫論房後非陰證人身一陰陽耳而陰陽之根蒂皆本於腎好色之徒兩腎受傷陰虛者多陽虛者少陽虛者命門火衰也陰虛者腎中水竭也凡人入房過度則精多所遺所遺之精皆為水而屬陰況其作強之時心火先熾火熾則水流水愈流則火愈熾五內燥熱外復傷寒而病邪熱兩熱相夾腎水必枯其人發煩躁而舌黑生芒則就死矣語云傷寒偏打下虛人者正此謂也或問云誠如吾子所言則是人病傷寒無所謂陰證矣余答云有之陰證者中寒也其病乃是陽虛陽虛之人命門火衰其平日必言語低微飲食不化四肢無力腰以下冷前陰不舉小便清白此為真氣不足復為外寒所襲表裡四末皆冷是為真陰之證然亦不全因入房所致即小兒亦有病陰證者以胃中陽氣虛不能作鬱熱故也辨注今之醫者以其人房勞之後或遺精之後感冒風寒而發熱者謂之陰症病者遇此亦自謂之陰症不問其現證何如總用參朮附桂乾薑地黃等溫熱峻補之藥此可稱絶倒者也陰虛之人而感風寒亦必由太陽入仍屬陽邪其熱必甚兼以燥悶煩渴尤宜清熱散邪豈可反用熱藥若果直中三陰則斷無壯熱之理必有惡寒倦臥厥冷喜熱等症方可用溫散然亦終無用滋補之法即如傷寒差後房事不慎又發寒熱謂之女勞復此乃久虛之人復患大症依今人之見尤宜峻補者也而古人治之用竹皮一升煎湯服然則無病而房後感風更不宜用熱補矣故凡治病之法總視目前之現證現脈如果六脈沉遲表裡皆畏寒的系三陰之寒證即使其本領強壯又絶欲十年亦從陰治若使所現脈證的系陽邪發熱煩渴並無三陰之症即使其人本體虛弱又復房勞過度亦從陽治如傷寒論中陽明大熱之證直用葛根白虎等方者瞬息之間轉入三陰即改用溫補若陰症轉陽症亦即用涼散此一定之法也近世唯喻嘉言先生能知此義有寓意草黃長人之傷寒案可見餘人皆不知之其殺人可勝道哉源流論黃長人案系房後傷寒用調胃承氣湯再與大柴胡湯而愈考溫疫論陰症罕有論中既辨其人多蓄少艾或房後得病醫便疑為陰症輕證誤治每成痼疾凡客邪皆有輕重之分惟疫邪感受輕者人所不識往往誤治而成痼疾假令患利晝夜無度水穀不進人皆知其危利也其有感之輕者晝夜雖行四五度飲食如常起居如故人亦知其輕利未嘗誤以他病治之者憑有積滯耳至如溫疫感之重者身熱如火頭疼身痛胸腹脹滿胎刺譫語斑黃狂躁人皆知其危疫也其有感之淺者微有頭疼身痛午後稍有潮熱飲食不甚減但食後或覺脹滿或覺噁心脈微數如是之疫最易誤認即醫家素以傷寒溫疫為大病今因證候不顯多有不覺其為疫也且人感疫之際來而不覺既感不知最無憑據又因所感之氣薄今發時故現證不甚雖有頭疼身痛況飲食不絶力可徒步又焉得而知其疫也病人無處追求每每妄訴病原醫家不善審察未免隨情錯認有如病前適遇小勞病人不過以此道其根由醫家不辨是非便引東垣勞倦傷脾元氣下陷乃執甘溫除大熱之句隨用補中益氣湯壅補其邪轉壅轉熱轉熱轉瘦轉瘦轉補多至危殆或有婦人患此適逢産後醫家便認為陰虛發熱血氣發痛遂投四物湯及地黃丸泥滯其邪遷延日久病邪益固遍邀女科無出滋陰養血屢投不效復更涼血通瘀不知原邪仍在積熱自是不除日漸尩羸終成廢痿凡人未免七情勞郁醫者不知為疫乃引丹溪五火相扇之説或指為心火上炎或指為肝火衝擊乃惟類聚寒涼冀其直折而反凝泣其邪徒傷胃氣疫邪不去瘀熱何清延至骨立而斃或尚有宿病淹纏適逢微疫未免身痛發熱醫家病家同認為原病加重仍用前藥加減有妨於疫病益加重至死不覺者如是種種難以盡述聊舉一二推而廣之可以應變於無窮矣溫疫論久病感邪多為痼疾凡人向有他病尩羸或久瘧或內傷瘀血或吐血便血咳血男子遺精白濁精氣枯涸女人崩漏帶下血枯經閉之類以致肌肉消爍邪火獨存故脈近於數也按此云邪火蓋是虛火此際稍感疫氣醫家病家見其穀食暴絶更加胸膈痞悶身疼發熱徹夜不寐指為原病加重誤以絶谷為脾虛以身痛為血虛以不寐為神虛遂投參朮歸地茯神棗仁之類愈進愈危知者稍以疫法治之發熱減半不時得醒穀食稍進但數脈不去肢體時疼胸脅錐痛過期不愈醫以雜藥頻試補之則邪火愈熾瀉之則損脾壞胃滋之則膠邪益固散之則經絡益虛疏之則精氣愈耗守之則日消近死蓋里證雖除不知正氣衰微不能托出表邪留而不去因與血脈合而為一結為痼疾也肢體時疼者邪與榮氣搏也脈數身熱不去者邪火併郁也脅下錐痛者火邪結於膜膈也此云邪火火邪並指邪與火與上不同過期不愈者凡疫邪交卸近在一七遠在二七甚至三七過此不愈者因非其治不為壞證即為痼疾也大痼疾者所謂客邪膠固於血脈主客交渾最難得解且愈久益固治法當乘其大肉未消真元未敗急用三甲散多有得生者更附加減法隨其平素而調之溫疫論按三甲散難用此證於清骨諸方中酌用為當仍不取也治挾他患法傅學淵曰凡外感病挾食者頗多當思食為邪裹散其邪則食自下若雜消導於發散中不專達表胃汁復傷因而陷閉者有之至若風多挾暑濕寒或挾燥火感惱怒或勞倦或房事及肝氣宿瘕諸血症皆外感病之不無有挾者所貴隨症制宜斟酌盡善庶無差誤也吳醫匯講疫癘不可定方世之重疾無逾風勞臌膈而四者之治總有蹊徑可尋如風症止真中類中二條勞症即云難治亦不過陰陽水火氣血先天后天視其何者虧損而補益之臌脹有驅水理氣之殊噎膈止潤燥養血之法唯至於疫變化莫測為症多端如神龍之不可方物臨症施治者最不宜忽也瘟疫尚好治療識其表裡已得大綱即有變現雜症如斑汗發黃之類皆易捉摸即雜疫如雲謂諸瘟諸痧諸掙等症名具療法亦易施治唯乙巳年民之所患並非奇疾怪症不過痢疾泄瀉肚腹脹痛等病有何難療孰意用平日治此疾法治之半皆不應或二三人同患一症而治法各異者施之此人而效施之彼人而又不效矣或有一人患是症而愈而復作者其治法又異施之前此而效施之後此而又不效矣若非具慧眼卓識而窺見垣一方者豈能人人而濟之乎蓋必深明乎正氣客氣之殊陰陽四時之異或亢旱而燥熱煩灼或霖雨而寒濕鬱蒸或忽寒而忽暖或倏晴而倏陰或七情之有偏注或六欲之有慝情或老少強弱之異質或富貴貧賤之殊途細心入理再加以望聞問切一一詳參庶病無遁情而矢無妄發至於治法千變萬化隨宜用藥莫可名言故仲景曰瘟疫不可先定方瘟疫之來無方也旨哉斯言是在留心此道者神而明之可耳説疫按辨證録云余又聞南陽張真人之教謂瘟疫自來無方然方亦可豫定以瘟病皆熱病也要均寓言耳疫病當分天時寒暄濕燥病者虛實安逸因時制宜不可拘泥如久旱天時多燥熱疫流行忌用燥劑宜解毒潤燥天久淫雨濕令大行脾土受傷民多寒疫多兼瀉利忌用潤藥宜滲濕理脾六要損復邪之傷人也始而傷氣繼而傷血繼而傷肉繼而傷筋繼而傷骨邪毒既退始而復氣繼而復血繼而復肉繼而復筋繼而復骨以柔脆者易損亦易復也溫疫論
