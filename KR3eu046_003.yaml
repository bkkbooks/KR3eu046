body:
  text: 卷三辨證惡寒傷寒惡寒何以明之惡寒者風寒客於營衛之中也惟其風寒客於營衛則灑淅然惡寒也惟其營衛之受風寒則嗇嗇然不欲舒也其惡寒者非寒熱之寒也又非惡風也且惡風者見風至則惡矣得以居密室之內幃帳之中則坦然自舒也至於惡寒者則不時風而寒雖身大熱而不欲去衣者是也寒熱之熱謂寒熱更作熱至則寒至矣其惡寒雖發熱而不欲去衣也甚則至於向火被覆而猶不能遏其寒也所以然者由陰氣上入陽中或陽微或風虛相搏之所致也惡寒一切屬表雖里證悉具而微惡寒者亦是表未解也猶當先解其外俟不惡寒為外解乃可攻裡也經曰發熱而惡寒者發於陽也無熱而惡寒者發於陰也謂如傷寒或已發熱或未發熱必惡寒者謂繼之以發熱此則發於陽也若惡寒而踡脈沉細而緊者此則發於陰者也在陽者可發汗在陰者可溫里惡寒雖悉屬表而在表者亦有虛實之別若汗出而惡寒者則為表虛無汗而惡寒者則為表實表虛可解肌表實可發汗又有止稱背惡寒者背為胸中之府諸陽受氣於胸中而轉行於背內經曰人身之陰陽者背為陽腹為陰陽氣不足陰寒氣盛則背為之惡寒若風寒在表而惡寒者則一身盡寒矣但背惡寒者陰寒氣盛可知也經所謂少陰病一二日口中和而背惡寒者當灸之處以附子湯者是矣又或乘陰氣不足陽氣內陷入陰中表陽新虛有背微惡寒者經所謂傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之者是也二者一為陰寒氣盛一為陽氣內陷又何以明之也且陰寒為病則不能消耗津液故於少陰病則口中和及陽氣內陷則熱爍津液為干故太陽則口燥舌乾而渴也二者均是背惡寒要辨陰陽寒熱不同者亦於口中潤燥可知明理惡風傷寒惡風何以明之黃帝針經曰衛氣者所以溫分肉充皮膚肥腠理司開闔者也風邪中於衛也則必惡風何者以風則傷衛寒則傷營為風邪所中於分肉不溫而熱矣皮毛不充而緩矣腠理失其肥則疏而不密開闔失其司則泄而不固是以惡風也是惡風惡寒二者均為表證其惡風則比之惡寒而輕也惡寒者嗇嗇然憎寒也雖不當風而自然寒矣惡風者謂常居密室之中幃帳之內則舒緩而無所畏也一或用扇一或當風淅淅然而惡者此為惡風者也惡寒則有屬於陽者有屬於陰者及其惡風者悉屬於陽非若惡寒之有陰陽也三陰之證並無惡風者以此也惡風雖悉在表而發散又自不同若無汗而惡風者為傷寒當發其汗若汗出而惡風者則為中風當解其肌里證雖具而惡風未罷也皆當先解其外也又有發汗多亡陽與其風濕皆有惡風之證蓋以發汗多漏不止則亡陽外不固是以惡風也必以桂枝加附子湯溫其經而固其衛風濕相搏骨節疼煩濕勝自汗而皮腠不密是以惡風也必以甘草附子湯散其濕而實其衛由是觀之惡風屬乎衛者可知矣明理發熱傷寒發熱何以明之發熱者謂怫怫然發於皮膚之間熇熇然散而成熱者是也與潮熱寒熱若同而異與煩躁相類而非煩躁者在內者者潮熱之熱有時而熱不失其時寒熱之熱寒已而熱相繼而發至於發熱則無時而發也有謂翕翕發熱者有謂蒸蒸發熱者此則輕重不明表裡之區別爾所謂翕翕發熱者謂若合羽所覆明其熱在外也與桂枝湯發汗以散之所謂蒸蒸發熱者謂若熏蒸之蒸明其熱在內故也與調胃承氣湯攻下以滌之其發熱屬表者即風寒客於皮膚陽氣怫鬱所致也觀其熱所從來而汗下之證明其辨焉若熱先自皮膚而發者知邪氣之在外也若熱先自里生而發達於表者知邪氣之在裡也舉斯二者為邪氣在表在裡而發熱也惟其在表在裡俱有發熱故邪在半表半裡者亦有發熱之證何者以表證未罷邪氣傳裡里未作實是為半表半裡其發熱者或始自皮膚而漸傳裡熱或始自內熱而外連於表蓋邪氣在表發熱者則表熱里不熱也邪氣在裡發熱者則裡熱甚而達於表也其在半表半裡發熱者則表裡俱發熱而但熱又輕於純在表者也經雖云發熱惡寒者發於陽也無熱惡寒者發於陰也然少陰病始得之亦有反發熱者然亦屬其表也特與麻黃細辛附子湯發其汗者是已發熱為傷寒之常也一或陰陽俱虛與下利新汗後又皆惡其發熱也經云脈陰陽俱虛熱不止者死下利發熱者亦死內經云汗出輒復熱而脈躁疾不為汗衰狂言不能食此名陰陽交交者死也斯亦發熱也詎可與尋常發熱一概而論耶醫者更當明辨之明理寒熱傷寒寒熱何以明之寒熱者謂往來寒熱也往來寒熱屬半表半裡之證邪居表多則多寒邪居里多則多熱邪氣半在表半在裡則寒熱亦半矣審其寒熱多少見其邪氣淺深矣小柴胡湯專主往來寒熱而又立成諸加減法亦為邪氣在半表半裡未有定處往來不常又寒熱如瘧與夫發熱惡寒皆似而非也然寒熱如瘧者作止有時者也及往來寒熱則作止無時或往或來日有至於三五發者甚者十數套與其瘧狀有以異也至於發熱惡寒者為發熱時惡寒並不見惡寒時熱不見也不若此熱已而寒寒已而熱者明理原論寒熱所由義不瑩不録潮熱傷寒潮熱何以明之若潮水之潮其來不失其時也一日一發指時而發者謂之潮熱若日三五發者即是發熱非潮熱也潮熱屬陽明必於日晡時發者乃為潮熱陽明者胃屬土應時則王於四季應日則王於未申經曰陽明居中土也萬物所歸無所復傳蓋邪氣入胃謂之入府府之為言聚也若府庫之府焉邪氣入於胃而不復傳邪氣鬱而為實熱隨王而潮是以日晡所發潮熱者屬陽明也明理此係節録以下所引多然經云日晡所發潮熱者胃家實也此屬陽明當下證然亦有每至晡時發熱五更復退而大便自利用姜附辛熱劑而愈豈可以日晡潮熱遽謂之陽遽謂之實要須以他證參之愚曾治患人沈其姓之子乃所親見而親試者也要訣自汗病後自汗見餘證中傷寒自汗何以明之自汗者謂不因發散而自然汗出者是也自汗之證有表裡之別焉虛實之異焉若汗出惡風及微惡寒者皆表未解也必待發散而後愈至於漏不止而惡風及發汗後惡寒者又皆表之虛也必待溫經而後愈諸如此皆邪氣在表也若汗出不惡寒者此為表解而里未和也經曰陽明發熱汗出此為越熱又曰陽明病發熱汗多者急下之又非若邪氣在表而汗出之可緩也傷寒自汗之證為常也設或汗出發潤與其出之如油或大如貫珠者身出而不流皆為不治之證也必手足俱周遍身悉潤漐漐然一時間許煩熱已而身涼和乃為佳矣此則陰陽氣和水升火降榮衛通流邪氣出而解者也內經曰陽之汗以天地之雨名之此之謂也明理自汗者不因發散自然汗出也伏邪中潰氣通得汗邪欲去也若脈長洪而數身熱大渴宜白虎湯得戰汗方解若里證下後續得自汗雖二三日不止甚者四五日不止身微熱熱甚則汗甚熱微汗亦微此屬裡若誤認為表虛自汗輒用黃耆實表及止汗之劑則誤矣有里證時當盛暑多作自汗宜下之若面無神色唇口刮白表裡無陽證喜熱飲稍冷則畏脈微欲絶忽得自汗淡而無味者為虛脫夜發則晝死晝發則夜亡急當峻補補不及者死溫疫論盜汗病後盜汗見餘證中傷寒盜汗何以明之盜汗者謂睡而汗出者也自汗則不或睡與不睡自然而出也及盜汗者不睡則不能汗出方其睡也溱溱然出焉覺則止而不復出矣雜病盜汗者責其陽虛也傷寒盜汗者非若雜病之虛是由邪氣在半表半裡使然也何者若邪氣一切在表干於衛則自然汗出也此則邪氣侵行於里外連於表邪及睡則衛氣行於里乘表中陽氣不致津液得泄故但睡而汗出覺則氣散於表而汗止矣經曰微盜汗出反惡寒者表未解也又陽明病當作裡實而脈浮者云必盜汗是猶有表邪故也又三陽合病目合自汗是知盜汗為邪氣在半表半裡之間明矣且自汗有為之虛者有為之實者其於盜汗之證非若自汗有實者悉當和表而已不可不知也明理凡人目張則衛氣行於陽目瞑則衛氣行於陰行陽謂升發於表行陰謂斂降於內今內有伏熱而又遇衛氣兩陽相搏熱蒸於外則腠理開而盜汗出矣溫疫論頭汗頭汗之證有二一為邪熱上壅一為陽氣上脫也蓋頭為諸陽之會凡傷寒遍身得汗者謂之熱越其身無汗則熱不得越而上蒸陽分故但頭汗出也治熱蒸者可清可散甚者可下在去其熱而病自愈至若氣脫一證則多以妄下傷陰或克化太過或泄瀉不止以致陰竭於下則陽脫於上小水不通而上見頭汗則大危矣景嶽此係節明理論文手足汗傷寒手足汗出何以明之四肢者諸陽之本而胃主四肢手足汗出者陽明之證也陽經邪熱傳並陽明則手足為之汗出陽明為津液之主病則自汗出其有自汗出者有但頭汗出者有手足汗出者悉屬陽明也何以使之然也若一身自汗出者謂之熱越是熱外達者也但頭汗出者是熱不得越而熱氣上達者及手足汗出者為熱聚於胃是津液之傍達也明理無汗傷寒無汗何以明之腠理者津液湊泄之所為腠文理縫會之中為理津液為風暑濕氣所幹外湊皮腠者則為自汗出若寒邪中經腠理致密津液內滲則無汗無汗之由又有數種如傷寒在表及邪行於里或水飲內蓄與亡陽久虛皆令無汗其邪氣行於里無汗者為邪氣在表熏發腠理則汗出邪氣內傳不外熏發者則無汗其水飲內畜而無汗者為水飲散而為津液津液布滲而為汗既水飲內畜而不行則津液不足而無汗其陽虛無汗者諸陽為津液之主陽虛則津液虛少故無汗如是者理之常也又焉得為異哉一或當汗而不汗服湯一劑病證仍在至於服三劑而不汗者死症也又熱病脈躁盛而不得汗者黃帝謂陽脈之極也死茲二者以無汗為真病詎可與其餘無汗者同日而語也明理胸脅滿胸滿治法見兼變中結胸傷寒胸脅滿何以明之胸脅滿者謂胸脅間氣塞滿悶也非心下滿者也脅滿者謂脅肋下氣脹填滿也非腹滿者也邪氣自表傳裡必先自胸膈已次經心脅而入胃邪氣入胃為入府也是以胸滿多帶表證脅滿者當半表半裡證也蓋胸中至表猶近也及脅者則更不言發汗但和解而已大抵胸脅滿以邪氣初入里未停留為實氣鬱積而不行致生滿也和解斯可矣若邪氣留於胸中聚而為實者非湧吐則不可已明理凡膻中不足者多言則氣怯感邪即胸膈不舒少與枳朴反見痞結中土不足者受邪最易動泄遂成滿結若此者皆未嘗誤下而成滿結也醫級心下滿凡心下滿者正在心之下胃之上也此自滿而非下之所致若下蚤而致滿者此為痞氣凡心下滿以手按之揉之則散而軟者此虛氣也若按之汨汨有聲而軟者此有停水也若按之硬痛者有宿食也蘊要腹滿傷寒腹滿何以明之腹滿者俗謂之肚脹是也華他曰傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃入胃謂入府也是在腹也猶未全入里者雖腹滿為里證故亦有淺深之別經曰表已解而內不消非大滿猶生寒熱則病不除是其未全入府若大滿大實堅有燥屎自可除下之雖四五日不能為禍謂之邪氣已入府也傷寒邪入腹是里證已深故腹滿乃可下之者多矣雖曰腹中滿痛者此為實也當下去之然腹滿不減者則為實也若腹滿時減者又為虛也則不可下經曰腹滿不減減不足言當下之金匱要略曰腹滿時減復如故此虛寒從下上也當以溫藥和之蓋虛氣留滯亦為之脹但比之實者不至堅痛也大抵腹滿屬太陰證也陽熱為邪者則腹滿而咽乾陰寒為邪者則腹滿而吐食不下自利益甚時腹自痛太陰者脾土也治中央故專主腹痛之候又發汗吐下之後因而成腹滿者皆邪氣乘虛內客為之而所主又各不同原此辨厚朴生薑甘草半夏人參湯調胃承氣湯梔子厚朴湯三方所主腹滿之異文繁不録凡為醫者要識邪氣所起所在審其所起知邪氣之由來觀其所在知邪氣之虛實發汗吐下之不差溫補針艾之適當則十全之功自可得也明理傷寒少腹滿者何以明之少腹滿者臍下滿也少腹者下焦所治難經曰下焦者當膀胱上口主分別清濁其治在臍下邪虛自上而下至於下焦結而不利故少腹滿也胸中滿心下滿皆氣爾即無物也及腹滿者又有燥屎為之者至少腹滿者非止氣也必有物聚於此而為之滿爾所謂物者溺與血爾邪氣聚於下焦則津液不得通血氣不得行或溺或血留滯於下是生脹滿而硬痛也若從心下至少腹皆硬滿而痛者是邪實也須大陷胸湯下之若但少腹硬滿而痛小便利者則是畜血之證小便不利者則是溺澀之證滲之利之參酌隨宜可為上工同上凡腹滿者腹中脹滿也若以手按之堅硬而痛不可按者為實可按可揉內軟者虛也蘊要結胸從心下起至少腹硬滿而痛與腹滿類也然結胸按之則痛手不可近腹痛舉按常痛手近不甚也又痞亦從心下起至少腹亦與滿類也然痞或止留心下腹滿但在腹之中也有此為異隨證宜審準繩腹痛邪氣入里與正氣相搏則為腹痛蓋陽邪傳裡而痛者其痛不常陰寒在內而痛者則痛無休時欲作痢也當以熱藥溫之有燥屎宿食為痛者則煩而不大便腹滿而痛也則後用下六書凡傷寒腹痛者必須驗其寒熱下藥若初得病身熱後加以口乾喜飲冷大便閉小便赤躁煩脈滑數此有宿糞難經曰痛為實仲景論時滿時痛之症有曰痛甚者加大黃意可見也若初得病身冷厥逆脈來沉細冷汗自出者方是陰證雖宜熱藥亦須消息輕重而用之明條腹痛不可按不可揉者實也可按可揉者虛也時痛時止者實也痛無休息者虛也凡陽邪傳裡裡氣作實腹脹大便硬者實也陰邪傳裡裡氣停寒腹軟泄瀉者虛也脈來滑大有力者實也弦細無力者虛也又當分大小少三腹而治之若大腹痛者即心腹而有寒邪食積也小腹痛者即臍腹而有邪熱燥糞也少腹痛者即臍以下而有瘀血結溺也各從其寒熱虛實而治熱者清之寒者溫之實者下之虛者補之活人書云傷寒腹痛當分四症而治此其法也同上案此分三腹未知何出原更配之三陰最屬牽強不録亦有虛寒之人患腹痛服溫補藥而相安時止時作痛仍不解甚則利清水或白沫此虛中有實或先有宿食在腸不曾去或病中腸胃虛不能運化所食之物停於腸中即一二塊宿糞亦能作楚宜用溫補藥煎好去渣入大黃一錢不甚虛者可加一錢五分滾四五沸服之宿食自下正氣不傷而病隨愈此屢試屢驗之妙法也緒論渴當參雜載渴與水法凡渴問其所飲欲冷欲熱欲多欲少若飲多而欲冷者陽渴也更須審其有何證在經也陰亦有自利而渴但陰有渴古人多用冷劑以其皆挾陽氣耳然亦有下利清穀不繫熱利純是陰證而反見渴者此是陰在下隔陽於上兼因泄瀉津液既去枯燥而渴其人雖引飲所飲自少而常喜溫不可投冷劑要訣病人有實熱而渴者有氣虛自汗過多或誤發汗津液頓亡而渴者名曰血渴治法不同假令血熱發渴外症四肢有熱小便赤澀虛實辨疑劉氏曰大抵陰虛煩躁發渴不能飲水或有勉強飲下良久復吐出或飲水而嘔或噦逆者皆內寒也豈無根失守之火遊於咽嗌之間假作躁渴則不飲水也或為能飲不吐復欲飲者熱也選録有一等中氣虛寒寒水泛上逼其浮游之火於咽喉口舌之間者渴欲引飲但飲水不過一二口即厭少頃復渴散亦不過若此蓋上焦一段欲得水救至中焦則以水見水正其所惡也西塘感症評煩躁虛煩如狂見陽明病陰極發躁見少陰病傷寒煩躁何以明之煩為擾擾而煩躁為憤躁之躁合而言之煩躁為熱也析而言之煩也躁也有陰陽之別焉煩陽也躁陰也煩為熱之輕者躁為熱之甚者經有煩疼煩滿煩渴虛煩皆以煩為熱也有不煩而躁者為怫怫然便作躁悶此為陰盛隔陽也雖大躁欲於泥水中臥但飲水不得入口者是矣所謂煩躁者謂先煩漸至躁也所謂躁煩者謂先發躁而迤邐復煩者也煩躁之由又為不同有邪氣在表而煩躁者有邪氣在裡而煩躁者有因火劫而煩躁者有陽虛而煩躁者有陰盛而煩躁者皆不同也煩躁為常有之疾復有諸不治之證臨病者之側又當熱審焉明理有汗之煩躁里症也宜清熱無汗之煩躁表症也宜散表脈浮之煩躁表症也宜散表脈伏之煩躁伏邪也宜升提沉數之煩躁裡熱也宜清熱沉遲之煩躁裡寒也宜溫經大白有脈數心煩而躁至夜不寧者為血虛芍藥甘草湯有晝日煩躁至夜安靜者為陽虛乾薑附子湯有誤用姜附而煩躁虛則升陽散火實則黃連解毒若躁極脈亂者勿治也緒論凡見厥冷下利讝語遺尿直視躁不得臥其脈無力欲絶者不治凡先煩後躁可治先躁後煩死獨躁不煩者死更有臥寐不寧者乃胃中津液乾枯不能內營其魂魄也惟為生津俾胃和而臥自安也錦囊晝夜偏劇凡病晝靜夜劇者熱在血分若夜靜晝劇者此熱在氣分若晝夜俱劇者此熱在氣血之分也若有表證不得汗出晝夜不得安脈浮數者宜發汗則愈若有裡實大便不通燥糞結聚發躁晝夜不得安則宜下之則愈蘊要讝語傷寒讝語何以明之讝者謂呢喃而語也又作譫謂妄所有見而言也斯皆真氣昏亂神識不清之所致夫心藏神而心主火病則熱氣歸焉傷寒胃中熱盛上乘於心心為熱冒則神昏亂而語言多出識昏不知所以然遂言無次而成讝妄之語輕者睡中呢喃重者不睡亦語言差謬有讝語者有獨語者有狂語者有語言不休者有言亂者此數者見其熱之輕重也讝語與獨語雖間有妄錯之語若與人言有次是熱未至於極者也經曰獨語如見鬼狀若劇者發則不識人是病獨語未為劇也狂語者熱甚者也由神昏而無所見覺甚則至於喊叫而言語也言語不休者又其甚也至於亂言者謂妄言罵詈善惡不避親疏為神明已亂也經曰諸逆發汗微者難差劇者言亂是難可復製也讝語之由又自不同皆當明辨之有被火劫讝語者有汗出讝語者有下利讝語者有下血讝語者有燥屎在胃讝語者有三陽合病讝語者有亡陽讝語者諸如此者脈短則死脈自和則愈又身微熱脈浮大者生逆冷脈沉細不過一日死按此二句本於十七難實則讝語氣收斂在內而實者本病也或氣上逆而喘滿或氣下奪而自利者皆為逆也經曰直視讝語喘滿者死下利者亦死謂其正氣脫絶也能知虛實之診能識逆從之要治病療病則不失矣明理讝語者顛倒錯亂言出無倫常對空獨語如見鬼狀鄭聲者鄭重頻繇語雖謬而諄諄重復不自已年老之人遇事則誶語不休以陽氣虛也二者本不難辨須以他證別之大便祕小便赤身熱煩渴而妄言者乃里實之讝語也小便如常大便洞下或發躁或反發熱而妄言者乃陰隔陽之讝語也此讝語鄭聲虛實之所以不同也要訣讝語者謂亂語無次第數數更端也鄭聲者謂鄭重頻煩也只將一句舊言重疊頻言之終日殷勤不換他聲也蓋神有餘則能機變而亂語數數更端神不足則無機變而只守一聲也成無己謂鄭聲為鄭衛之聲非是醫綱經曰實則讝語虛則鄭聲是鄭聲亦讝語也其所以分鄭聲與讝語者在乎虛實其所以別虛與實者在乎聲之輕重耳歌哭怒笑其聲長而有力身輕能自轉側坐起不大便脈滑而長或緩而有力脈不數此實則讝語也宜黃連石膏之類如胃中有燥屎不大便宜大承氣湯證雖怪異一二劑即愈若夫似睡非睡之間或昏或清似語非語即所言者或平日所作之事或無稽之談問亦不知其聲輕微而無力即素問所謂言而微終日復言者是也脈必大而散或數而無力或細而遲此虛則鄭聲也宜用參附之類非數十劑不能收功然亦有大實症狂言狂走宜細審之直解凡讝語無實熱燥結可攻者皆不可治下後讝妄雖稍緩仍不止若未見溏糞者為下未盡更下之緒論又有不繫正陽明似困非困間時有一二聲讝語者當隨證施治外有已得汗身和而言妄者此是汗出後津液不和慎不可下乃非陽非陰者宜小柴胡湯和建中湯各半貼和營衛通津液要訣餘子秉淦每感風寒必善作讝語若不習知者遇此認為里症妄施攻下寧有不殆者乎瘟疫論類編多眠陰盛主靜靜則使人多眠或踡臥而眠或終日不言而眠均屬直中表症多眠是感邪深重必見頭痛發熱而鼻息氣粗里症多眠因熱沖清道神思昏昧然必呼之即醒不若直中身冷鼻冷聲息微怯呼之不醒也孝慈備覽凡得汗後脈靜身涼而好睡者病之愈候也蘊要互見愈候短氣傷寒短氣何以明之短氣者氣短而不能相續者是矣似喘而非喘若有氣上衝而實非氣上衝也喘者張口抬肩搖身滾肚謂之喘也氣上衝者復裡氣時時上衝也所謂短氣者呼吸雖數而不能相續似喘而不喘搖肩似呻吟而無痛者短氣也經所謂短氣者衆實為難辨之證愚醫莫識之為治有誤者多矣要識其短氣之直者氣急而短促謂之氣短者是也短氣有責為虛者有責為實者又有屬表又有屬裡者要當審視之大凡心腹脹滿而短氣者邪在裡而為實也腹濡滿而短氣者邪在表而作虛也大抵短氣為實金匱要略曰短氣不足以息者實也又水停心下亦令短氣金匱要略曰食少飲多水停心下微者短氣即此觀之短氣之由亦衆矣必審其形候使的而不惑必審其邪氣在表裡之不差隨症攻之了無不愈者矣明理動氣傷寒動氣何以明之動氣者為築築然動於腹中者是矣藏氣不治隨藏所主發泄於臍之四傍動跳築築然謂之動氣難經脾內證當臍有動氣經特曰臍之四傍動氣不可汗下獨不言脾候當臍有動氣者以脾者中州為胃以行津液發汗吐下猶先動脾況脾家發動氣者詎可動之也所以特不言之也傷寒所以看外證為當者蓋不在脈之可見必待問之可得者發汗吐下務要審諦舉此動氣類可知矣明理戰栗戰汗詳見少陽病篇中傷寒戰栗何以明之戰栗者形相類而實非一也合而言之戰栗非二也析而分之有內外之別焉戰者身為之戰搖者是也栗者心戰是也戰之與栗內外之診也昧者通以為戰栗也通為戰栗而不知有逆順之殊經曰胃無穀氣脾澀不通口急不能言戰而栗者即此觀之戰之與栗豈不異哉戰之與振振輕而戰重也戰之與栗戰外而栗內也戰栗者皆陰陽之爭也傷寒欲解將汗之時正氣內實邪不能與之爭則便汗出而不發戰也邪氣欲出其人本虛邪與正爭微者為振甚者則戰戰退正勝而解矣經曰病有戰而汗出因得解者何也其人本虛是以發戰者是也邪氣外與正氣爭則為戰戰其愈者也邪氣內與正氣爭則為栗栗為甚者也經曰陰中於邪必內栗也表氣微虛裡氣不守故使邪中於陰也方其裡氣不守而為邪中於正氣正氣怯弱故成栗也戰者正氣勝栗者邪氣勝也明理振傷寒振者何以明之振者森然若寒聳然振動者是也傷寒振者皆責其虛寒也至於欲汗之時其人必虛必蒸蒸而振欲發熱汗出而解振近戰也而輕者為戰矣戰為正與邪爭爭則為鼓栗而戰振但虛而不至爭故止聳動而振也下後復發汗振寒者謂其表裡俱虛也亡血家發汗則寒栗而振者謂其血氣俱虛也諸如此者止於振聳爾其振振欲劈地者有身為振振搖者二者皆發汗過多亡陽經虛不能自主持故身為振搖也又非若振栗之比明理厥熱厥互見陽明病五六日間手足逆冷者此名厥也厥者逆也陰陽不相接手足逆冷也陽氣衰而陰氣盛陰勝於陽故陽脈為之逆不通手足所以逆冷也傷寒熱多厥少者其病當愈厥多熱少者其病為進然有冷熱二證當子細辨認之熱厥白虎承氣冷厥四逆理中通脈四逆當歸四逆加茱萸生薑湯白通加豬膽湯可選用之冷厥者初得病者便四肢逆冷脈沉微而不數足多攣臥而惡寒或自引衣蓋覆不飲水或下痢清穀或清便自調活人此云或小便數外證多惺惺而靜脈雖沉實按之遲弱知冷厥也其熱厥者初中病必身熱頭痛外別有陽證至二三日活人此云乃至四五日方發厥厥至半日卻身熱活人此云蓋熱氣深則方能發厥須在二三日後也若微厥即發熱者熱微故也脈雖沉伏按之滑元戎引張翼云其伏熱在內而厥者脈雖沉伏按之至骨宜來數也此為里有熱活人此云其人或畏寒或飲水或揚手擲足煩躁不得眠大便祕小便赤外證多昏憒者知其熱厥也通真子括要治例引高保衡孫兆云陽病極熱而厥畢竟脈緊外證須狂語揚衣被也陰厥按之脈沉遲而形靜也高保義云寒厥則證多靜而了了脈雖伏若實按之遲而弱也熱厥外證多昏塞脈雖伏若實按之須挾數而有力也元戎手足逆冷皆屬厥陰不可下亦不可汗有須下證者謂手足雖逆冷或有溫時手足雖逆冷而手足掌心必暖非正厥也故可消息汗下也總病或曰人之手足乃胃土之末凡脾胃有熱手足必熱脾胃有寒手足必冷理之常也惟傷寒乃有厥深熱亦深厥微熱亦微之論何耶曰冒寒則手足寒冒熱則手足熱此病之常也若夫極則變不可以常道拘也蓋亢則害承乃制火氣亢極反兼水化故有此象耳陰陽反覆病之逆從未可以常理論也凡經言厥逆厥冷厥寒手足寒冷等語皆變文耳不可以論輕重若言四肢則有異亦未可純為寒證此二句不妥若厥冷直至臂脛以上則為真寒無疑矣急用姜附等藥溫之少緩則難療矣謂其寒上過乎肘下過乎膝非內有真寒達於四肢而何然更當與脈並所兼之證參之庶乎其無誤也凡看傷寒不可以厥逆便斷為寒必須以脈兼證參之方知端的如手足厥逆兼之以腹痛腹滿泄利清白小便亦清口不渴惡寒戰栗面如刀刮皆寒證也若腹痛後重泄利稠黏小便赤澀渴而好飲皆熱證也宜詳審之六書凡厥逆可下者內有燥屎也必以手按病人臍腹或硬或滿或痛者是也甚者手不可近或按則叫痛者有燥屎也若腹中轉氣下失屁出極臭者有燥屎也或繞臍刺痛者有燥屎也蘊要傷寒血證亦有四肢發厥以至昏迷悶絶者此又不可不知總括足冷手不冷者下焦衛氣不溫也有下元素虛之人病傷寒中風惡寒發熱但陽縮足冷者當從夾陰例治亦有兩手逆冷而兩足熱厥如火者此陰氣衰於下腸氣衰於上陰陽否隔之兆也緒論案此熱厥之厥可疑踡臥踡者曲縮不伸者是也皆陰寒之極須在陽經見是證者然有表症亦用溫經之劑桂枝附子是已況在三陰裡寒下利厥逆者乎四逆之類奚可缺哉若有陰無陽者為不治類證踡臥何以寒症答曰踡臥者手足踡而不伸也即諺云縮腳臥是也熱則手足舒暢豈有踡臥之理惟寒有之今人冬月獨寢若寒極則踡臥天氣稍暖則手足稍舒必揭被露胛何有踡臥故見踡臥即是寒症無疑矣又問曰陽經表症亦有踡臥者寒耶熱耶答曰陽經有踡臥者表中寒深也須大發表何以別之若有頭疼發熱及諸表症乃是陽經踡臥蓋陰經踡臥則外無一毫症以別之耳五法筋惕肉瞤治方見兼變中誤治虛乏傷寒筋惕肉瞤何以明之傷寒頭痛身疼惡寒發熱者必然之證也其於筋惕肉瞤非常常有之者必待發汗過多亡陽則有之矣內經曰陽氣者精則養神柔則養筋發汗過多津液枯少陽氣太虛筋肉失所養故惕惕然而跳瞤瞤然動也明理若不因汗下始病便見筋惕肉瞤者必元氣久虛或失血房勞後及新産感冒致有是證若誤用表藥必無生理緒論若不因汗之過多而其人筋脈惕惕動跳者此人素稟血少邪熱搏於血脈之中火主動惕也曾治一人傷寒不經發汗七八日筋脈動惕潮熱尤甚其肉不瞤大便祕結不行小便赤澀以手按臍傍硬痛此有燥屎也以加味大柴胡湯下之而愈又一人傷寒十餘日曾三次發汗過多遂變肉瞤身振搖筋脈不惕此汗多氣血俱虛也以加味人參養營湯二劑而愈又一人汗後虛煩不得眠筋惕肉瞤內有熱以加味溫膽湯治之而愈大抵在審詳虛實而治之也蘊症循衣摸床循衣摸床撮空多是大虛之候乃精神耗散不能主持也不問傷寒雜病以大劑補之多有生者傷寒論云循衣摸床惕而不安微喘直視脈弦者生澀者死此乃以脈之弦澀辨胃氣之存亡緣脈弦則迢迢而長知其胃氣尚在也故可以大承氣下之而愈然亦危極矣必脈實症實者方可行之西塘感症舌卷囊縮扁鵲曰病舌卷囊縮者死孫真人謂陰陽易病卵縮入腹則舌吐出者死凡囊縮有熱極而縮者亦有冷極而縮者要在詳辨治之凡熱極者有可下冷極者宜急溫之大抵下之宜大承氣湯溫之宜附子四逆加吳茱萸湯也並艾灸關元氣海蔥尉等法救之蘊要傷寒傳至厥陰邪熱內伏陽氣不得外通所以經脈縮急反有似乎陰寒之狀以肝主諸筋故也故凡舌卷囊縮從三陽熱證傳至厥陰而見此證者乃肝氣燔灼木受火困而不得舒緩為熱極危殆之候男子則囊縮婦人則乳頭縮也若始病無熱便厥冷無脈而見此證乃厥陰虛寒內則經脈失養而引急不能舒外則肢體踡曲而下部不溫乃肝氣垂絶之候緒論問曰舌踡囊縮何以是傳經厥陰症答曰肝主周身之筋熱邪內灼則津液枯不能榮養於筋故舌踡而囊縮宜急下之又問曰直中症亦舌踡囊縮何也答曰直中於寒陽氣衰微而斂縮此冬令萬物閉藏之象今內熱消爍此夏令津液乾枯之象且直中症脈必沉遲或見下利清穀口鼻氣冷諸寒症邪傳厥陰必煩滿消渴之極或唇焦口燥身如枯柴形情大不相同且直中症舌雖短縮而潤澤邪傳厥陰則舌斂束如荔枝必然焦燥毫無津液心悟以上二說並本五法加詳彼云熱主舒寒主斂定理也直中陰感陽衰陽衰則不能溫其下故囊縮寒深舌卷者姜附熱深舌卷者連梔剝換由尖及內症可漸平四圍傍腿留中胃敗變至醫級直視直視者視物而目精不轉動者是也若目精轉者非直視也水之精為志火之精為神目者心之使也神所寓焉肝之外候也精神榮焉傷寒目直視者邪氣擁盛冒其正氣使神智不慧藏精之氣不上榮於目則目為之直視傷寒至於直視為邪氣已極證候已逆多難治直視為不治之證目中不了了為可治之候二者形證相近其為工者宜熟視之明理遺溺凡遺尿者小便自出而不知也大抵熱盛神昏遺尿者可治也若陰症下寒逆冷遺尿脈沉微者多難治蘊要唇甲青問曰唇甲青何以是直中寒症答曰指得血而握唇得血而赤今寒中之致血凝滯不能濡潤唇甲則青況色之赤者為熱青者為寒故唇甲青為直中寒症急溫之無疑又曰陽厥亦唇甲青何以別之答曰陽厥熱深也熱極反厥也然唇甲似青實非青色乃紫黑色也唇雖紫口必渴與之以水則能飲啓唇視之咽喉如煤指甲雖紫必尚微溫若直中者唇青而口和甲青而厥逆寒熱之別相隔千里又烏得以熱而為寒乎五法若熱毒流入於裡而為熱厥則唇甲亦青但青中必帶深紫與陰寒之青黑不同試觀産婦以舌青驗子死唇青驗母死則知青黑為陽氣竭絶不得與青紫渾稱也緒論死證溫病下利腹中痛甚者死不治厥逆汗出脈堅強急者生虛緩者死溫病二三日身體熱腹滿頭痛食飲如故脈直而疾者八日死四五日頭痛腹痛而吐脈來細強十二日死八九日頭不疼身不痛目不赤色不變而反利脈來牒牒按之不彈手時大心下堅十七日死熱病七八日脈不軟一作喘不散一作數者當喑喑後三日溫汗不出者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦乾黑者死熱病已得汗常大熱不去者亦死脈經按此諸證有難得其解者然原文與靈樞熱病篇所敘死證錯綜要是屬古說仍姑存之傷寒頭痛脈短澀者死熱病腹𩊅常喘而熱不退者死多汗脈虛小者生𩊅實者死巢源汗出如油口噤肉戰呻吟喘促者死發斑先赤後黯面色黧晦不治發斑大便自利不治發黃而變黑不治張口出氣乾嘔骨骸熱痛者逆咳逆不止者不治頭汗內外關格小便不利此為陽脫不治腹大滿而下泄不治按出靈樞若脈洪緊而滑尤可慮四肢厥逆臍下絞痛石硬眼定者逆總括如發散之時用藥一二劑汗不得來就是踄手之病或大汗不解復反大熱是謂汗後不解之症終必難治至若汗後宜乎脈和脈不和緩而勢力反硬者後必變重又有汗後大熱不靜脈勢短數躁亂不寧舌無津液其人七日當戰戰不過而死又有脈勢虛大大而無力者死又有脈勢散亂者死脈無根蒂者死又有手診脈時抽撤不定者死又有手診脈強硬翻動者死厄逆不止者死氣急痰喘者死下後脈大譫語者死凡此死症不可枚舉繩墨愈候易愈之病取於神則神清取於色則色澤取於聲則音長取於體則身輕取於皮則膚潤取於脈則和洪皆一派不死之證故曰生證也若有如是之生證忽然口噤不語煩躁而甚六脈停伏宜謹察之非變凶也乃邪正交爭生戰汗之候為將愈之兆也凡傷寒渴者多陽證易愈若忽然飲多尋常消散無停知釀汗而作解也傷寒多不能食若忽然能食且脈浮知胃和邪還於表而作解也若不即解者陰陽未得其時也子時得之午時必解陽濟陰生而解也午時得之子時必解陰從陽化而解也金鑑凡疫邪留於氣分解以戰汗留於血分解以發斑氣屬陽而輕清血屬陰而重濁是以邪在氣分則易疏透邪在血分恆多膠滯故陽主速而陰主遲所以從戰汗者可使頓解從發斑者當圖漸愈溫疫論類編云戰汗亦有未能頓解者發斑亦有不待漸愈而便脫然者未可概論傷寒多日忽覺渾身癮疹發越而癢此乃用藥中病陰陽分別榮衛流行病氣自毛竅中出他病亦然小兒驚風發熱將産亦如是總括發癢乃陽氣初回之象非風非血燥也入門久不得寐一旦欲寐別無余病此為陰陽和而愈也要訣有大汗大下之後邪氣已退正氣已復身涼脈微鼾息酣睡此吉兆也明條
