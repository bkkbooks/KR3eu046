body:
  text: 卷十餘證餘熱傷寒病後熱不除候此謂病已間五藏尚虛客邪未散真氣不復故旦暮猶有餘熱如瘧狀此非真實但客熱也巢源夫傷寒後氣血未實藏府尚虛餘毒之氣猶存淹延時日不差肌體羸瘦肢節痠痛壯熱增塞心煩盜汗上氣咳嗽嘔逆痰涎飲食不消腹中癖塊口乾舌澀毛折骨痿面色青黃氣力乏弱此皆由虛損致成夾勞也聖惠夫大病新瘥後血氣虛弱餘熱未盡古人所謂如大水浸牆水退則牆蘇不可犯之但宜安臥守靜以養其氣設或早起動勞則血氣沸騰而發熱也蘊要傷寒汗下後餘熱未除或失於調攝食不為飢咳嗽寒熱吐血衄血纏綿日久狀似癆瘵此皆元氣既虛邪氣著而不散例用黃連解毒湯加柴胡枳桔其效如神不效然後用八物湯兼犀角小柴胡前胡石膏等隨證加減無有不愈者切不可純用補劑亦不可誤認為虛損勞怯輕用杜仲山茱萸破故紙等溫補之藥也傷寒綱目竹葉湯治發汗後表裡虛煩不可攻者但當與此方千金案即竹葉石膏湯虛煩蓋是虛熱非煩躁之煩若傷寒得汗後病解虛羸微熱不去可行竹葉石膏湯活人審知是邪熱未解雖經汗下卻不可畏虛而養病宜竹葉石膏湯要訣竹葉湯治傷寒大病後心虛煩悶內熱不解竹葉麥門冬去心人參茯苓去皮小麥炒半夏湯泡七次各一兩甘草炙半兩上㕮咀每服四錢水一盞半姜五片煎至八分去滓溫服不拘時候濟生案此本千金治產後虛渴少氣力方今去大棗張文仲療傷寒八九日不差名為敗傷寒諸藥不能消者方鱉甲炙蜀升麻前胡烏梅枳實炙犀角屑黃芩各二兩甘草一兩炙生地黃八合上九味切以水七升煮取二升半分五服日三服夜二服出支太忌海藻菘菜莧菜蕪荑備急方同外臺聖惠治壞傷寒經十日已來未解熱在胸膈煩悶不止鱉甲散於本方去前胡加柴胡甘草半兩餘各一兩每服五錢以水一大盞煎至五分去滓入生地黃汁半合更煎一兩沸不計時候分溫二服治傷寒餘熱不退發歇煩躁胸膈氣滯不思飲食宜服柴胡散方柴胡三分川大黃三分枳殼三分鱉甲三分檳榔三分人參三分木香三分子芩三分赤芍藥三分赤茯苓三分犀角屑三分桑根白皮一兩甘草半兩上件藥搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服聖惠治傷寒後夾勞骨節煩疼時有寒熱咳嗽頭目疼痛宜服柴胡散方柴胡一兩貝母一兩知母一兩人參一兩赤芍藥一兩石膏一兩黃芩三分杏仁一兩白朮半兩梔子仁半兩鱉甲一兩上件藥搗篩為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服聖惠治傷寒後夾勞煩熱四肢疼痛不欲飲食宜服犀角散方犀角屑三分赤茯苓三分枳殼三分柴胡一兩半白朮三分鱉甲一兩半知母半兩赤芍藥三分甘草半兩上件藥搗篩為散每服五錢以水一大盞入生薑半分煎至五分不計時候溫服聖惠治熱病後虛勞煩熱四肢疼痛小便赤黃不欲飲食宜服柴胡散方柴胡一兩生乾地黃一兩黃連一兩地骨皮一兩枳殼一分赤茯苓一分知母半兩鱉甲三分甘草半兩上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服聖惠又治時氣餘熱不退發作有時栝樓根散於本方去地黃黃連甘草加栝樓根水煎去滓入生地黃汁半合更煎一兩沸溫服治熱病後虛勞盜汗口苦不得唾臥四肢煩痛舌乾卷澀宜服人參散方人參一兩麥門冬一兩半赤芍藥一兩柴胡一兩白茯苓一兩牡蠣一兩黃耆一兩甘草半兩鱉甲一兩上件藥搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服聖惠治傷寒後煩熱憎寒口苦不思飲食日漸羸瘦羚羊角湯方羚羊角鎊茈胡去苗鱉甲去裙襴醋炙人參各三分知母淡竹茹黃耆赤茯苓去黑皮甘草炙各半兩天門冬去心焙一兩上一十味細銼如麻豆每服五錢匕水一盞半煎至八分去滓食後溫服日二聖濟治傷寒過經潮熱不解或時作寒如瘧狀茈胡鱉甲湯方茈胡去苗鱉甲去裙襴醋炙赤茯苓去黑皮各一兩黃芩去黑心知母焙桑根白皮銼各三分甘草炙半兩上七味粗搗篩每服五錢匕水一盞半生薑半分拍碎煎至七分去滓溫服不拘時聖濟此先君子加胡黃連最效聖惠治傷寒後肺萎勞嗽涕唾稠黏骨節煩悶發歇寒熱鱉甲飲於本方去黃芩加款冬花烏梅肉梔子仁治傷寒後胃熱引飲煩渴不止茯苓地黃湯方赤茯苓去黑皮生乾地黃焙栝樓根各一兩知母焙半兩麥門冬去心各一兩半上五味粗搗篩每服五錢匕水一盞半入小麥一百粒淡竹葉三五片棗三枚擘破同煎至八分去滓溫服不拘時聖濟治傷寒百合病久不差欲成勞宜服柴胡散方柴胡一兩知母二兩黃連一兩甘草三分百合二兩秦艽一兩栝樓根一兩上件藥搗篩為散每服五錢以水一中盞入生薑半分煎至六分去滓不計時候溫服聖惠案此方與次方俱可移治餘熱仍敘於此治傷寒百合病經一月不解變如渴疾宜服百合散方百合一兩栝樓根一兩梔子仁三分牡蠣三分麥門冬三分甘草半兩上件藥搗粗羅為散每服五錢以水一中盞入生薑半分竹葉二七片煎至六分不計時候溫服聖惠乾地黃湯婦人傷寒差後猶有餘熱不去謂之遺熱乾地黃大黃黃連黃芩各一兩柴胡去蘆白芍藥甘草各一兩半炙上搗為細末每服抄四錢匕以水一盞半煎至七分去滓溫服取溏利汗出解總病歸地養營湯壞證身熱口渴舌胎及舌如煨熟豬腰子當歸生地懷慶極大鱉甲醋炙研細麥冬各五錢芍藥青蒿阿膠各三錢五味子一錢五分上煎成烊化阿膠服日二三劑甚者人中黃人中白研細各一錢調服加知母地骨皮苦參亦可虛人加人參黃耆炙甘草患人服藥安臥竟日熱除渴止簡明醫彀片玉云得汗脈靜身熱不退是發汗太過胃中亡津液故也處以生津液益氣血養胃氣之藥或只用補中益氣湯治例若已汗而熱不清身漬漬汗出右寸關雖弦大按之無力心下不痞不飽四肢倦怠屬中弱氣內傷虛熱補中益氣湯主之汗止身涼為愈六要有汗下後陰陽不相入水火不相濟致餘熱未退不可更用冷藥內外俱未可攻宜小建中湯若其人已虛虛能生熱宜小建中湯加當歸一錢或四君子湯加黃耆半錢或十全大補湯調其營衛虛此恐脫甚字者四柱散真武湯病愈後別無他證只微熱未盡除其人脾胃久虛欠調理脾主肌肉故生餘熱燥補不宜用理中湯加蜜一匙許煎有汗下而熱不退多用涼肌藥而又不退動至半月或兼旬者乃是陽氣離經不能復還客於皮肉之間病此甚眾此當調理收斂之不可用辛熱重劑藥要訣遺毒凡傷寒出汗不徹邪熱結耳後一寸二三分或耳下俱硬腫者名曰發頤此為遺熱成毒之所致也宜速消散則可若緩則成膿又為害也蘊要本經云耳前後腫刺之小差即發頤也高腫有膿為吉如平陷無膿者危然亦有大虛之候微腫而痛只用溫補或少佐以清涼腫自消而頤亦不發若必欲治頤則真氣外脫而死矣直解傷寒發頤亦名汗毒此因原受風塞用藥發散未盡日久傳化為熱不散以致項之前後結腫疼痛初起身熱口渴者用柴胡葛根湯清熱解毒患上紅色熱甚者如意金黃散敷之初起身涼不渴者牛蒡甘桔湯散之患上微熱不紅疼痛者沖和膏和之腫深不退欲作膿者托裡消毒散已潰氣血虛弱食少者補中益氣湯以此治之未成者消已成者潰已潰者斂亦為平常王道之法也用之最穩外科正宗柴胡葛根湯治頤毒表散未盡身熱不解紅腫堅硬作痛者柴胡天花粉乾葛黃芩桔梗連翹牛蒡子石膏各一錢甘草五分升麻三分水二鍾煎八分不拘時服正宗牛蒡甘桔湯治頤毒表邪已盡耳項結腫微熱不紅疼痛者牛蒡子桔梗陳皮天花粉黃連川芎赤芍甘草蘇木各一錢水二鍾煎八分食後服正宗托裡消毒散人參川芎白芍黃耆當歸白朮茯苓金銀花各一錢白芷甘草皂角針桔梗各五分水二鍾煎八分食遠服正宗案此本外科樞要方今去連翹加皂角針桔梗虛煩不眠驚悸此虛煩與梔豉正證自異傷寒發汗吐下已後府藏俱虛而熱氣不散故虛煩也巢源夫衛氣晝行於陽夜行於陰陰主夜夜主臥謂陽氣盡陰氣盛則目瞑矣今熱氣未散與諸陽並所以陽獨盛陰偏虛雖復病後仍不得眠者陰氣未復於本故也同上差後虛煩不得眠眼中㾓疼懊憹案眼蓋胸訛黃連四兩芍藥二兩黃芩一兩膠三小挺水六升煮取三升分三服亦可內雞子黃二枚肘後案此即黃連阿膠湯梔子烏梅湯治傷寒後虛煩不得眠心中懊憹活人方見少陽病中案以上二方猶是梔豉之例以系病後錄入於茲虛煩一證乃是病愈後陰陽未復時發煩熱竹葉石膏湯痰多睡不寧者溫膽湯嘔者橘皮湯此本於千金有病瘥後自不得眠宜溫膽湯或眠而精魂散亂異夢驚悸者溫膽湯尤宜要訣溫膽湯治大病後虛煩不得眠此膽寒故也宜服此方張氏衍義云寒則痰陰之通稱案巢源虛勞門云若心煩不得眠者心熱也若但虛煩而不得眠者膽冷也半夏竹茹枳實各二兩橘皮三兩生薑四兩甘草一兩上以水八升煮取二升分三服千金三因溫膽湯於本方加茯苓一兩半棗一枚蘊要加味溫膽湯於本方加人參黃連柴胡當歸川芎白芍藥生地黃酸棗仁又加味溫膽湯於本方加人參酸棗人茯神若心煩內熱者倍加黃連麥門冬若有熱未清加柴胡若內實心神顛倒者加山梔子壽世保元竹茹溫膽湯治傷寒日數過多其熱不退夢寐不寧心驚恍惚煩躁多痰於本方加茯苓香附人參柴胡麥門冬桔梗黃連案竹茹溫膽湯本出袖珍引秘方名加味溫膽湯不用黃連酸棗湯治虛煩勞擾奔氣在胸中不得眠方酸棗仁五升人參桂心生薑各二兩石膏四兩茯苓知母各三兩甘草一兩半上以水一斗先煮酸棗仁取七升去滓下藥煮取三升分三服日三金千案此於仲景方去芎藭加人參桂心生薑石膏深師酸棗湯療傷寒及吐下後心煩乏氣晝夜不眠方酸棗人四升麥門冬一升去心甘草二兩炙蝭母二兩知母也茯苓二兩芎藭二兩乾薑三兩上七味切以水一斗六升煮酸棗取一斗去棗內藥煮取三升去滓溫分三服忌海藻菘菜大醋外臺案此於仲景方加麥門冬乾薑治傷寒後體虛心煩不得眠臥四肢少力宜服熟乾地黃散方熟乾地黃一兩半白芍藥一兩羚羊角屑一兩茯神一兩黃耆一兩麥門冬一兩酸棗人一兩人參一兩上件藥搗篩為散每服四錢以水一中盞煎至六分去滓入雞子清一枚攪令勻溫服聖惠傷寒壞病久不愈常不得眠或心脾氣血素虧而驚悸不寧不得眠諸藥不效者大劑獨參湯或歸脾湯並用送下養正丹緒論歸脾湯白朮茯神去木黃耆去蘆龍眼肉酸棗仁炒去殼各一兩人參木香不見火各半兩甘草灸二錢半上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候濟生薛氏醫案加當歸遠志人病傷寒陽證或患熱疾服涼藥而得愈飲食未充夜間便睡不著是膽冷也若脈細身涼隨其虛實下金液丹一服大冷者下百粒及五六十粒不甚冷者三二十粒即睡著當以脈證為準也脈細微大便不甚實小便清面色青白舌下不紅面帶青色皆冷證也醫說一本引醫余大抵傷寒汗吐下之後虛極之人或因事驚恐遂生驚惕者宜養血安神鎮心之劑主之也蘊要硃砂安神丸治病後心神不安夜臥不寧或亂夢不得眠硃砂另研水飛二錢一半為衣黃連炒一錢半甘草炙半錢當歸身酒浸一錢生地黃酒洗焙乾一錢半上為細末湯浸蒸餅糊為丸如綠豆大硃砂為衣陰乾每服三十丸以口中津液嚥下或燈心湯下蘊要此本東垣方一方去當歸地黃病後血氣未復精神未全多於夢寐中不覺失聲如魘此不繫讝語鄭聲宜溫膽湯去竹茹加人參半錢或用六君子湯要訣虛汗夫傷寒差後體氣羸弱藏府猶虛或每因睡中遍身汗出此皆陽氣虛心氣弱陽屬於表主於膚腠開泄故津液妄行心主血心生汗今心虛不足故多盜汗診其脈虛弱微細者是其候也聖惠大病愈後數日每飲食及驚動即汗此表裡虛怯宜人參養營湯倍黃耆脈靜身涼數日後反得盜汗及自汗者此屬表虛溫疫論治傷寒脈微細汗出不止漸覺虛羸宜服白茯令散方白茯苓一兩人參一兩白朮三分白芍藥三分麻黃根一兩五味子半兩牡蠣一兩肉蓯蓉一兩酒浸一宿刮去皴皮炙乾上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服聖惠案又治虛勞盜汗黃耆散於本方去芍藥麻黃根蓯蓉加黃耆麥門冬甘草熟乾地黃治傷寒虛汗不止心多煩躁時時驚悸宜服人參散方人參半兩遠志半兩白茯苓半兩麥門冬半兩黃耆半兩柴胡半兩甘草一分龍骨一兩上件藥搗篩為散每服五錢以水一大盞入生薑半分棗三枚竹茹一分煎至五分去滓不計時候溫服聖惠治傷寒後虛羸日夜汗出不止心躁口乾咽喉不利宜服此方黃雌雞一隻去腸胃理如食法肉蓯蓉一兩酒浸一宿刮去皴皮切麻黃根二兩牡蠣二兩上件藥先將雞麻黃根以水七大盞煮取汁三大盞去雞麻黃根後卻下蓯蓉牡蠣煎取一盞半去滓分為三服空心午前夜後臨臥時服聖惠陽證身微熱表虛汗出不已或因醫者發汗以致表虛脈不實治用王海藏黃耆湯黃耆人參白茯苓白朮白芍藥各一兩甘草七錢半陳皮五錢上銼每服酌量多少用水二盞生薑三片煎八分溫服寶鑑補遺案此方出元戎無陳皮治中暍陰證身涼額上手背有冷汗治用四逆湯加人參同上方脈正宗治陽虛自汗用牡蠣火煅五錢人參三錢麥門冬五錢北五味二錢煎湯飲立止外再用牡蠣火煅數兩搗細粉布包撲身上亦可收汗匯言大病差後多虛汗及眠中流汗方原作眼中流汁今據醫心方引葛氏方改龍骨牡蠣麻黃根末雜粉以粉身良肘後錄驗方治大病之後虛汗不可止方乾薑三分治合以粉大良醫心撲粉方互見太陽病當歸六黃湯治傷寒新瘥後虛熱盜汗不止當歸身酒洗一錢五分黃柏炒七分黃芩炒七分黃連炒五分黃耆鹽水炙二錢生地黃酒洗七分熟地黃酒蒸一錢上作一服水二鍾煎至八分食遠濕服蘊要此本出蘭室秘藏云盜汗之聖藥虛弱當與兼變中誤治虛乏參其人血氣先虛復為虛邪所中發汗吐下之後經絡損傷陰陽竭絕熱邪始散真氣尚少五藏猶虛穀神未復無津液以榮養故虛羸而生病焉巢源傷寒瘥後虛弱無力者先因汗下過多病久元氣虛弱調養失宜須漸漸進食守靜不可太急治傷寒雖無補法若果病久元氣虛憊或勞力所傷不得不補此合宜則用也宜補中益氣湯蘊要案今本脫此條據撮要及全生集錄補大病後不足虛勞方萬病虛勞同用取七歲已下五歲已上黃牛新生者乳一升以水四升煎取一升如人體溫稍稍飲之不得過多十日服不絕為佳千金十全大補湯病後氣不如舊此藥性溫不熱平補有效白茯苓焙白朮焙人參去蘆熟乾地黃洗酒蒸焙白芍藥粉草炙黃耆去蘆肉桂去粗皮不見火川當歸去蘆洗川芎各等分上十味銼為粗散每服二大錢水一盞生薑三片棗子二個同煎至七分不拘時候溫服和劑四君子湯治大人小兒脾胃不和中脘停飲大病之後宜服人參茯苓白朮各四兩甘草半兩上㕮咀每服四錢水一盞姜七片棗一個煎至六分去滓不以時候服一方加橘紅等分名異功散尤宜病後調理一方去甘草加木香熟附子等分名加味四柱散薑棗煎服大病之調理尤宜用此易簡異功散本出小兒方訣得效六君子湯於本方加半夏陳皮小青囊六君子湯於本方加黃耆山藥治傷寒汗下之後將見平復服此調理俾進食案此係本事七珍散去粟米治傷寒後虛羸少氣嘔吐不納飲食宜服陳橘皮散方陳橘皮一兩五味子一兩麥門冬一兩半人參一兩半夏一兩白朮半兩甘草半兩白茯苓三分黃耆三分上搗粗羅為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服聖惠治傷寒後服冷藥過多胃寒嘔噦不下飲食人參湯方人參白朮白茯苓去黑皮附子炮裂去皮臍陳橘皮湯浸去白炒各一兩桂去粗皮乾薑炮各半兩丁香一分上八味粗搗篩每服五錢匕水一盞半生薑半分拍碎粳米半匙煎至一盞去滓溫服不拘時聖濟溫脾丸治久病虛羸脾氣弱食不消善噫方黃檗大麥蘗吳茱萸桂心乾薑細辛附子當歸大黃麴黃連各一兩上十一味為末蜜丸如梧子每服十五丸空腹酒服日三千金三因麴用神麴加味枳朮丸治病後胃弱食少服此進飲食強胃氣之藥也枳實一兩炒白朮一兩神麴一兩炒大麥蘗炒一兩陳皮一兩棠求子一兩上為末荷葉燒飯和丸如梧桐子大每服七八十丸白湯下如有熱加姜炒黃連七錢如氣鬱不舒蜴加香附一兩如痰多加半夏麴一兩蘊要案枳朮丸出於張潔古治傷寒後腎氣虛損夜夢失精口乾心煩兩頰黑色皮膚乾燥宜服此方龍骨一兩白芍藥三分人參三分熟乾地黃三分白茯苓三分桂心半兩甘草半兩鹿茸半兩塗酥微炙去毛磁石一兩半搗碎水淘去赤汁上件藥搗粗羅為散每服四錢以水一中盞入棗三枚煎至六分去滓食前溫服之聖惠水腫病後水腫身虛胃弱食少者以五苓散加蒼朮陳皮木香砂仁之類主之若人不甚弱者以商陸一味煮粥食之亦佳凡病瘥後足腫者不妨但節飲食胃氣強自消也蘊要嚴正甫正年三十時疫後脈證俱平飲食漸進忽然肢體浮腫別無所苦此即氣復也蓋大病後血未成氣暴復血乃氣之依歸氣無所依故為浮腫嗣後飲食漸加浮腫漸消若誤投行氣利水藥則謬矣溫疫論若大病後三焦受傷不能通調水道下輸膀胱肢體浮腫此水氣也與氣復懸絕宜金匱腎氣丸及腎氣煎若誤用行氣利水藥必劇凡水氣足冷肢體常重氣復足不冷肢體常輕為異同上治傷寒後身體浮腫喘息促小便不利坐臥不安防己湯方防己三分豬苓三分海蛤一兩陳橘皮一兩木香半兩白朮半兩桑根白皮三分赤茯苓三分檳榔一兩紫蘇莖葉一兩木通一兩半上一十一味粗搗篩每服三錢匕水一盞入生薑半分切煎至六分去滓不計時候溫服聖濟差後面腫或腰以下腫治用索矩三和湯案索矩正傳作吉矩橘皮厚朴檳榔白朮各三兩甘草炙紫蘇各二兩去渣梗木通海金砂各一兩上銼每服五錢水一盞生薑三片煎至八分溫服如鼻上有汗出必氣血和而愈寶鑑補遺勞復食復女勞復自復傷寒勞復何以明之勞為勞動之勞復為再發也是傷寒差後因勞動再發者是也傷寒新差後血氣未平餘熱未盡勞動其熱熱氣還經絡遂復發也此有二種一者因勞動外傷二者因飲食內傷其勞動外傷者非止強力搖體持重遠行之勞至於梳頭洗面則動氣憂悲思慮則勞神皆能復也況其過用者乎其飲食內傷者為多食則遺食肉則復者也內經曰熱病已愈而時有遺者何也以熱甚而強食之病已衰而熱有所藏因其穀氣留薄兩陽相合故有所遺經曰病已差尚微煩設不了了者以新虛不勝穀氣故令微煩損谷則愈夫傷寒邪氣之傳自表至里有次第焉發汗吐下自輕至重有等差焉又其勞復則不然見其邪氣之復來也必迎奪之不待其傳也經曰大病差後勞復者枳實梔子豉湯主之若有宿食加大黃且枳實梔子豉湯則吐之豈待虛煩懊憹之證加大黃則下之豈待腹滿讝語之候經曰傷寒差後更發熱者小柴胡湯主之脈浮以汗解之脈沉實者以下解之亦是便要折其邪也蓋傷寒之邪自外入也勞復之邪自內發也發汗吐下隨宜施用焉嗚呼勞復也食復也諸勞皆可及御內則死矣若男女相易則為陰陽易其不易自病者謂之女勞復以其內損真氣外動邪熱真虛邪盛則不可治矣昔督郵顧子獻不以華敷之診為信臨死致有出舌數寸之驗由此觀之豈不與後人為鑑誡哉明理右總說案此有所本詳見於後傷寒病新瘥津液未復血氣尚虛若勞復早更復成病故云復也若言語思慮則勞神梳頭澡洗則勞力勞則生熱熱氣乘虛還入經絡故復病也其脈緊者宜下之巢源案又曰傷寒病後多因勞動不節飲食過度更發於病名之為復復者謂復病如初也又小兒時氣病發復候曰發覆多重於初病者血氣已虛重傷故也許仁則曰此病復發不但起動勞役或因飲食稍多或因言語過分或緣視聽不節或為動靜不常皆成此復若復甚者乃至不救劇於初得病時不可以復發而云輕易外臺新差強人足兩月虛弱人足百日則無復病矣總病疫邪已退脈證俱平但元氣未復或因梳洗沐浴或因多言妄動甚至車騎勞頓遂至發熱前證復起惟脈不沉實為辨此為勞復蓋氣為火之舟楫今則真氣方長勞而復折真氣既虧火亦不前如人慾濟舟楫已壞其可渡乎是火也陷於經絡則為表熱陷乎藏府則為裡熱虛甚熱甚虛微熱微治法輕則靜養可復重則大補氣血候真氣一回血脈融和表裡通暢所陷之火隨氣輸泄自然熱退而前證自除矣若誤用承氣及寒涼剝削之劑變證蜂起遂至殞命溫疫論案此蓋勞復中之一證蓋勞則生熱熱氣乘虛還入經絡未免再復治宜清熱解勞小柴胡湯麥門冬湯和之熱氣浮者梔豉枳實湯表證多者柴胡桂枝湯汗之里症多者大柴胡湯下之勞復症久不愈恐成癆瘵入門麥門冬湯治勞復氣欲絕起死人方麥門冬一兩甘草二兩京棗二十枚竹葉切一升上四味㕮咀以水七升煮粳米一升令熟去米內諸藥煎取三升分三服不能服者綿滴湯內口中用之有效千金案玉函勞復發熱者麥門冬湯主之方與金匱同而先君子以為仲景舊文補中益氣湯治勞復發熱氣高而喘身熱而煩四肢怠惰蘊要大病後不宜勞動若勞倦傷氣無力與精神者名曰勞復補中益氣湯主之心悟瘥後有勞復者勞則生熱小柴胡加五味麥冬和之士林餘業圖經曰治傷寒勞復身熱大小便赤如血者胡黃連一兩山梔子二兩去皮入蜜半兩拌和炒令微焦二味搗羅為末用豬腸汁和丸如梧桐子大每服用生薑二片烏梅二個童子小便三合浸半日去滓食後暖小便令溫下十丸臨臥再服甚效證類元戎引孫尚藥豬腸汁作豬膽汁宜從治傷寒差後勞復壯熱頭痛六神湯鱉甲茈胡人參知母黃連各一兩烏梅肉半兩上六味粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至八分去滓食後溫服聖濟以上勞復凡得溫毒病新瘥脾胃尚虛穀氣未復若食犬豬羊肉並腸血及肥魚炙脂膩食此必下利下利則不可復救案此蓋本於肘後又禁食餅餌炙膾棗慄諸生果難消物則不能消化停積在於腸胃便脹滿結實大小便不通因更發熱覆成病也非但雜食梳頭洗浴諸勞事皆須慎之巢源案傷寒食復候論證殊略今錄雜載中傷寒新瘥胃氣尚弱若恣飲食不能克化濁穢藏府依前發熱若用調和脾胃藥胃熱轉增大凡傷寒無和胃之理治須清熱消食輕者胸中微滿謂之遺熱損谷自愈重者胸高喘滿腹脹必須吐下梔豉枳黃湯主之當是枳梔湯加大黃煩熱甚者竹葉石膏湯胸痞者生薑瀉心湯飲酒復者其熱尤甚蓋酒性至熱必煩躁乾嘔舌胎妄語不寐者解毒湯入門飲酒復出外臺既抄於前傷寒才愈脾胃尚虛雖消中固宜節食若恣食而再熱者名曰食復宜六君子湯一小劑或加神麴麥芽予嘗見食復多死者蓋以久敝之脾胃不能化驟進之食物也程氏醫彀若因飲食所傷者或吞酸作噯或心腹滿悶而加熱者此名食復輕則損谷自愈重則消導方愈溫疫論車口何姓者在濟患傷寒後食肉復醫與利藥下之下後身熱耳聾口乾不渴喜漱水不欲咽是熱在經予視之曰此誤下亡陰猶有表證與小柴胡去半夏加天花粉山梔麥冬五味歸芍生地一服減半四劑良愈類案以上食復夫傷寒病新瘥未滿百日氣力未平復而以房室者略無不死也有得此病愈後六十日其人已能行射獵因而房室即吐涎而死病雖云瘥若未平復不可交接必小腹急痛手足拘拳二時之間亡範汪方云故督郵顧子獻得病已瘥未健詣華敷視脈敷曰雖瘥尚虛未平復陽氣不足勿為勞事也能勞尚可女勞即死臨死當吐舌數寸獻婦聞其瘥從百餘里來省之住數宿止交接之間三日死婦人傷寒雖瘥未滿百日氣血骨髓未牢實而合陰陽快者當時乃未即覺惡經日則令百節解離經絡緩弱氣血虛骨髓空竭便恍恍吸吸氣力不足著床不能動搖起居仰人食如故是其證也丈夫亦然其新瘥虛熱未除而快意交接者皆即死巢源男子房勞復發熱口噤臨死舌出數寸又始得病百節痛如被打渾身沉重恍惚失措脈促而絕不可治或有吐涎不止或有讝妄煩亂者皆不可治總病仲景止言陰陽易而千金復增女勞復證昔賢相傳陰陽易猶可生若女勞復必死者何也愚以復病由病後正氣大虛餘邪不能傳易於人因而自病則多死以其人不堪再病故也易病由病人正氣稍復不病之人正氣久虛餘邪遂至傳易因而忽病然猶可生以其人病尚初發也辨注逍遙湯治有患傷寒瘥後血氣未平勞動助熱復還於經絡因與婦人交接搖欲而復發不易有病者謂之勞復人參知母黃連甘草滑石生地黃韭根柴胡犀角竹青如卵縮腹痛倍加水二鍾棗二枚姜三片煎之六書若犯內事陰虧者宜六味生乾地黃湯氣少者倍加人參湯主之金鑑案以上諸復治法當通用之嘗治傷寒病未平復犯房室命在須臾用獨參湯調燒裩散凡服參一二斤余得愈者三四人信哉用藥不可執一也準繩案原文引張兼善論用燒裩散之理文繁不錄又案此證蓋是脫陽當考少陰病四逆變方以上女勞復若無故自復者以伏邪未盡此名自復當問前得某證所發亦某證稍與前藥以徹其餘邪自然獲愈溫疫論右自復
