body:
  text: 卷八兼變諸證中結胸胸滿病人以傷寒為大患傷寒以結胸為惡證又結胸有陰陽陽結者陽盛下之太早陰結者陰盛下之太早拘結胸何以辨明陽結則實痛陰結則暄痞其病傷寒之叉手偃仰滿硬攻心起而兩目上視才坐兩足前移醫者見此證便投陷胸丸若陽結則痊陰結則殺之萬安方引究原方案此論不純且文有論脫然其理稍通姑録存之考成無己曰傷寒錯惡結胸為甚張兼善曰下早結胸事之常熱實結胸事之變其熱實傳裡為桔胸乃法之關防不盡者選録凡結胸有兼發黃有兼發斑或發狂或厄逆者最重但脈微細沉手足冷者皆難治也若脈沉緊沉滑沉實或數大有力者乃可攻之也蘊要案醫綱孫兆治傷寒胸腹滿面黃如金色下小陷胸湯尋利良愈大抵結胸之脈要沉緊滑實者乃可下之沉微細小者決難救矣若結胸喘急直視者結胸昏憒厥逆者結胸狂亂厄忒者結胸二三下不退者此皆死候也明條陷胸湯治胸中心下結積飲食不消方括蔞實大黃黃連各二兩甘草一兩上四味㕮咀以水五升煮取二升五合分三服千金翼方加甘遂元戎小陷胸湯於本方去甘草水二盞先煮括蔞實至一盞半下諸藥煎至八分溫服未利再服下黃涎案此方本出千金堅症積聚中今治結胸證在大小陷胸之間者甚效因録於此治傷寒十餘日熱氣結於胸中往來寒熱頭痛宜服大黃散方川大黃一兩柴胡一兩枳實三分川朴消一兩赤芍藥一兩黃芩一兩虎掌三分微炒上件藥搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服聖惠案此仍大柴胡湯加芒消今用以彼而可治傷寒十餘日熱氣結於胸中往來寒熱不定宜服柴胡散方柴胡三分枳實三分赤芍藥三分甘草半兩半夏三分黃芩三分桔梗一兩上件藥搗粗羅為散每服五錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服聖惠若傷飲不解散成結胸之證臨時擇用大小陷胸湯丸纍下之脈浮者不可下是表證未出小柴胡合小陷胸湯投之心要若按心胸雖滿悶不痛尚為在表未入乎腑乃邪氣填於胸中只消小柴胡加枳桔以治其悶如未效本方對小陷胸一服如神六書當參少陽病小柴胡加減法傷寒下之太早結胸黃連解毒湯加枳殼傷寒結胸虛痞涼膈散加枳殼桔梗標本治傷寒痞氣胸滿欲死枳殼湯桔梗枳殼炙去穰各一兩上銼如米豆大用水一升半煎減半去滓分二服傷寒下早則氣上膨胸世俗即謂之結胸多更用巴豆粉霜膩粉下之十有七八死此蓋瀉其下焦下焦虛則氣愈上攻胸膈多致不救凡胸脹病只可瀉膈若按之堅硬而痛此是結胸如胸有水須用大黃甘遂輩下之陷胸丸之類是也若按之不甚硬亦館本有甚字痛此名痞氣上館本正虛氣熱鼓脹只可用黃芩黃連大黃之類化之嘗有人患胸滿已危困作結胸痞氣治皆不瘥文館本史大夫以此湯飲之下黃水一升許遂瘥豫得此法用之如神若是痞氣莫不應手而消凡傷寒胸脹勿問結胸痞氣但先投此藥若不瘥然後別下藥緣此湯但行氣下膈耳無他損蘇沈孫用和云胸滿則諸瀉心湯審證用總括以上陽證大陷胸湯方桂枝四兩甘遂四兩大棗十二枚括蔞實一枚去皮人參四兩上五味以水七升煮取三升去滓溫服一升胸中無堅勿服之玉函雀氏其年時行四五日大下後或不下皆患心下結滿兩脅瘩塞胸中氣急厥逆欲絶心胸高起手不得近不過二三日輒便死歿諸醫用瀉心湯余用大小陷胸湯並不得療重思此是下後虛逆而氣已不理而毒復上攻毒氣相搏結於胸中縱不下者毒已入胃胃中不通毒還衝上復搏於氣氣毒相激故致此病療之當先理其氣次下諸疾思與增損理中丸方人參二兩白朮二兩甘草二兩炙乾薑六分炮栝樓根二兩枳實四枚茯苓二兩牡蠣二兩熬上八味末之以蜜和為丸服如彈子一丸熟水下不歇復服余時用此效的神速下喉即折續復與之不過服五六丸胸中豁然矣用藥之速未嘗見此然渴者當加栝樓不渴除之下者當加牡蠣不下勿用余因以告領軍韓康伯右衛毛仲祖光祿王道豫靈臺郎顧君苗著作商仲堪諸人並悉用之咸嘆其應速於時枳實乃為之貴案此下蘇沈所引文頗異今録下方難者曰傷寒熱病理中溫藥今不解之以冷而救之以溫其可論乎余應之曰夫今診時行始於項強勑色次於失眠發熱中於煩躁思之終於生瘡下痢大齊於此耳忌海藻菘菜酢物桃李雀肉等深師方同外臺緣此病由毒攻於內多類少陰泄利之後理應痞結雖已泄利毒尚未除毒與氣爭凝結於胸時或不利而毒已入胃胃中不通毒必土沖或氣先不理或上焦痰實共相沖結覆成此患大抵毒之與氣相干不宣關津壅遏途徑不通故瀉心療滿而不療氣雖復服之其瘥莫由療氣理結館本云療毒氣結莫過理中丸解毒通氣痞自消釋然乾薑性熱故減其分茯苓通津括蔞除渴牡蠣止利謹審其宜無不得矣家人黃珍者得病如上其弟扶就叔尚書乞藥餘日可與理中丸坐中數客皆疑不可豫自決與於箱中取一彈丸與之竺法太調豫曰案調調戲也此人不活君微有緣矣與時合瞑許此至三籌案此疑比訛扶又來便叩頭自搏四座愕然謂其更劇叔問何如扶答向藥一服便覺大佳更復乞耳子謂竺向答曰上人不憂作緣但恐夜更來乞失人眠耳果爾如何余復與數彈丸明日便愈叔遂至今用之護軍司法館本作馬劉元寶妾病亦如此叔復與之一服如雞子一枚便瘥叔知故文武遂多蒙救濟傷寒難療故詳記焉此行功自敘也余以此丸與枳殼湯兼服理無不驗理中丸所用枳實只是枳殼古人只謂之枳實後人方別出枳殼一條蘇沈肘後去甘草云若嗽加括蔞二兩吐加牡蠣二兩活人去括蔞根牡蠣名枳實理中丸活人書括去茯苓加黃芩元戎引王朝奉同要訣寒實結胸雖痛而無煩躁等證此因下後虛逆寒氣獨結宜理中湯加枳實半錢茯苓一錢或枳實理中丸蘊要若脈沉寒甚者須加附子炮熟二錢或三錢斟量用之案本方所立蓋本於金匱胸痹人參湯之意罨傷寒結胸法凡病傷寒結胸其有中氣虛弱不堪攻擊內消者須以此法外罨之則滯行邪散其效如神蔥白頭生薑生蘿蔔此味加倍如無以子代之上用蔥薑各數兩蘿蔔倍之共搗一處炒熱用手巾或白布包作大餅罨胸前脹痛處此藥須分二包冷則輪換罨之無不即時開通汗出而愈但不宜太熱恐炮烙難受也景嶽以上陰證藏結盧子繇言藏結舌上胎白滑滑者純陰之極不可攻也蓋舌乃心之苗紅赤是正氣胎白而滑如物入水中色剝而白也按藏結一證昔人以仲景言舌上白胎滑者難治又謂不可攻復云此名藏結死遂至置而不講殊不知仲景所謂舌白胎滑者以其仍有熱邪內結所以生胎若無邪結則胎不生矣只因裡氣素虛不能蒸熱故見陽證發見舌胎亦不得乾燥以其本虛邪結故為難治非真不治也謂不可攻者以其飲食如故知邪不在胃也時時自利其腸中亦無留結也邪既不結於腸胃攻之無益徒伐元氣耳至於素有痞積又加邪結新舊兩邪相搏不解故死雖然未可概為死證而委之不救也喻嘉言曾舉黃連湯余嘗用連理湯治之亦有能食自利腹脹急者用備急丸有腹痛引脅下不可按者用附子瀉心湯有素有痞積痛引陰筋者用四逆湯加萸桂等往往獲效貴在臨證活法耳緒論此説未確姑存之石室祕録藏結小腹與臍傍牽痛以至前陰治方用人參白朮甘草附子當歸肉桂煎服名散結救藏湯發斑沉氏曰仲景傷寒論無發斑明文而傷寒發斑症極多歷代言及斑症者皆據金匱陽毒云云夫熱病在表或未發汗或五字從傷寒候補已發未解或吐下後而熱毒氣不散煩躁謬言語此為表虛里實熱氣躁於外故身體發斑如錦文凡發斑不可用發表藥令瘡開泄更增斑爛表虛故也巢源發斑者下之太早熱氣乘虛故也下之太遲熱留胃中亦發斑服熱藥過多亦發斑微者赤斑出五死一生劇者黑斑出十死一生活人注此説趙嗣真引王仲弓仲弓即王實也趙言出準繩又千金華他云若熱毒在外未入於胃而先下之者其熱乘虛入胃即爛胃也云云其熱微者赤斑出此候五死一生劇者黑斑出者此候十死一生即此説所本傷寒發斑有三一曰下之太早二曰下之太遲三曰已是熱症投熱藥三者皆能令人發斑故下之太早熱氣乘虛入胃薰灼藏府熱無所出乃見於皮膚而為斑爛矣下之太遲者熱留胃中伏熱不得伸越內則腐爛胃腑外則發而為斑矣病是熱症誤投熱藥者是以熱濟熱如抱薪救火致熱延燎故發而為斑矣失下者通之熱在內者清之散之然今之發斑皆曰斑者非斑也乃疹也疹之越亦若斑之狀小者如粒大者似指皆有頭而不平者是也若斑之起或如人面如手掌如雲片之狀皆平而無頭者是也故疹則熱淺易治斑則熱深而難治也五法病證屬陽誤投溫藥或當汗不汗或當下不下或汗下未解陽熱內然蒸溽外迫熱毒入胃皆致發斑蓋熱必傷血血熱不散裡實表虛由是熱氣乘虛出於皮膚輕則如疹子重則如錦紋是爾斑家謹勿發汗汗之重令閧泄瘡爛又加多也凡斑略見一二須早圖之日子稍延獨陽絶陰不可救藥其發黑斑者熱劇胃爛無及矣然而斑之方萌與蚊迹類焉又不可誤用藥也發斑多見於胸腹蚊迹多在手足之間關前陽脈洪大病人昏憒先紅後赤者斑也陽脈不洪病人自靜先紅後黃者蚊也發斑屬陽陽毒具而陰脈形或大便自利或怫鬱氣短而燥糞久不得通六書此下云又如果實靨者盧扁復生莫施其巧發斑通用升麻葛根湯敗毒散犀角地黃湯熱多者玄參升麻湯加生薑烏梅有下證者少與調胃承氣湯孫兆用紫雪一劑活人云或與紫雪大妙可下者與調胃承氣湯案一劑二字蓋訛證治論用白虎加人參湯發斑湯劑須以紫草川芎為佐血熱內結者與小柴胡湯發斑小點稀疏色常鮮紅者易治或如錦紋隱起餅搭者難治若初發色紅漸次微黯良久黯又轉甚面色肌肉黧晦者斷不可救初發便如黑志者亦然赤斑五死一生黑斑十死凡內外熱熾汗下不解煩悶咳嘔足冷耳聾便是發斑之證總括傷寒發斑先用紙然燈照看病人面部胸堂四肢背心有紅點起者乃發斑也大抵鮮紅起發者吉雖大亦不妨但忌稠密成片紫赤者難治雜黑者尤為難也有來勢急者發熱一二日便出斑來勢援者發熱三四日而出也凡斑既出頗得脈洪數有力身溫足緩者易治若脈沉小足冷元氣弱者多難治凡斑欲出未出之際且與四味升麻湯先透其毒若脈弱者倍加人參食少大便不實者倍加白朮生之若斑已出則不宜再升發也又不可發汗汗之更增斑爛又不宜早下之則斑毒內陷也如脈洪數熱盛煩渴者以人參化斑湯主之若消斑毒或以犀角玄參湯大青四物湯之類如熱毒內甚心煩不得眠錯語呻吟者以黃連解毒湯加升麻玄參大青犀角之類主之熱甚煩渴喘咳者解毒合化斑湯主之若斑勢稍退內實不大便讝語有潮熱者大柴胡湯加芒消或調胃承氣湯下之曾治一人傷寒發斑四肢強硬昏沉讝語不知人大便四五日不通以調胃承氣湯一下而愈如未可下有潮熱煩渴者且與小柴胡湯去半夏加黃連山梔黃檗括蔞根主之或加大青亦佳如無以大藍葉代之或真青黛代之亦可大抵解胃熱胃爛之毒必以黃連大青犀角玄參升麻青黛石膏知母黃芩山梔黃檗之類要在審察病情合宜而用之矣凡斑已出未出之時切不可便投寒涼之藥以攻其熱並飲涼水等物恐傷胃氣作嘔吐也凡治斑不可專以斑治必察脈之浮沉病之虛實而治之則為善治斑也蘊要案原分傷寒時氣溫毒陽毒內傷寒陰證六證頗屬冗雜今撮其要並加錯易但陰證録出於後發斑證輕則如疹子重則如錦紋其致此之由雖分數種然總由寒毒不解而然如當汗不汗則表邪不解當下不下則里邪不解當清不清則火盛不解瘟疫論類編此下云有疫毒鍾厚而蓄毒不解者當補不補則無力不解或下之太早則邪陷不解或以陽證誤用溫補則陽亢不解或以陰證誤用寒涼則陰凝不解凡邪毒不解則直入陰分鬱而成熱乃致液涸血枯斑見肌表此實毒邪固結營衛俱劇之證也但斑有微甚勢有重輕輕者細如蛔迹或先紅而後黃重者成粒成片或先紅而後赤輕者只在四肢重者乃見胸腹輕者色淡而隱重者色紫而顯若見黑斑或大便自利或短氣或二便不通則十死九矣凡病傷寒而汗下溫清俱不能解及足冷耳聾煩悶咳嘔者便是發斑之候景嶽邪留血分裡氣壅閉則伏邪不得外透而為斑若下之內壅一通則衛氣亦從而疏暢或出表為斑則毒邪亦從而外解矣若下後斑漸出不可更大下設有下證少與承氣緩緩下之若復大下中氣不振斑毒內陷則危宜托裡舉斑湯溫疫論凡癍疹初見須用紙捻照看胸背兩脅點大而在皮膚之上者為斑或云頭隱隱或瑣碎小粒者為疹又宜見而不宜多見按方書謂斑色紅者屬胃熱紫者熱極黑者胃爛然亦必看外症所合方可斷之春夏之間濕病俱發癍疹甚如淡紅色四肢清口不甚渴脈不洪數此非虛斑即陰斑或胸微見數點面赤足冷或下利清穀此陰盛格陽於上當溫之若斑色紫而點小者心胞熱也點大而紫胃中熱也斑黑而光亮者熱毒極熾雖屬不治然其人氣血充者依法治之或有可救若黑而晦者必死黑而隱隱四旁赤色者乃火鬱內伏大用清涼透發間有轉紅而可救者又有夾斑帶疹皆是邪之不一各隨其部而泄然斑屬血者恆多疹屬氣者不少斑疹皆是邪氣外露之象發出之時宜神情清爽方為外解里和如斑疹出而昏者此正不勝邪而內陷或胃津內涸之故矣吳醫匯講葉天士溫證論治凡傷寒發斑雖大約從頭面胸前起但必手足背心一齊透露為妙凡有一處不透毒必內陷遂有棘手之虞沈氏升麻葛根湯升麻葛根白芍藥甘草炙各一十兩上為粗末每服三錢用水一盞半煎至一中盞去滓稍熱服不拘時候日二三服和劑活人名升麻湯案此本千金小兒芍藥四物解肌湯今去黃芩加甘草玄參升麻湯治傷寒發汗吐下後毒氣不散表虛里實熱發於外故身斑如錦紋甚則煩躁譫語兼治喉閉腫痛玄參升麻甘草炙各半兩上銼如麻豆大每服抄五錢匕以水一盞半煎至七分去滓服活人陽毒升麻湯治傷寒一二日便成陽毒或服藥吐下之後變成陽毒腰背痛煩悶不安面赤狂言或走或見鬼或下利脈浮大數面赤斑斑如錦紋喉咽痛唾膿血唾原作下今改升麻二分犀角屑一分射干一分黃芩一分人參一分甘草一分上銼如麻豆大以水三升煎取一升半去滓飲一湯盞食頃再服溫覆手足出汗汗出則解不解重作活人蘊要犀角玄參湯治發斑毒盛於本方加黑玄參化斑湯治斑毒此三字從醫方類聚引録人參半兩石膏半兩萎蕤知母甘草各一分上銼如麻豆大每服抄五錢匕水一盞半入糯米一合煎至八分取米熟為度去滓溫服活人證治論用化斑湯乃白虎加人參湯別名也活人書括準繩趙嗣真亦引王仲弓云發斑皆用白虎加人參湯一名化斑湯趙氏子病傷寒餘十日身熱而人靜兩手脈盡伏俚醫以為死也弗與藥翁診之三部舉按皆無其舌胎滑而兩顴赤如火語言不亂因告之曰此子必大發赤斑周身如錦文夫脈血之波瀾也今血為邪熱所搏淖而為斑外見於皮膚呼吸之氣無形可依猶溝隧之無水雖有風不能成波瀾斑消則脈出矣乃揭其衾而赤斑爛然即用白虎加人參湯化其斑脈乃復常繼投承氣下之愈發斑無脈長沙所未論翁蓋以意消息耳醫史滄洲翁傳全本然病傷寒旬日邪入於陽明俚醫以津液外出為脈虛自汗進玄武湯以實之遂致神昏如熟睡其家邀翁問死期翁切其脈皆伏不見而肌熱灼指即告其季曰此必營血致斑而脈伏非陽病見陰脈比也見斑則應候否則蓄血爾乃去衾裯視其隱處及小腹果見赤斑臍下石堅且拒痛為作化斑湯繼進韓氏生地黃湯逐其血是夕下黑矢若干枚即斑消脈出後三日又腹痛遂用桃核承氣以攻之所下復如前乃愈同上治傷寒熱毒不解欲變成斑解毒升麻散方川升麻一兩梔子仁一兩大青一兩黃芩一兩甘草一兩石青二兩上件藥搗粗羅為散每服五錢以水一中盞入生地黃汁半合煎至六分去滓不計時候溫服聖惠治傷寒臟腑壅毒不得宣疏肌膚髮斑宜服此方犀角屑一兩川大黃二兩梔子仁半兩藍葉一兩川升麻一兩甘草半兩上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服聖惠又治傷寒黑斑出不止方於本方去藍葉甘草加黃芩川芒消搗細羅為散每服不計時候煎甘豆湯放冷調二錢服治傷寒十日內未得汗表裡有熱發斑狂言欲走眼目俱黃心中煩悶大便不利宜服黃芩散方黃芩一兩大青一兩梔子仁半兩川升麻一兩川大黃一兩黃連一兩茵陳一兩甘草半兩川朴消一兩上件藥搗篩為散每服五錢以水一大盞入竹葉三七片煎至五分去滓不計時候溫服以利為度聖惠治傷寒斑毒不解宜服黃連散方黃連一兩犀角屑半兩石膏二兩梔子仁一兩甘草半兩黃明膠半兩上件藥搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服聖惠三黃石膏湯治陽毒發斑身黃如塗朱眼珠如火狂叫欲走六脈洪大燥渴欲死鼻乾面赤齒黃過經不解已成壞證表裡皆熱欲發其汗病熱不退又復下之大便遂頻小便不利亦有錯治溫證而成此症者又八九日已經汗下後脈洪數身壯熱拘急沉重欲治其內由表未解欲發其表則里證又急趦趄不能措手待斃而已殊不知熱在三焦閉塞經絡津液營衛不通遂成此證又治汗下後三焦生熱脈洪譫語不休晝夜喘息鼻時加衄身目俱黃狂叫欲走者通用此湯治之有神人所不識石膏一兩半黃芩黃連黃檗各七錢山梔三十個麻黃香豉二合水二鍾薑三片棗一枚槌法入細茶一撮煎之熱服六書案此節深師石膏湯既録出太陽病中蘊要加減三黃石膏湯治陽毒熱病發斑不得汗熱甚者於本方去山梔加知母甘草升麻葛根赤芍藥入蔥白二莖生薑三片粳米一撮煎三黃巨勝湯治陽毒發斑狂亂妄言大渴叫喊目赤脈數大便燥實不通上氣喘急舌卷囊縮難治者權以此湯劫之三黃石膏湯內去麻黃豆豉加大黃芒消是也水二鍾薑一片棗二枚煎之槌法臨服入泥漿清水二匙調服即愈六書消斑青黛飲治熱邪傳裡裡實表虛血熱不散熱氣乘於皮膚而為斑也黃連甘草石膏知母柴胡玄參生地黃山梔犀角青黛人參大便實者去人參加大黃上水二鍾薑一片棗二枚煎之槌法臨服入苦酒一匙調服六書犀角大青湯治斑出已盛心煩大熱錯語呻吟不得眠或咽痛不利者犀角屑上大青上玄參中甘草下升麻中黃連中黃芩中黃檗中山梔子中上用水二鍾煎至一鍾去渣溫服蘊要托裡舉斑湯白芍當歸各一錢升麻五分白芷柴胡各七分川山甲二錢炙黃水薑煎服下後斑漸出復大下斑毒復隱反加循衣摸床撮空理線脈漸微者危本方加人參一錢補不及者死若未下而先發斑者設有下證少與承氣須從緩溫疫論以上陽證陰證發癍亦出胸背又出手足亦稀少而微紅苦作熱疾投之涼藥大誤矣此無根失守之火聚於胸中上獨熏肺傳於皮膚而為癍點但如蚊蚋蚤蝨咬形狀而非錦文也調中溫胃加以茴香芍藥以大建中之類其火自下癍自退可謂治本而不治標也陰證略例案蘊要所引其文頗異恐出臆改云陰證發斑亦出胸背手足但稀少而淡紅也此人元氣素虛或先因欲事內損腎氣或誤服涼藥太過遂成陰證伏寒於下逼其無根失守之火聚於胸中上獨薰肺傳於皮膚而發斑點但如蚊蚋蚤蝨咬痕然非太紅點也與調中溫胃加以茴香炒白芍藥主之寒甚脈微者以大建中主之則真陽自回陰火自降而病乃愈此治本不治標也候輔之病脈極沉細內寒外熱肩背胸脅癍出十數點語言作亂或曰發癍譫語非熱乎余曰非也陽為陰逼上入於肺傳之皮毛故癍出神不守舍故錯語如狂非譫語也肌表雖熱以手按之須臾冷透如冰與薑附等藥數日約二十餘兩後中大汗而愈後因更發脈又沉遲三四日不大便余與理中丸三日內約半斤其疾全愈侯公之狂非陽狂之狂乃失神之狂乃陰虛也同上凡本非陽證妄用寒涼者每令人泄瀉邪陷不解豫常用大溫中飲理陰煎之類解寒托邪始得大汗汗後邪達多有見赤斑風餅隨汗而出隨出隨沒頃刻即愈活者多人矣凡寒毒為斑即此可見使內托無力則此毒終無出期日深日甚難乎免矣此理甚微不可不察景嶽案此似非必謂陰斑姑録於茲發斑陰證治用大建中湯桂心芍藥黃耆各二錢人參當歸甘草炙各一錢附子炮半兩生薑五錢半夏二錢半上九味銼每服酌量多少水二盞棗二枚煎八分去渣溫服寶鑑補遺案略例不見大建中湯方此方更有主療正與上證同知好古所用矣蘊要所載品味重復似意改者仍不録又案此方本出外臺虛勞裡急中引深師通脈四逆湯治陰證發斑身冷無脈斑黑昏沉厥逆不知人事者宜服之乾薑一錢半附子五錢炙甘草一錢半人參二錢半上作一服水二鍾煎至一鍾入童子小便豬膽汁各一小盞內半盞再煎二三沸去渣溫服之如干嘔燥煩欲冷水者以此湯於冷水中投冷與之則愈蘊要以上陰證附白㾦屠彝尊曰溫熱證中每多發出如粞如粟色白形尖者謂之白㾦有初病即見者有見而即愈者有見而危殆者有病經日久癍疹已見補瀉已施之後仍然發此而愈者泛稱時氣所致殊不知致病之由既異治療之法不同不可不與症疹詳辨而審處之也蓋溫熱暑邪病中有此症者必兼濕為多吳醫匯講葉氏溫熱論亦論之案此不過疹之一證兼濕者實多見之然治其本證而自愈矣發黃傷寒傳變發黃者四有畜血發黃有風濕發黃有濕熱發黃有寒濕發黃大抵發黃多從陽明太陰脾胃屬土故色黃土勝則剋水使小便不利濕熱內變故令發黃陽明者茵陳蒿湯兼太陽者麻黃連翹赤小豆湯兼少陽梔子檗皮湯云岐子保命原文稍繁且風濕作結胸考云岐子又論發黃有六今互酌以致刪訂凡傷寒汗不能透風濕在表者有黃證或表邪不解自表傳裡而濕熱鬱於陽明者亦有黃證表邪未解者必發熱身痛脈浮少汗宜從汗散濕熱內郁者必煩熱脈緩滑多汗宜從分消清利若陽明實邪內郁而痞結脹滿者宜先下之然後清其餘熱則自無不愈景嶽大抵發黃則盒麴相似濕熱瘀熱者則多有之陰黃則間有之也蘊要案發黃如盒麴相似本出丹溪濕家之黃也身黃如似熏黃雖黃而色暗不明也至於熱盛之黃也必身黃如橘子色甚者勃勃出染著衣正黃明理案濕家謂寒濕家趙嗣真曰明瘀熱發黃與瘀血發黃外證及脈未嘗相似瘀血脈微而沉或沉結明醫指掌云脈或芤遲瘀熱脈則浮滑緊數此脈狀之不相似也選録以上總證太陽發汗已不解身目黃者中濕身痛發黃者用麻黃赤小豆湯會解案中濕用此方本出黃氏類證又方中梓白皮必讀代以桑白皮今用為便身熱大小便如常而發黃者治用仲景梔子蘗皮湯加茵陳寶鑑補遺柴胡加山梔子湯治發黃脈弦數口苦胸滿心煩發熱或往來寒熱日晡小有潮熱或耳聾脅痛者於小柴胡方中加山梔子茵陳蒿蘊要會解用小柴胡湯去人參大棗加茵陳梔子大便祕加大黃甲申仲夏內弟陳克輝患感冒頭痛發熱一老醫用薑活湯入麻黃撮許投三劑越數日發黃目睛皆黃小便亦赤澀不堪余投以茵陳五苓散加梔蘖至十劑始痊救正論怫鬱熱盛在表燥而無汗濕熱在裡不能發於外相搏遂成發黃茵陳湯調五苓散甚者茵陳合承氣下之心要案芒消非濕熱所宜當以消石代之大黃消石湯可徵茵陳將軍湯治腹滿身目發黃小水不利大便實發渴或頭汗至頸節還脈來沉重者宜用大黃茵陳山梔甘草厚朴黃芩枳實水二鍾薑一片槌法加燈心一握煎之熱服六書治時氣五六日壯熱骨節煩疼連心兩肋氣脹急硬痛不能食變為黃宜服柴胡散方柴胡一兩枳實一兩栝樓根一兩黃芩一兩梔子仁一兩茵陳一兩龍膽一兩川大黃一兩甘草半兩上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服聖惠案此本千金治發黃身面目俱黃如金色方今去升麻加枳實栝樓根甘草治傷寒發黃或先服利藥未差者宜以內消湯以折熱氣黃芩湯方黃芩去黑心茵陳蒿升麻各一兩梔子仁柴胡去苗龍膽各半兩犀角鎊一兩上七味粗搗羅每服五錢匕用水一盞煎至一盞去滓入生地黃汁一合攪令勻不拘時溫服聖濟以上陽證韓祗和云病人三五日服下藥太過虛其脾胃亡其津液渴飲水漿脾土為陰濕加之與邪熱相會發黃此陰黃也當以溫藥治之如兩手脈沉細遲肢體逆冷皮膚有粟起或嘔吐舌上有胎遍身發黃煩躁欲於泥水中臥小便赤少皆陰候也故陰黃多以熱湯溫之或湯漬布搭其胸腹或以湯盛瓢中坐於臍下尉之其病愈者曾治越顯宗病傷寒至六七日因服下藥太過致發黃其脈沉細遲無力皮膚涼發躁欲於泥中臥喘嘔小便赤澀先投茵陳橘皮湯喘嘔止次服小茵陳湯半劑脈微出不欲於泥中臥次日又服茵陳附子湯半劑四肢發熱小便二三升當日中大汗而愈似此治愈者不一録玉機韓氏茵陳橘皮湯治身黃脈沉細數熱而手足寒喘嘔煩躁不渴者茵陳橘皮生薑各一兩白朮一分半夏茯苓各半兩上為末水四升煮取二升放溫分作四服玉機案此即金匱小半夏湯之意小茵陳湯治發黃脈沉細遲四肢及遍身冷附子一個八片甘草炙一兩茵陳二兩上為粗末用水二升煮一升溫作三服玉機又茵陳四逆湯治發黃脈沉細遲肢體逆冷腰已上自汗於本方加乾薑炮一兩半分作四貼水煎服又茵陳附子湯治服四逆湯身冷汗不止者於本方去甘草加乾薑炮二兩半附子二個茵陳一兩半水煎分作三服菌陳茱萸湯治服茵陳附子湯證未退及脈伏者吳茱萸一兩當歸三分附子二個各切八片制木通一兩乾薑炮茵陳各一兩半上為粗末分作二服水煎玉機案以上並系韓氏方至元丙寅六月時雨霖霪人多病瘟疫真定韓君祥因勞役過度涼飲涼茶及食冷物遂病頭痛肢節亦疼身體沉重胸滿不食自以為外感傷用通聖散兩服藥後添身體困甚方命醫治之醫以百解散發其汗越四日以小柴胡湯二服後加煩熱躁渴又六日以三一承氣湯下之燥渴尤甚又投白虎加人參柴胡飲子之類病愈增又易醫用黃連解毒湯硃砂膏至寶丹之類至十七日後病勢轉增傳變身目俱黃肢體沉重背惡寒皮膚冷心下痞硬按之而痛眼澀不欲開目睛不了了懶言語自汗小便利大便了而不了命豫治之診其脈緊細按之虛空兩寸脈短不及本位此證得之因時熱而多飲冷加以寒涼藥過度助水乘心反來侮土先因其母後薄其子經云薄所不勝乘所勝也時值霖雨乃寒濕相合此為陰證發黃明也豫以茵陳附子乾薑湯主之內經云寒淫於內治以甘熱佐以苦辛濕淫所勝平以苦熱以淡滲之以苦燥之附子乾薑辛甘大熱散其中寒故以為主半夏草豆蔻辛熱白朮陳皮苦甘溫建脾燥濕故以為臣生薑辛溫以散之澤瀉甘平以滲之枳實苦微寒泄其痞滿茵陳苦微寒其氣輕浮佐以薑附能去膚腠間寒濕而退其黃故為佐使也煎服一兩前證減半再服悉去又與理中湯服之數日氣得平復或者難曰發黃皆以為熱今暑隆盛之時又以熱藥治之何也豫曰理所當然不得不然成無己云陰證有二一者始外傷寒邪陰經受之或因食冷物傷太陰經也二者始得陽證以寒治之寒涼過度變陽為陰也今君祥因天令暑熱冷物傷脾過服寒涼陰氣大勝陽氣欲絶加以陰雨寒濕相合發而為黃也仲景所謂當於寒濕中求之李思順云解之而寒涼過劑瀉之而逐寇傷君正以此也聖賢之訓豈敢越哉或者曰潔古之學有自來矣寶鑑茵陳附子乾薑湯治因涼藥過劑變為陰證身目俱黃四肢皮膚冷心下痞硬眼澀不欲開自利踡臥附子炮去皮臍三錢乾薑炮二錢茵陳一錢二分白朮四分草豆蔻麵裹煨一錢白茯苓去皮三分枳實麩炒半夏湯泡七次澤瀉各半錢陳皮三分去白上十味㕮咀為一服水一盞半生薑五片煎至一盞去相涼服不拘時服實鑑茵陳理中湯治陰寒發黃腹痛自利者理中湯加茵陳一錢主之若小便不利加五苓散合而用之脈沉寒甚足冷者必加附子半個主之蘊要案理中加茵陳本出略例水濕傷脾脾寒色見於外為陰黃脈沉身冷是久雨體弱有之四苓散加炮薑茵陳重者加附子從陰證治六要內傷感寒勞役形體飲食失節中州變寒之病生黃非傷寒壞之而得之只得建中理中大建中足矣不必用茵陳也略例案此亦一説仍存於茲以上陰證發狂傷寒熱毒在胃並於心藏使神不寧而志不定遂發狂也傷寒至於發狂為邪熱至極也非大吐下則不能已又有熱在下焦其人如狂者經曰熱入膀胱其人如狂謂之如狂則未至於狂但臥起不安爾其或狂言目反直視又為腎之絶汗出輒復熱狂言不能食又為失志死若此則殆非藥石之所及殆為真病焉明理緒論云陽狂直視便溺自遺與汗後大熱脈躁狂言不食皆不治大抵發狂之症要手足和暖神氣清爽脈息洪大目睛光彩此為順可治若見反目上視汗出復熱四肢厥冷六脈沉微此為逆必死候也明條若初起頭疼發熱惡寒方除已後登高而歌棄衣而走逾垣上屋罵詈叫喊大渴欲死脈來有力乃因邪熱傳裡陽盛發狂當用寒藥下之此為陽狂凡見舌卷囊縮者不治若病起無頭疼身微熱面赤戴陽煩躁脈來沉微無力欲坐臥於泥水中乃因寒極而發躁錦囊此下云指甲面顏青黑冷汗不止心腹硬結如石燥渴欲死即陰證似陽當用熱藥溫之此為陰躁凡見厥冷下利譫語者不治醫者不看脈以虛陽上膈而躁誤為實熱反與涼藥使渴盛躁急則氣消成大害矣須詳脈來有力無力此為良法六書陽盛發狂者內經曰陽盛則四肢實實則能登高也熱盛於身則棄衣而走難經所謂重陽者狂也大抵熱盛則神昏狂妄罵詈不避親疏甚則逾垣上屋登高而歌此神明之亂水微噀其面或以硝水法搭胸中甚者必以玄明粉寒水石散先與之以折其熱勢取其稍定乃可察脈若脈之實大滑大大便祕硬臍腹滿硬者急以大承氣湯倍加芒消下之如勢輕未可大攻者且以小柴胡合白虎湯或白虎合解毒湯三黃瀉心湯之類可選而用之如勢輕以下原文不確今參吳氏全論以致改易陰症煩躁如發狂狀非狂也外臺祕要曰陰極發躁欲坐井中欲投泥水中臥或欲向陰涼處坐躁亂不安亦如狂也但手足逆冷脈息沉微細遲雖煩渴不能飲水者是也甚者金液丹之類救之蓋不可一例以陽治也蘊要發狂煩躁面赤脈實治用調胃承氣湯發狂而肌表雖或熱以手按之則冷透手或肩背胸膈有斑十數點脈極沉細治用乾薑附子湯加人參寶鑑補遺陽明病發狂棄衣而走登高而歌此陽明實也以承氣湯亟下之如便不結者大劑白虎湯灌之廣筆記傷寒六七日壯熱胸滿便閉脈實數發狂者大承氣加黃連入門有陽厥暴怒發狂者蓋陽氣暴折鬱而多怒則發狂也大承氣加鐵落緒論治傷寒後餘熱不退口乾煩躁宜服黃芩丸方黃芩一兩梔子仁一兩川大黃一兩鐵粉一兩甘草半兩上件藥搗羅為末煉蜜和丸如梧桐子大不計時候以溫水下二十丸聖惠案主治不確今録於此又治時氣熱毒在藏譫語口乾犀角丸於本方去黃芩加犀角屑馬牙消各一兩以溫竹葉湯下三十丸紅白散專治大煩大熱晝夜不退神思昏迷口乾舌燥一切熱症並瘟疫時症並宜人中白玄明粉各一錢辰砂五錢共為末自沸湯或金銀煎湯下壽世仙丹説疫玄砂丹治發狂於本方去人中白共末冷水服定心湯治心荒生地黃汁半盞童便半盞二味合和重湯煮數沸溫服醫鑑治傷寒熱極發狂不認親疏燥熱之極長垣成都憲傳用熊膽一分研末涼水調服立效壽世保元一書生傷寒不汗發狂循河走葛乾孫就猝置水中良久出之裹以重繭乃汗而解醫史案醫約載陽狂似陰先與水一小盞目精稍覺轉運仍飲數鍾稍睡復躁雨中倒臥而解又蘊要硝水漬法以朴消和新汲水青布浸搭胸心如得睡汗出乃愈從祖近湖公少年因房勞食犬肉傷寒諸醫以其虛也攻補兼施至發狂登屋奔走呼號日夜令壯夫看守者幾月余急走使延朱遠齋遠齋先命煎人參膏二斤以待用潤字號丸藥數錢下之去黑糞無算勢遂定奄奄一息鄰於死矣徐以參膏灌之至百二十日全瘳廣筆記潤字號丸藥無考金液丹硫黃揀淨去砂石十兩研細飛過用瓷合子盛以水和赤石脂封口以鹽泥固濟曬乾地內先埋一小罐子盛水令滿安合子在上用泥固濟訖慢火養七日七夜候足加頂火一斤煅候冷取出研為極細末上藥末一兩用蒸餅一兩湯浸握去水搜為丸如梧桐子大每服三十丸多至百丸溫米飲下空心服之和劑案此方本出痼冷門云又治傷寒陰證然恐非所宜但蘊要以治陰狂似可遵用仍次於斯
